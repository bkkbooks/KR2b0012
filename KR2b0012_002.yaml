body:
  text: 通鑑釋文辯誤卷二宋胡三省撰通鑑十七凡二條武帝建元元年上雅嚮儒術嬰蚡俱好儒雅推轂代趙綰為御史大夫蘭陵王臧為郎中令史炤釋文曰言薦舉人如車轂之運轉費本同余謂炤説未為精當此言推車轂者主於進薦賢者亦主於進故以薦賢為推轂三年鄠杜令欲執之費本注曰鄠杜古杜伯國京兆邑後宣帝改曰杜陵余按漢書地理志鄠縣屬右扶風古有扈氏之國杜縣屬京兆古杜伯國不可以鄠縣并為杜伯之國又不可并以為屬京兆通鑑十八凡三條元光三年田蚡奉邑食鄃海陵本釋文曰鄃音俞余按漢書音義鄃音輸音俞非五年關益斥西至沫若水南至牂柯為徼史炤釋文曰謂以木石水為界也西南之徼猶北方之塞費本同余按史炤盖因顔師古注鄧通𫝊而為之説鄧通𫝊曰人有告通盜出徼外鑄錢師古注云東北謂之塞西南謂之徼塞者以障塞為名徹者取邀遮之義然余考漢書匈奴𫝊單于請罷邉備塞吏卒侯應上議曰孝武攘匈奴於幕北建塞徼起亭隧築外城列屯戍而守之是北方之塞亦謂之徼也朝鮮𫝊曰朝鮮屬遼東外徼是東方之塞亦謂之徼也師古殆考之未精詳而史炤又依以為説而所謂以木石水為界者亦本於侯應之議應之議曰起塞以来或因山巖石木柴僵落谿谷水門稍稍平之卒徒築治此正言建塞徼於北方以備匈奴者也豈特西南謂之徼哉直言徼以邀遮為義豈不簡而當乎元朔二年蓼侯孔臧史炤釋文曰蓼音六邑名屬六安國余按漢書地理志六縣蓼縣皆屬六安國春秋文五年楚滅蓼及六皆臯陶後也陸德明經典釋文蓼音了未嘗有六音海陵本亦因史炤而誤通鑑十九凡二條五年都尉韓説為龍頟侯史炤釋文曰頟鄂格切平原邑余按班志平原郡有龍頟侯國注云頟音洛若從鄂格切則是額字史炤殆不考字書也三十二卷成帝綏和元年誤與此同校尉李朔為渉軹侯史炤釋文曰軹河内邑余按班史衛青𫝊作陟軹侯功臣表作軹侯食邑於齊郡之西安非河内之軹縣也通鑑二十凡三條元鼎二年置均輸以通貨物史炤釋文曰委輸也謂諸有當輸於官者又均輸之余按班史時置均輸官於郡國令逺方各以其物而灌輸置平凖於京師通受天下委輸貴則賣之賤則買之使富商大賈無所牟大利均輸置於郡國平凖置於京師均平也斟酌物價貴賤而適其均平使民無甚貴甚賤之患唐劉晏正得此法非當輸於官又均輸之也又鹽鐵論云郡國諸侯各以其方物貢輸往来多苦惡不償其費置輸官以相紹運名曰均輸伏波將軍路博徳出桂陽下湟水伐南越事史炤釋文曰湟水名在金城臨羌塞外余按水經云洭水過臨洭縣南出洭浦關為桂水山海經以洭水為湟水徐廣曰湟水一名洭水出桂陽通四㑹此路博德伐南越出桂陽而下湟水者也若金城臨羌之湟水則趙充國伐羌所度者非路博德所下之湟水也甲為下瀨將軍下蒼梧史炤釋文曰瀨水名在越地余按臣瓉漢書注曰瀨湍也呉越謂之瀬中國謂之磧伍子胥書有下瀨船則瀨非越地水名也通鑑二十一凡一條太初三年上邽騎士趙弟費本注曰古邽戎國武帝開之置上邽縣屬隴西郡余按史記秦武公十年伐邽冀戎初縣之漢書地理志隴西郡有上邽縣應劭注云即邽戎邑也則上邽縣乃秦武公所置非漢武帝開置也通鑑二十三凡二條昭帝始元二年二王不復肻㑹龍城匈奴始衰史炤釋文曰西方胡皆事龍神故名大㑹處為龍城費本同余按漢書匈奴𫝊匈奴諸王長少歳正月㑹單于庭祠五月大㑹龍城祭其先天地鬼神秋馬肥大㑹蹛林皆㑹祭處也匈奴非西方胡且三處皆其㑹祭之地不應龍城獨以事龍神得名其説殊為未通元鳯元年賜燕王旦謚曰刺王史炤釋文曰刺七賜切余謂當音来逹翻謚法暴戾無親曰刺言其所為乖刺無親親之義也通鑑二十五凡一條宣帝元康四年先零䍐开乃解仇作約史炤釋文曰䍐羌开羌皆西羌别種漢破滅之置縣以其人處於地因以名之屬天水郡余按漢書注蘇林曰䍐开在金城南顔師古曰䍐开羌之别種也下言遣开豪雕庫宣天子至德䍐开之屬皆聞知明詔下又云河南大开小开則䍐羌开羌種落殊矣而地理志天水郡有䍐开縣盖以此二種羌来降處之此地因以名縣以此觀之䍐开種落實在金城河南其有来降者處之天水郡界内因置䍐开縣河南之種落固自若也元康之時先零䍐开解仇作約者皆在金城塞外非在天水郡䍐开縣者也通鑑二十六凡二條神爵元年伯牙操遞鍾史炤釋文曰晉灼曰遞音遞迭之遞二十四鍾各有節奏擊之不常故曰遞鍾琴名也余按漢書注諸家之説不同晉灼之注止於曰遞臣瓚駁之曰楚辭云奏伯牙之號鍾號鍾琴名也馬融笛賦曰號鍾高調伯牙以善鼓琴名不聞其能擊鍾也師古曰琴名是也字旣作遞則與楚辭不同不得即讀為號當依晉音耳合而觀之晉灼本無鍾琴名也四字史炤乃牽臣瓚注四字合為晉灼注使後學不得參考諸家之異同而折衷之不已誣乎辛武賢奏合撃䍐开在鮮水上者史炤釋文曰山海經云北鮮之山鮮水出焉北流注于余吾余按漢書武帝紀匈奴逺其累重於余吾水北顔師古注云余吾水在朔方北山海經云北鮮之山鮮水出焉北流注于余吾師古葢以此鮮水在匈奴中非䍐开所居之鮮水也漢書羌豪獻鮮水海地於王莽置西海郡即䍐开所居之鮮水通鑑二十七凡二條甘露元年魏和意任昌至烏孫謀誅狂王云云漢遣張遵收和意昌係瑣史炤釋文曰係繋束也瑣銀鐺也余按漢書西域𫝊趙德使罽賓與其王隂末赴相失隂末赴鎖琅當德顔師古注曰琅當長鎖也若今之禁繫人鎖也史炤葢引此以釋瑣而誤寫為銀鐺耳二年上行幸萯陽宫屬玉觀史炤釋文曰晉灼曰屬玉鳥鵁鶄以名觀也余按晉灼注本云屬玉水鳥似鵁鶄省水字與似字便失文意通鑑三十凡一條成帝河平元年竒請它比日以益滋海陵本釋文曰比必寐切謂引它類以比附之余謂釋文所謂引它類以比附之止依顔師古注今法家讀比附之比如字師古注亦無音翻若以為比例之比則當音毗至翻音必寐切者乃比及之比愈非本文之義通鑑三十一凡二條陽朔四年烏孫小昆彌烏就屠子拊離代立史炤釋文曰拊離烏孫小昆彌種名余按昆彌者烏孫王號也烏孫國有大小昆彌烏就屠者小兒彌之名拊離乃烏就屠之子之名非種名也通鑑本文甚明何必曲為之説鴻嘉二年博士行大射禮有飛雉集于庭史炤釋文曰爾雅曰雉絶有力奮余謂爾雅釋雉之異名奮其一也史炤以奮釋飛雉不亦拘乎通鑑三十三凡一條哀帝建平元年郎中令泠褒史炤釋文曰泠姓也顔師古音廖費本同余按漢書音義師古音零廖字乃𫝊寫者誤以零為廖耳炤不能察也通鑑三十四凡一條四年董賢起冢内為便房外為徼道史炤釋文曰徼道小道也費本同余謂徼道者徼廵之道為小道環遶便房之外以徼廵故曰徼道雖是小道實以徼廵取義朱子云徼伺察也天下道路除逵衢康莊之外皆小道也豈可皆以徼道名哉通鑑三十五凡一條平帝元始二年去胡来王唐兜史炤釋文曰唐兜西域國也號為去胡来王謂去胡而来降漢余按漢書西域𫝊婼羌國王號去胡来王則唐兜乃去胡来王之名非國名也觀下文斬唐兜可見非國名矣通鑑三十六凡二條四年羌豪獻鮮水海允谷鹽池史炤釋文曰允音鉛海陵本同余按漢書音義惟允吾縣音鉛牙允街縣音鉛街此外無音王莽初始元年莽母功顯君死自以居攝踐祚奉漢大宗之後為功顯君緦縗弁而加麻環絰如天子弔諸侯服凡壹弔再㑹史炤釋文曰絰首戴也以苴麻為之謂之環者言其輕細如環之形費本同余按䘮服以情之輕重為等苴麻之絰重服也左𫝊齊晏桓子卒晏嬰縗麤斬苴絰帶杖菅屨杜預注曰苴麻之有子者取其麤也周禮王為諸侯緦縗弁而加環絰同姓則麻異姓則葛王莽自以居攝踐祚不為母服䘮服天子弔諸侯之服以壹弔再㑹而已安肻以苴麻為絰乎記檀弓叔仲皮死其子子栁之妻衣縗而繆絰叔仲衍請繐縗而環絰鄭注云繆絰士妻為舅姑之服也環絰弔服之絰也時婦人好輕細而多服此者孔頴逹正義曰繆絰謂絞麻為絰繆謂兩股相交也五服之絰皆然惟弔服環絰不繆耳環絰者一股所謂纒絰也此即輕細如環之義史炤所謂輕細如環者本顔師古之説既言輕細安得以苴麻為之乎通鑑三十七凡一條天鳯元年和親侯歙者王昭君兄子歙也中部都尉以聞史炤釋文曰歙事王莽為中部都尉余按通鑑上文此時匈奴遣人之西河虎猛制虜塞下告塞吏曰欲見和親侯和親侯者王昭君兄子歙也中部都尉以聞詳考文理歙葢事王莽為和親侯時在長安中部都尉乃西河中部都尉以匈奴来告之事聞於莽非歙為中部都尉也通鑑三十八凡一條地皇三年莽教民煑艸木為酪史炤釋文曰酪乳漿也余按乳酪之酪真酪也莽令煑艸木為酪則非乳漿服䖍注曰煑木實如淳注曰作杏酪之屬也此皆依煑艸木而為之説通鑑三十九凡三條更始元年莽紺袀服史炤釋文曰偏裻謂之袀戎衣也紺青色以為袀衣章懷注袀純也純為紺服其説非是費本同余按裻衣背縫也左思魏都賦襲偏裻以䜋列偏裻固是戎衣然非袀服也史記趙世家王夢衣偏裻之衣正義曰杜預云偏左右異色裻在中左右異故曰偏葢偏裻自衣背縫中分左右各一色左𫝊所謂太子帥師公衣之偏衣者也袀服之袀音均左𫝊所謂均服振振取虢之旂陸徳明曰均字書作袀袀之為義純也説有根據未可厚非此説乃師古之説章懷注後漢書後漢書不載莽袀服事以此説為章懷之説亦非是二年吏民惶恐屬縣屯聚建等不能下史炤釋文曰屬附也言附縣而屯聚余按通鑑上文申屠建揚言三輔兒大黠共殺其主吏民聞此言惶恐不自安故三輔之屬縣皆屯聚以自保若以為附縣而屯聚其説穿鑿驃騎大將軍宗佻為潁隂王史炤釋文曰佻它彫切説文遷廟也余按遷廟之祧從示從兆此宗佻乃人姓名史炤誤矣通鑑四十凡一條光武建武元年立秋日貙膢時史炤釋文曰膢龍珠切説文臘祭也海陵本同余按章懷太子賢後漢書注引前書音義曰貙獸以立秋日祭獸王者亦以此日出獵用祭宗廟冀州北郡以八月作飲食曰膢其俗語曰膢臘社伏乃是祭之四名膢祭於秋臘祭於冬烏得謂膢為臘祭乎又按説文云膢楚俗以二月祭飲食也未嘗以膢為臘祭史言以立秋日貙膢是貙膢明為立秋日之祭不待辯而可以知炤之妄矣章懷注膢音婁後漢書禮儀志有貙劉劉婁音近通鑑四十一凡一條五年耿弇追張歩至鉅昧水上史炤釋文曰昧如字一名巨洋水在樂安國海陵本同余按章懷太子賢注曰巨洋水在今青州壽光縣西水經注巨洋水出朱虚縣東太山袁宏謂之鉅昧王韶謂之巨蔑北過臨朐縣東又北過劇縣西耿弇追破張歩處也又東北過壽光縣西又東北入于海是水自發源至劇縣皆屬北海齊二國界至壽光始屬樂安國界耿弇破張歩於劇縣西未至樂安國界也昧音莫葛翻其字從日從末非昧字也通鑑四十二凡二條六年詔曰倉卒蕪蔞亭豆粥海陵本釋文曰蔞力無切余按章懷註蔞力于翻海陵本音非與小兒共槽櫪而食史炤釋文曰果木華實相半曰槽櫪㯕椑也博雅木下支謂之椑㯕余謂飼獸之食器曰槽櫪馬櫪也共槽櫪而食者以犬馬為諭也何必為僻詭之説以疑誤後學通鑑四十三凡二條十二年參狼羌與諸種寇武都海陵本釋文曰參所含切至四十九巻安帝永初二年滇零招集武都參狼則曰參所今切然則二音將何從乎若以分野言之參星在梁益之分音所今翻為是十五年封皇子輔為右翊公史炤釋文曰右馮翊也費本同余按漢三輔左馮翊右扶風未嘗有右馮翊也右翊封國史無所考不可妄引以為釋通鑑四十四凡一條中元二年初燒當羌豪滇良史炤釋文曰滇良益州西夷費本同余按後漢書西羌𫝊羌無弋爰劒𤣥孫研居湟中最豪健羌中號其種為研種研之十三世孫燒當復豪徤更以燒當為種號滇良者燒當之𤣥孫也世居河北大允谷既破先零奪居大榆中地此所謂湟中羌去益州甚逺烏得謂之益州西夷乎通鑑四十五凡四條明帝永平三年湯以六事自責云云苞苴行邪史炤釋文曰苞説文艸也以為麤履從包取其藏物苴履中艸亦包也余按此苞苴謂人以苞苴相問遺者也記曲禮凡以弓劒苞苴問人者鄭注云問猶遺也苞苴裹魚肉或以葦或以茅陸德明曰苞裹也苴藉也孔頴達曰既夕禮葦苞長三尺内則云炮取豚編萑以苴之是編萑葦以裹魚及肉也亦兼容它物故禹貢云厥包橘柚孔叢子曰吾於木瓜之惠見苞苴之禮行是也先儒解苞苴之義甚明史炤特為怪迂以罔世通鑑之罪人也八年耿固請置度遼將軍屯五原以防南匈奴逃亡史炤釋文曰遼水在幽州之域謂出師當度遼水也余按昭帝時霍光以范明友為度遼將軍以伐烏桓時烏桓居遼東遼西塞外故霍光命將以度遼為號謂出師當度遼水也今請置度遼將軍屯五原而亦以出師當度遼水為說則不通矣葢建武之後匈奴分而烏桓鮮卑盛先是漢嘗命范明友以度遼將軍破烏桓匈奴亦自是衰故復以是號命將使屯五原既以防南部之逃亡亦以是號懾服北部及東胡之心使不敢招誘南部之衆耳十四年寒朗以劉建等物色問顔忠王平二人錯㦍不能對史炤釋文曰錯倉各切或作䇎竦也㦍逆各切相遇驚也或作愕海陵本同余按章懷注曰錯㦍猶倉卒也錯音七故翻㦍音五故翻又考字書䇎且略切竦也驚也與錯字不同倉各切杅水脯糒海陵本釋文曰糒歩拜切乾餱也余按糒音平祕翻海陵本音非通鑑四十六凡二條章帝建初二年倉頭衣綠褠領袖正白史炤釋文曰褠臂衣即臂韝也余謂史炤因章懷注而誤也按字書臂韝之韝旁從韋此所謂綠褠綠單衣也下文言領袖正白則為單衣之褠而非臂韝之韝明矣元和元年支拄橋梁史炤釋文作支柱竹主切余按通鑑正文乃是支拄拄字從手不從木音竹柱翻通鑑四十七凡二條章和元年羌迷唐據大小榆谷以叛史炤釋文曰榆溪名水注溪曰谷西羌中有大小二谷也海陵本同余按水經河水逕西海郡南又東逕允川而歴大榆小榆谷北二榆土地肥美羌所依阻也榆溪在上郡水經注曰榆林山即漢書所謂榆溪舊塞也自溪以西悉榆柳之藪縁沙陵屇龜兹縣亦謂之長榆王恢云樹榆為塞者此地也詳而考之榆溪自是榆溪大小榆谷自是大小榆谷居然可知也温宿王將八千騎於東界徼于窴史炤釋文曰徼吉弔切邊徼余謂此乃徼遮之徼讀與邀同史炤音義俱非通鑑四十八凡二條和帝永元四年鈎盾令鄭衆史炤釋文曰盾音順中官所𨽻其處在少府監海陵本同余按盾音食尹翻後漢書百官志鉤盾令宦者為之典諸近池苑囿游觀之處屬少府葢鈎盾令以中官為之非中官所𨽻也漢少府列於九卿唐始以少府為監言其處在少府監亦非也至五十巻安帝建光元年鈎盾令陳逹炤若已悟此釋之為非者至五十八卷靈帝中平元年則又誤矣十三年迷唐復還賜支河曲侯霸出塞至允川擊破迷唐史炤釋文曰允音鉛水出金城允街費本同余按水經注允川去賜支河曲數十里在大小榆谷之西此金城塞外地也若允街縣則屬金城郡在塞内通鑑言侯霸出塞至允川本文甚明史炤殆弗之考也通鑑四十九凡三條安帝永初二年皇太后幸若盧獄錄囚史炤釋文曰盧音廬海陵本同余謂盧讀如字六年春正月詔曰凡供薦新味多非其節或鬱養彊孰史炤釋文曰彊去聲費本同余謂鬰養彊孰者言物非其時未及成熟為土室蓄火其下使土氣蒸暖鬰而養之彊使先時成熟也彊音其兩翻讀從上聲不從去聲自此之後凡勉彊之彊炤多從去聲盖蜀人土音之訛也元初元年羌豪號多鈔掠武都漢中巴郡板楯蠻救之史炤釋文曰楯音順海陵本同余按楯音食尹翻未嘗有順音廣韵二十二稕韵内有揗字音順摩也其旁從手不從木此亦炤操土音之訛板楯蠻以木板為楯故名通鑑五十凡一條永寕元年遼西鮮卑大人烏倫其至鞬各以其衆詣度遼將軍鄧遵降史炤釋文曰烏倫其至鞬鮮卑種名費本同余謂烏倫其至鞬乃鮮卑種帥二人之名非種名也觀通鑑上文言大人下文言各以其衆降則可知矣通鑑五十一凡一條延光四年閻顯召越騎校尉馮詩將兵以禦孫程等詩辭以卒被召所將衆少海陵本釋文曰被音皮余謂被召之被安得有皮音此三尺童子所知也通鑑五十二凡一條順帝永和元年武陵漊中蠻反史炤釋文曰漊力主切海陵本同余按類篇漊郎侯切水出武陵蠻中廣韵九麌韵内有漊字郎主切説文雨漊漊也類篇經温公修定音漊水音義甚明當以郎侯切為正史炤於四十六卷章帝建初三年漊中已音郎侯切今此則自相反至一百二十三卷宋文帝元嘉二十八年漊中注其誤與此同通鑑五十三凡一條桓帝永壽元年劉陶上疏曰虎豹窟于麑場費本注曰麑獅子也余按此麑謂鹿子也鹿方産子而虎豹窟於其場則麑必遭搏噬以諭貪殘者牧民則良民必罹其害也獅子謂之狻猊能食虎豹使虎豹窟於其場狻猊豈畏之乎以麑為獅子既失劉陶之㫖改狻猊之猊以就麑字又妄為牽合也通鑑五十四凡一條延熹二年李雲上書曰梁冀雖持權専擅虐流天下以罪行誅猶召家臣搤殺之耳史炤釋文曰搤於側切海陵本同余按搤音於革翻炤音非通鑑五十五凡一條八年楊秉奏曰昔懿公刑邴歜之父奪閻軄之妻而使二人參乗卒有竹中之難史炤釋文曰參或作驂三馬曰驂乗余按楊秉明言使二人參乗而史炤乃以三馬曰驂乗為説文義乖刺齊懿公事見左𫝊左𫝊言使邴歜僕閻職參乗此言使二人參乗者言懿公與二人者同車三人共載是參乘也通鑑釋文辯誤卷二
