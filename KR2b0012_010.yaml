body:
  text: 通鑑釋文辯誤巻十宋胡三省撰通鑑二百八凡四條中宗神龍元年敬暉瞿然不恱海陵本釋文曰瞿九縛切説文逺視貌余按九縛切乃矍字瞿音九遇翻驚視而失其常度之貌陸德明經典釋文甚明史炤於此音紀具切是至二百四十八巻武宗㑹昌四年炤音又非左衛將軍上邽紀處訥史炤釋文曰上邽即秦州天水縣余按漢書地理志上邽縣屬隴西郡天水别為郡名新唐書地理志秦州天水郡治上邽無天水縣宋白續通典秦州有天水縣而清水縣治上邽鎮史炤所云未知何據二年改贈后父韋𤣥貞為酆王后四弟皆封郡王費本注曰酆郡名余按唐制后弟封郡王韋𤣥貞后父必贈為國王酆者封國之名非郡名也且自古未嘗有酆郡去年已封韋𤣥貞為上洛王上洛郡名也自郡封而進贈國封中宗之濫爵固不足言然郡封國封之制則不可以無辯袁恕己掊地爪甲殆盡史炤釋文曰掊蒲墨切僵也余按僵踣之踣其旁從足不從手袁恕己若只僵踣於地何為爪甲殆盡此由以爪甲爬地也類篇掊從蒲侯翻今從之通鑑二百九凡三條景龍元年武平一名甄以字行史炤釋文曰甄之人切余謂音之人切者姓也人之有字以表其名甄之為義明也察也别也惟明惟察惟别然後能平一此正以甄明甄察甄别而命字甄當音稽延翻睿宗景雲元年上御棃園毬塲史炤釋文作黎園注曰黎憐題切余按此乃棃園非黎園也果木之棃音力脂翻命韋温總知内外守捉兵馬事史炤釋文曰唐制兵之戍邊者大曰軍小曰守捉曰城曰鎮而總之曰道費本同余謂此乃京城皇城宫城内外守捉兵馬非邊戌之守捉也宣宗之崩踵故事增人守捉此其證也通鑑二百十凡二條二年前右率府鎧曹參軍柳澤史炤釋文曰鎧甲也鎧曹十六衛官屬也費本同余按唐制太子十率府亦有鎧曹等諸參軍柳澤乃十率府屬非十六衛府屬也右率府右衛率府𤣥宗先天元年能撩李日知嗔史炤釋文曰撩蓮條切説文撩理也海陵本同余謂炤音是而義非撩取也嗔怒也言取怒也又俗說以擿發為撩今人謂相挑發為相撩撥通鑑二百一十一凡一條開元二年立皇子嗣主為鄄王史炤釋文曰鄄於巾切故衛地在濮陽余按衛地之鄄音吉掾翻無於巾一音通鑑二百一十二凡二條七年王毛仲嚴察有幹力萬騎功臣閑廏官吏皆憚之史炤釋文曰睿宗改千騎曰萬騎余按太宗選驍勇者從遊獵謂之百騎則天時稍增為千騎中宗改曰萬騎非睿宗也通鑑於睿宗景雲元年書萬騎本末甚明十三年更名長從宿衛之士曰彍騎分𨽻十二衛總十二萬人為六畨史炤釋文曰隋制十二衛唐因之曰翊衛曰驍騎衛曰􅐥衛曰屯衛曰禦衛曰候衛為左右焉彍騎分隷十二衛每衛萬人余按唐受隋禪置十二衛府已微變其官名至武德五年又改云云辯見一百八十六巻高祖武德元年今史炤所云十二衛武德元年之制也以唐六典考之則開元之十二衛曰左右衛曰左右驍衛曰左右武衛曰左右城衛曰左右領軍衛曰左右金吾衛通鑑二百一十三凡二條十五年賜貴近絲一綟費本注曰綬謂之綟余按晉書綠綟綬謂以䓞屮染綬故綬因謂之綟此言絲一綟猶絲一繚耳非綟綬之綟唐制麻三斤為綟未知絲一綟其為斤兩何如也史炤亦曰綟猶繚也十八年京城第舎郊畿田園參半皆宦官矣史炤釋文曰參半間厠也余謂參者三也或三分之一或三分之二也半則中分而言之言有其半也通鑑二百一十四凡一條二十四年史窣于者與安祿山同里閈史炤釋文曰閈説文閭也汝南平輿里門曰閈余謂此亦史炤以廣韵為據也按漢高祖居沛與盧綰同里閈何特汝南平輿里門曰閈哉通鑑二百一十五凡四條天寳元年隴右節度使統臨洮河源白水安人振威威戎漠門寜塞積石鎮西十軍史炤釋文曰寕塞廓州軍後曰寕邊余按隴右所統十軍而獨釋寕塞一軍何也十軍註詳見通鑑正文下田同秀上言見𤣥元皇帝告以我藏靈符在尹喜故宅上遣使於故函谷關尹喜臺旁求得之史炤釋文曰崔浩云尹喜為散關令也盖老子嘗過尹喜故田同秀託言藏靈符於尹喜宅耳余按抱朴子云老子西遊遇關令尹喜於散關為喜著道德經一巻謂之老子其説與崔浩同又李尤函谷關銘云尹喜邀老子留作二篇則以喜為函谷關令括地志散關在岐州陳倉縣東南五十二里函谷關在陜州桃林縣西南十二里又岐州盩厔縣樓觀山有尹喜舊宅今為崇聖觀山脚有授經臺此亦以尹喜為散關令故有其遺蹟也但唐𤣥宗因田同秀之言求符於故函谷關尹喜臺旁則以尹喜為函谷關令矣史記言老子去周度關時周都洛函谷關為是二年崔成甫紅袹首史炤釋文曰袹普駕切通俗文帛三幅曰帕海陵本同余按袹首之袹莫百翻今人謂之抹額是也韓愈元和聖德詩以紅袹首若通俗文所謂帛三幅者謂帊也非袹首之袹四載褚誗戰死費本注曰誗直毅切余按誗直嚴翻費本誤通鑑二百一十六凡二條八載吐蕃多貯糧食積檑木及石史炤釋文曰檑盧回切余按此檑木即前卷礮應如雨之檑合音盧對翻史炤音釋前後不相照應類如此十載高尚雍奴人史炤釋文曰雍奴雍州縣名余按唐書地理志幽州有雍奴縣非雍州也通鑑二百一十七凡五條十四載賈循華原人也史炤釋文曰華原邑名屬耀州余按五代史梁開平初華原賊帥温韜聚衆據縣岐王李茂貞始以華原置耀州使韜鎮之此時未有耀州也新唐書地理志華原縣屬雍州開元元年以雍州為京兆府安祿山乗鐡轝史炤釋文曰轝羊茹切余謂此轝字即輿字今人多讀從平聲盖舁車之轝是人轝之則音羊茹切若乗轝則人乗車輿也讀當平聲二百二十五巻代宗大厯十四年乗轝誤同祿山歩騎散漫人莫知其數史炤釋文曰漫謨官切又莫半切余謂當從下音肅宗至德元載魯炅屯葉北以僃安祿山史炤釋文曰葉縣之北汝州也余按通鑑下文魯炅立柵於滍水之南未至汝州程千里出崞口討賊史炤釋文曰崞口在代州海陵本同余按舊唐崞口在相州西山在代州者崞縣非崞口也二百二十六巻德宗建中二年崞口注亦誤通鑑二百一十八凡五條同羅曳落河居五分之一史炤釋文曰安祿山所刼同羅兵號曳落河余按祿山養同羅奚契丹降者八千餘人號曳落河曳落河者胡言壯士也是時史思明等合兵五萬餘人而同羅曳落河居五分之一是同羅曳落河不下萬人矣祿山在洛方圗關輔所養曳落河八千餘人若以萬人付思明反浮於所養之數不應如此盖同羅者阿布思之部落也阿布思敗死其部落歸祿山祿山簡同羅之壯者與奚契丹之壯者養之通謂之曳落河其不預曳落河之養者尚多今遣助思明者同羅之兵及曳落河通有萬許人耳茇渉至此勞苦至矣史炤釋文曰茇草舎一曰草木根本亦作䟦余按茇草舎也鄭康成之説草行曰茇水行曰渉正應此義不當妄引草木根本以自雜其説太子至烏氏彭原太守李遵出迎海陵本釋文曰是年改烏氏曰保定余按烏氏漢縣故墟在彭原東南據舊唐書烏氏驛名新唐志保定縣本漢安定縣唐為涇州治所在彭原西一百二十里保定縣固是年更名然非烏氏之地太子至平凉閱監牧馬史炤釋文曰渭州有馬監余按唐之盛也秦蘭河渭涇原岐豳寕慶鄜坊延夏及河曲之地凡監四十有一豈特渭州有馬監哉時太子所閱者平凉之監牧平凉原州非渭州也賊勢大熾西脅汧隴史炤釋文曰汧水在安定余按前漢書地理志汧水出扶風汧縣西北又曰郁夷縣有汧水酈道元以為汧水即魚龍水唐書地理志隴州有汧源縣汧陽縣皆因汧水而名汧水不在安定通鑑二百一十九凡一條第五琦請以江淮租庸市輕貨泝江漢而上至洋川史炤釋文曰洋音祥漢戚夫人生於洋川高祖寵之名其川曰洋川以表誕生之休祥也費本同余按洋川漢時漢中成固之地劉蜀分成固立南鄉縣晉改為西鄉縣後魏廢縣於豐寕戍置豐寕縣尋於縣置洋州及洋川郡隋開皇初廢郡大業初廢州復為西鄉縣唐武德元年析梁州之西鄉黃金興勢置洋州天寳改洋州為洋川郡漢書言定陶戚姬不言生於洋川地理志止有成固縣不載洋川戚夫人生於洋川本之酈道元水經注道元好竒之過也通鑑二百二十凡三條至德二載史思明開井陘路史炤釋文曰井陘山在鎮州井陘縣余按唐穆宗諱恒始改恒州為鎮州𤣥宗改州為郡恒州曰常山郡肅宗改郡為州復曰恒州此時未有鎮州也乾元元年李嗣業在河内安慶緒渉沁水攻之史炤釋文曰沁水縣名屬澤州費本同余按唐書地理志沁水出沁州沁源縣東南出山而東流過河内縣北安慶緒自鄴攻河内須渉沁水而進兵此指河内之沁水非澤州之沁水縣也王仲昇斬党項酋長拓跋戎德史炤釋文曰拓䟦本代地元魏複姓余按元魏之拓䟦氏起於代北党項之拓䟦氏起於西陲宋朝之西夏党項拓䟦之後也寳元康定之間憑陵中國慢書狎至使其出於元魏亦必張大而言之而未嘗語及者非其所自出也唐書列傳党項以姓别為部一姓又分為小部落有細封氏費聽氏往利氏頗超氏野辭氏米禽氏拓跋氏而拓跋氏最强二百五十八巻昭宗大順元年注又誤通鑑二百二十一凡二條二年郭子儀等圍鄴城壅漳水灌之史炤釋文曰山海經曰漳水出荆山南注于沮水余按郭子儀壅鄴旁之漳水以灌城非出荆山之漳水九十七巻晉康帝建元二年趙王虎投王波父子之尸于漳水釋文之誤正與此同已辯於前矣二百六十巻昭宗光化三年漳水注復誤葢史炤讀書不多只據廣韵以釋通鑑又不能親師取友以求聞所未聞所以到底錯了孤陋自是者其戒之哉然余亦當自以此為戒也李光弼自將屯中潬城史炤釋文曰河南縣有中潬城余按河陽有三城以守河橋自晉杜預建橋於富平津此大河有橋之始也然未有城也後魏孝文自代遷都于洛又作河橋河側北岸有二城置北中郎府徙諸從𨽻府戸幷羽林虎賁領隊防之魏氏分為東西東魏得洛懼西人之侵軼雖徙洛人於鄴而河陽仍為橋以聨絡懷洛觀宇文與高氏交兵於邙洛之間則可見矣高敖曹之敗也叩河陽南城以閉關不内而死此時葢已有南城宇文泰縱火船欲焚河橋斛律金所以禦之者必於中流制之意此時亦必有中潬矣史思明入東京李光弼據河陽與之相持思明來攻三城皆受敵光弼自將屯中潬應接南北二城視其所急而赴之安史既平河朔藩鎮桀驁唐於此置河陽三城節度使遂為重鎮中潬城三城之一不在河南也宋白曰中潬城東魏所築通鑑二百二十二凡三條上元二年奴刺党項寇寳鷄史炤釋文曰渾奴刺也吐谷渾自稱曰渾主故以渾奴刺言之費本同余謂吐谷渾自是一種奴刺自是一種吐谷渾王舊自稱可汗未嘗自稱曰渾主史或以渾奴刺連言亦言渾與奴刺兩種耳太宗貞觀二十一年奴刺啜匍俟友内附此則奴刺别是一種之明證也代宗廣德元年田承嗣為魏愽德滄瀛五州都防禦使史炤釋文曰魏博藩鎮自田承嗣始傳五世至田𢎞正入朝十年復亂更四姓傳十世有州七曰貝魏博相磁洺衛余謂此通鑑書以魏博授田承嗣之始然此時命承嗣為魏博德滄瀛五州都防禦使未須以貝魏博相磁洺衛七州為注詳辯於二百六十六巻梁太祖開平元年明經則誦帖括以求僥倖史炤釋文曰謂為機括而誦之余按高宗之時以劉思立之言明經加試帖舉人乃總括經文以類聚之而誦習以應帖試謂之帖括括總括也非機括之謂通鑑二百二十三凡一條二年秋七月税天下青苗錢以給百官俸史炤釋文曰唐租庸調之法壞代宗始以畆定税而税以夏秋時以國用急不及秋苖方青即征之號青苖錢余按乾元以來天下用兵京司百僚俸錢減耗代宗即位推恩庻僚下議或以税畆有苖者公私咸濟乃分遣憲官税天下地青苗錢以充百司課料若定夏秋二税則德宗即位方行其法非代宗也史明書秋七月税天下青苗錢安得謂不及秋即征之乎通鑑二百二十四凡二條大厯五年元載請割郿虢寳鄠盩厔𨽻李抱玉史炤釋文曰郿虢並扶風縣名余謂史炤僅能引漢書地理志耳漢右扶風有郿虢二縣及晉省虢縣存郿縣後魏於虢縣地置武都郡西魏置洛邑縣後周置朔州州尋廢隋開皇初廢武都郡大業初改洛邑縣為虢縣後魏又於郿縣置平陽周城二縣西魏改平陽為郿城後周廢入周城縣隋開皇十八年改周城曰渭濱大業二年改曰郿縣扶風隋唐為岐州時為鳳翔府朕今親御禁旅史炤釋文曰旅衆也説文軍五百人為旅余謂禁旅直言禁兵耳不必拘五百人為説通鑑二百二十五凡一條十四年澤州刺史李鷃上慶雲圗詔曰卿雲靈芝怪草異木何益於人史炤釋文曰卿如字文選卿雲黼黻河漢謂司馬長卿揚子雲也後言瑞者以卿雲為慶雲皆取黼黻河漢之意海陵本費本同余謂史炤繆矣古者卿慶同音班固白雉詩永延長兮膺天慶叶韵音卿是也卿雲即慶雲晉天文志瑞雲一曰慶雲一曰景雲嘉氣太平之應也通鑑二百二十六凡五條沈既濟上選舉議曰責於侍郎則曰量書判資考而授之不保其往也史炤釋文以量書為句斷註曰尚書掌七品以上選侍郎掌八品以上選皆有銓量之書所以叙其資地而進退之也費本同余觀沈既濟之議其上文曰考校之法在書判簿歴言詞俯仰而巳是書判也非銓量之書也又曰量資積考非勞也是資考也非資地也唐擇人之法有四曰身言書判身取其體貌豐偉言取其言辭辯正書取其楷法遒美判取其文理優長資考者限年躡級謂之資課校殿最謂之考京畿觀察使崔寕史炤釋文曰天子千里地以逺近言之則言畿此指京師故謂之京畿余按古者王畿地方千里唐以長安為西京洛陽為東都有京畿都畿京畿觀察部京畿諸州謂雍岐同華商邠也德宗建中元年朝臣請赦劉文喜上皆不聽曰微孽不除何以令天下史炤釋文曰孽庻子也猶木之有孽生故以為諭余按史炤此亦本之廣韵然劉文喜豈唐之庻子哉凶孽妖孽皆孽也不專以庻子為義此言微孽猶凶孽之孽耳一百五十二巻梁武帝中大通二年魏高歡言嬖孽擅朝指鄭儼徐紇也炤之誤亦如此劉海賓言於上曰臣乃陛下藩邸部曲史炤釋文曰藩謂為藩屏者凡郡國朝宿之舎率名邸邸至也言所歸至也余謂炤説自通但初讀者未易遽曉且以此釋藩邸部曲四字其義猶欠明切唐人率稱諸王邸第為藩邸謂籓國邸第也此説較簡明寳應初上以雍王為天下兵馬元帥故劉海賓自謂藩邸部曲王國良遣使乞降猶疑未决史炤釋文曰猶餘救切玃屬其性多疑一説隴西人呼犬子曰猶好先行却住以俟其人遂曰猶豫猶疑亦猶豫之謂余以文埶觀之不過言王國良猶持疑而未决降計耳猶之為義尚也如左傳尚猶有臭其莠猶在賈誼所謂猶尚如此之猶不必引猶豫以釋猶疑也通鑑二百二十七凡三條二年南至江淮閩越史炤釋文曰閩越東南越余按此言閩謂七閩之地及百越之地耳若以漢書言之則閩越之地今福建路是也東越之地今温州是也南越之地今交廣是也豈得謂閩越為東南越乎一百六十七巻陳武帝永定元年注閩中亦誤辯己見前宣武節度使劉洽史炤釋文曰宣武節度使自劉𤣥佐始傳四世而滅有汴潁宋亳余按新唐書方鎮表建中元年分宋亳潁别為節度使尋號宣武節度使是時李勉以永平節度使鎮汴州其後陷於李希烈至興元元年劉洽破希烈復汴州始有汴宋潁亳四州尋徙宣武軍治汴州洽改名𤣥佐𤣥佐傳子士寕士寕為李萬榮所逐是劉氏在宣武僅二世也何嘗傳四世哉入敕使院擘裂殺之史炤釋文曰擘博厄切説文撝也余按此乃分擘之擘非撝也通鑑二百二十八凡三條四年外侵則汧渭為戎史炤釋文曰汧渭二氷出鳳翔府寳鷄縣余按二百一十八巻肅宗至德元載炤釋汧隴之汧已誤今又誤漢書地理志渭水出隴西首陽縣鳥䑕山而東流汧水出右扶風汧縣西北水經注汧水東流合于渭渭水又東逕陳倉縣唐改陳倉縣為寳鷄縣渭水則過寳鷄汧水不惟不出寳鷄且不至寳鷄矣陸䞇所謂外侵則汧渭為戎者謂吐蕃侵逼也汧水在唐隴州界渭水出唐渭州界代宗初吐蕃陷秦渭入大震關唐遂以隴州為極邊故曰汧渭為戎以李昌巙為京畿渭南節度使史炤釋文曰巙渠龜切海陵本同余按巙奴刀翻史炤鹵莽以其字旁從䕫遂自為音切也膠水蔣沇史炤釋文曰膠水在漢膠東縣一曰宻水唐時膠西為宻州余按水經膠水出黔陬縣膠山北過其縣西又北過夷安下宻膠東當利縣北入於海漢書地理志黔陬縣屬琅邪夷安縣屬高宻下宻縣屬膠東國無膠東縣當利縣屬東萊郡唐書地理志萊州有膠水縣萊州古東萊郡地膠水縣葢當膠水下流入海之地非宻州也通鑑二百二十九凡二條朱泚推雲梯載壯士攻城翼以轒輼史炤釋文曰説文淮揚名車隆穹為轒應劭曰轒輼匈奴車博雅以為柳車余按柳車非所以攻城應劭以轒輼為匈奴車者因漢書揚雄傳砰轒輼破穹廬而為之注也葢轒輼者攻城之車兵法曰修轒輼距闉者三月而後成謂攻城也轒輼不特匈奴有之中國亦有此車韓滉修塢壁起建業抵京峴樓堞相屬史炤釋文曰京峴山名京大也即琅邪大峴山費本同余按韓滉時鎮潤州修塢壁起建業抵京峴京峴山在潤州州治東五里琅邪之大峴山在沂州滉修塢壁自建業抵潤州之京峴山耳安能絶江越淮抵沂州之大峴山邪况此時陳少遊鎮淮南而沂州又李納廵屬也韓滉决不能跨據他鎮疆土而修塢壁盖滉以乘輿播遷欲阻江自守其治樓堞起昇抵潤皆自守規摹也通鑑二百三十凡二條興元元年專虛名而不副之以實則誕謾而人情不趨史炤釋文曰誕謾不經之稱余謂妄為大言曰誕欺語曰謾皆虚而不實之謂非不經之稱也張獻甫怒樊澤曰行軍乃敢自圗節鉞史炤釋文曰節以專殺斧鉞以專斷余按記王制諸侯賜鈇鉞然後殺是斧鉞以專殺也至於漢魏以下持節者亦得以專殺唐中世以後置諸鎮節度使建節樹六纛亦得以專殺故授節度使者謂之授旌節亦謂之授節鉞若曰節以專殺斧鉞以專斷恐字義不可如此區别自是之後炤屢拈出此二語葢自以為得而不知其失也通鑑二百三十一凡四條進退羈礙史炤釋文曰羈馬絡頭也礙謂羈所掛礙也余按羈者有所絆礙者有所止鐘虡不移史炤釋文曰虡音具余按經典釋文及諸字書虡音巨無音具者此又蜀人土音之訛貞元元年新州司馬盧杞遇赦移吉州長史陳京趙需等爭之不已上大怒左右辟易京顧曰趙需等勿退史炤釋文曰京姓也風俗通云鄭公子段封京城其後因為氏顧其名余按陳京趙需等爭盧杞移吉州長史事德宗大怒當時左右之臣皆辟開而易其故處陳京乃顧謂趙需等曰勿退此一段稍識文理者皆知京之為陳京顧之為回顧也史炤以京為姓顧為名大似不識文理彼豈真不識文理哉其病在於不詳觀通鑑上下文而輕為注釋至於板行其書以誑後學不知乃所以自彰其繆妄也以李泌為陜虢都防禦水陸運使泌宿曲沃將佐來迎史炤釋文曰曲沃縣名屬絳州余按此非絳州之曲沃也絳州之曲沃晉封桓叔者也春秋之時晉以曲沃為别都葢自桓叔至武公宗廟在焉其地在大河之東李泌自長安赴陜州無緣迂路度河至絳州之曲沃水經注云曹陽亭在𢎞農縣東十三里又東有曲沃城春秋時晉侯使詹嘉守桃林之塞處此以備秦時以曲沃之官守之故曲沃之名遂為積古之傳肅宗至德二載廣平王俶與郭子儀收西京安慶緒將張通儒等走保陜追至曲沃大破賊於新店遂入陜城此即李泌所宿之曲沃也絳州之曲沃人所共知陜州之曲沃人有不能知者矣吁地理之難言葢如此通鑑二百三十二凡二條陸䞇上奏曰以逆泚之偸居上國懷光之竊保中畿史炤釋文曰天子千里地以逺近言之則言畿當天下之中故謂之中畿余按陸贄所謂懷光竊保中畿謂懷光竊保河中也𤣥宗開元八年以河中為中都河東河西為次赤縣餘縣皆為次畿縣懷光據河中諸縣皆為所有故言中畿盖洛陽為東京則河南府諸縣為東畿長安為西京則京兆府諸縣為西畿河中府居兩京之中以為中都故謂之中畿也二年百姓至蒸鬰手足以避役史炤釋文曰蒸火氣上行也熨持火所以申繒也余按以火申繒固謂之熨然此言以火熨手足耳不必以申繒為釋通鑑釋文辯誤巻十
