body:
  text: 通鑑釋文辨誤編年類提要臣等謹案通鑑釋文辨誤十二卷宋胡三省撰通鑑釋文本南宋時蜀人史照所作馮時行為之序淺陋特甚時又有海陵所刋釋文稱司馬康本又蜀廣都費氏進修堂板行通鑑亦以注附之世號龍爪通鑑皆視史照本差略而實相蹈襲三省既自為通鑑音注復以司馬康釋文本出偽托而史照所作訛謬相傳恐其疑誤後學因作此書以刋正之每條皆先舉史照之誤而海陵本龍爪本與之同者則分注其下其已見於辨誤者音注中即不復著其説而如德宗紀韓旻出駱驛一條音注云史照謂駱谷關之驛余按韓旻若過駱谷之驛則已過奉天而西南矣其説非也此類隨文考正者亦不盡見於辨矣蓋二者本相輔而行故各有詳略以便互為考證其援據精核多足為讀史者啓發之助雖以照之不學無識固有顯然乖刺而毋庸繁稱博引以折之者然如所云音訓之學因文見義各有攸當不可滯於一隅又云晉唐齊梁陳之疆理不可以釋唐之疆理其言實足為千古著書準則固不獨為史照一人而設也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀通鑑釋文辨誤通鑑釋文行於世有史照本有公休本史照本馮時行為之序公休本刻於海陵郡齋前無序後無跋直置公休官位姓名於卷首而已又有成都府廣都縣費氏進修堂板行通鑑於正文下附注多本之史照間以己意附見世人以其有注遂謂之善本號曰龍爪通鑑要之海陵釋文龍爪注大同而小異皆蹈襲史照者也訛謬相傳而海陵本乃託之公休以欺世適所以誣玷公休此不容不辨也今觀海陵所刋公休釋以烏桓為烏元按宋朝欽宗諱桓靖康之時公休沒久矣安得豫為欽宗諱桓字邪又謂南北史無地理志是其止見李延壽南北史而不知外七史宋書魏書蕭齊書皆有志而隋書有五代志也溫公修通鑑公休為檢閲文字官安得不見諸書邪海陵釋文費氏注雖視史照釋文為差略至其同處則無一字異費氏蜀中鬻書之家固宜用照釋刋行若公休則在史照前數十年照書既不言祖述公休而公休書乃如剽竊史照者最是其書中多淺陋甚至于不考通鑑上下本文而妄為之説有不得其句者有不得其字者辨誤悉已疏之於前讀者詳之其真偽可見矣又有通鑑前例者浙東提舉常平茶鹽司板本乃公休之孫伋所編亦言欲與音釋並行于世此吾先人所疑今人所依以為信者考伋之所編溫公與范夢得論修書二帖則得於三衢學官學劉道原十一帖則得於髙文虎氏伋取以編於前例之後其網羅放失者僅如此蓋溫公之薨公休以毁卒通鑑之學其家幾於無傳矣汴京之破溫公之後曰朴者金人以其世而敬之盡徙其家而北後莫知其音問紹興兩國講和金使來問汝家復能用司馬溫公子孫否朝廷始訪溫公之後之在江南者得伋乃公之從曾孫也使奉公祀自是擢用伋欲昌其家學凡言書出於司馬公者必鋟梓而行之而不審其為時人傅會也容齋隨筆曰司馬季思知泉州刻溫公集有作中丞日彈王安石章尤可笑溫公治平四年解中丞還翰林而此章乃熙寧三年者季思為妄人所誤不能察耳季思伋字也以此證之則伋以音釋出於其先編前例欲與之並行亦為妄人所誤也今之時有寶應謝珏通鑑直音自燕板行而南又有廬陵郭仲山直音又有閩本直音直音者最害後學更未暇問其考據其書更不論四聲翻切各自以土音為之音率語轉而失其正音亦有因土音而失其本至於大相逺者不特語轉而已今辨誤為公休辨誣以公休本為海陵本龍爪本為費氏本先舉史照之誤二本與之同者則分注其下曰同然後辨其非而歸於是如直音之淺謬皆略而不録丁亥春二月辛亥天台胡三省身之父書
