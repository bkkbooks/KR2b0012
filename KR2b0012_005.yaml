body:
  text: 通鑑釋文辨誤卷五宋胡三省撰通鑑九十七凡二條康帝建元二年燕王皓伐宇文逸豆歸逸豆歸遣南羅大涉夜干將精兵逆戰史照釋文曰南羅夷狄國名其先本辰韓種地在髙麗東南居漠樂浪地海陵本同余按史照蓋以新羅國釋南羅也自辰韓種以下皆史家新羅傳之説如此則史文有地名一字之同者皆可引而為説乎史文固有若是者然必地里附近援據精確而後可也此所謂南羅者城名也在宇文國中是後慕容皓既克宇文改南羅城為威德城時趙王虎遣兵自甘松出救宇文比至宇文已亡因攻威德城不克而還甘松在濡源之東突門嶺之西則南羅城當在遼西屬國塞外若漢樂浪地在髙麗東南髙麗又在遼海之東去宇文國遠甚安得謂南羅居樂浪地乎趙王虎斬王波及其四子投尸漳水史照釋文曰山海經曰漳水出荆山南注于沮水海陵本同余按趙時都鄴此鄴之漳水漢書溝洫志所謂引漳水兮灌鄴旁者也上黨郡有二漳水濁漳水出長子縣鹿谷山清漳出沾縣大黽谷二水東流至鄴而合流山海經所謂漳水出荆山而注于沮水者今在襄陽南漳縣界左傳所謂江漢沮漳楚之望也者是也石虎在鄴安得逺投王波父子之尸於荆山之漳水乎史照釋漳水之誤非一處不暇縷數讀通鑑者參考辨誤當自知之通鑑九十八凡二條穆帝永和六年姚弋仲據灄頭史照釋文曰灄水在西陽海陵本同余按九十五卷成帝咸和八年姚弋仲降于石虎徙居清河之灄頭史照只據廣韻灄水在西陽遂引以為釋西陽固自有灄水然西陽今之黃州時為晉土讀史須考本末照更不能省記姚弋仲所居之灄頭在清河一時檢看廣韻便引以為注是未足以語通鑑也下卷下年灄頭注誤同燕伐趙命慕輿埿搓山通道史照釋文曰搓鉏加切邪斫木也又仕雅切海陵本同余按字書槎音鉏加切者水中浮木也搓音仕雅切者邪斫木也此搓山通道者謂斫木以通道也若從鉏加切非其義矣從仕雅切為是如此則邪斫木也四字當在仕雅切之下燕王雋使中部俟釐慕輿句督薊中留事史照釋文曰俟釐姓也余按史言中部俟釐慕輿句則慕輿其姓句其名俟釐蓋其官稱也亦猶部大之類通鑑九十九凡四條七年庫傉官偉帥衆自上黨奔燕史照釋文曰庫傉官代北三字姓余按庫傉官漁陽烏桓大人庫傉之餘種非出於代北也鮮卑既衰拓跋興于代北慕容宇文段國盛於遼西皆鮮卑部落各自為種史照無所據而強為之注妄矣丁零翟鼠帥所部降燕史照釋文曰丁零在康居北去胸奴庭接習水七千里余按照注乃是引漢時丁零國事通鑑九十四卷成帝咸和四年書云丁零翟斌世居康居後徙中國至是入朝于趙蓋其徙中國久矣翟鼠者翟斌之種類也八年太原薛瓉史照釋文曰瓉圭瓉也余按薛瓉者人姓名史照以圭瓉為釋是不為人名乎九年殷浩遷姚襄于梁國蠡臺史照釋文曰蠡音禮余按司馬彪郡國志睢陽縣有盧門亭城內有髙臺甚秀廣巍然介立超然獨上謂之蠡臺續述征記云回道如蠡故謂之蠡臺若如述征記之説蠡當音盧戈翻通鑑一百凡一條十一年涼王祚惡河州刺史張瓘之強遣張掖太守索孚代瓘守枹罕史照釋文以強遣張掖太守索孚為句注曰強其兩切下強人酒同余謂史照讀通鑑且不得其句况敢釋通鑑乎強當讀如字於此句斷下文強人酒自依其兩切通鑑一百一凡一條升平五年桓溫以弟豁督沔中七郡諸軍事史照釋文曰沔水名出武都東南入江余謂照但釋沔水未能釋沔中七郡也按魏興上庸新城襄陽新野義成竟陵七郡皆在沔水左右故曰沔中七郡通鑑一百二凡四條海西公太和四年郗超曰欲務持重則莫若頓兵河濟控引漕運史照釋文曰河濟水名出王屋山余按河濟殊源天下之所同知也而盡以為出王屋山固非矣河出積石濟出王屋以言河濟二水之發源可也若論郗超所謂頓兵之地則不可以發源之地言之也按河水過成臯縣北濟水自北來注之濟與河合流至敖山北而溢為滎澤東出于陶丘北又東至乘氏縣分為二南為荷水北為濟瀆濟瀆又東北合于河自滎陽石門以東碻磝以西今濟鄆曹濮滑汴諸州皆河濟之地燕王暐遣樂安王臧統諸軍拒桓溫史照釋文曰樂安鄱陽郡之邑也屬揚州燕之諸王遙領也余按晉魏以下封建諸侯王不惟不得君國子民亦不得食其國租如東海王越封東海而食毗陵之類是也慕容分封子弟亦倣晉制耳鄱陽在漢為縣屬豫章郡而豫章屬揚州孫吳分豫章立鄱陽郡又立樂安男國自晉氏南度以來鄱陽郡屬江州不屬揚州照説既非矣且後漢明帝改前漢之廣川國曰樂安和帝又改前漢千乘郡曰樂安郡是郡自晉汔于元魏屬青州燕何必取江南鄱陽之樂安以封其子弟邪溫使豫州刺史袁真攻譙梁開石門以通水運史照釋文曰譙梁地名在豫州余按譙梁謂譙郡及梁國也皆屬豫州照言地名在豫州將以譙梁為一處邪為兩處邪可謂語焉而不詳矣李𢎞李高反益州刺史周楚遣子瓊討高又使瓊子梓潼太守虓討𢎞皆平之史照釋文曰虓虎聲也余謂虓者周瓊之子何庸以虎聲為釋通鑑一百三凡一條孝武帝寧康元年梁州刺史楊亮遣其子廣襲仇池與秦梁州刺史楊安戰廣兵敗沮水諸戍皆奔潰史照釋文曰沮水名出漢中余按班志沮水出武都沮縣東狼谷中東流合為漢水闞駰曰以其初出沮洳然故曰沮水縣亦受名焉水經沮水出武都沮縣東狼谷中又東南徑沮水戍西而東南流注漢曰沮口以此言之沮水不出漢中也通鑑一百四凡一條太元五年秦王堅分三原九嵕武都汧雍氏十五萬户散居方鎮史照釋文曰謂汧雍之間氐羌也余按苻秦氐種也故分其種落散居方鎮欲以鎮服其境內若羌則姚秦種類也苻秦曷嘗分之使散居哉且舉汧雍而遺三原九嵕武都亦注書之失也通鑑一百五凡一條八年慕容垂自涼馬臺結草筏以渡史照釋文曰結草為舟也余謂上古朴略舟猶必刳木為之若結草為舟必至沈溺所謂筏者箄筏也編蘆葦可以為筏蘆葦草類也通鑑一百六凡三條十年慕容農慕容麟共攻翟真史照釋文曰翟徒歷切姓也余按上卷八年翟斌起兵赴燕王垂翟真者斌之兄子也照於翟斌之翟音直格切至翟真之翟乃徒歷切讀者將安所適從乎要之諸翟出於丁零丁零狄也狄與翟同從徒歷切為是氐啖青史照釋文曰啖青氐羌名徒濫切海陵本同余按氐自是氐羌自是羌二種也史明言氐啖青而謂之氐羌名繆矣韻書啖姓音徒覽翻徒濫切非後一百九卷安帝隆安元年照又以啖鐵為武都氐羌名其繆亦猶是也苻登刻鉾鎧為死休字史照釋文曰鉾劒端也海陵本同余按照釋以丁度集韻為據也但劒端以刺人非可刻字古人多以兜鍪為頭牟隋楊玄感反於黎陽取帆布為牟甲謂為頭牟與甲也後人因頭牟以鐵為之遂旁加金耳鉾鎧猶言牟甲也通鑑一百七凡一條十二年王穆衆潰單騎走騂馬令郭文斬首送之史照釋文曰騂馬赤黃色余謂馬赤黃色可以釋騂馬若以釋騂馬令則其義不通矣晉地理志酒泉郡有騂馬縣蓋晉魏間所置也王穆走至騂馬縣故縣令得斬送之通鑑一百八凡三條十九年燕主垂擊西燕標榜所趣軍各就頓史照釋文曰標榜猶相表襮余按燕主垂時分道進軍攻西燕故立標揭榜分示諸軍所趣之路非相表襮也一百三十二卷宋明帝泰始六年釋標榜亦誤西燕主永告急於魏魏主圭遣陳留公虔庾嶽帥騎五萬東度河屯秀容以救之史照釋文曰秀容本漢汾陽縣地後省之至元魏始置肆州秀容縣余按拓跋虔庾嶽所屯乃北秀容也在漢定襄郡界元魏置秀容郡秀容縣又立秀容護軍於汾水西北六十里徙北秀容胡人居之此南秀容也劉昫曰欣州秀容縣漢汾陽縣地隋自秀容移於此因更名皆謂南秀容項安世家説曰秀容縣劉元海所築城元海感神而生姿容秀美因以為名是亦因元海生於汾陽汾陽後改為秀容而為之説北秀容非元海所生之地而先有秀容之名則其説為不通矣秦王崇為梁王乾歸所逐楊定與崇共攻乾歸乾歸遣涼州牧軻彈秦州牧益州立義將軍詰歸拒之史照釋文曰軻音柯姓也余按軻彈益州詰歸皆姓乞伏通鑑下文載軻彈司馬翟瑥怒軻彈曰將軍以宗室居元帥之任則軻彈姓乞伏明矣軻讀如字音柯亦非通鑑一百九凡三條安帝隆安元年禿髮烏孤自稱西平王史照釋文曰秃髮烏孤河西鮮卑人呂光之將也余按秃髮氏世為部帥未嘗為呂光將特烏孤嘗受呂光爵命耳謂秃髮為河西鮮卑種可也曰河西鮮卑人則似以河西鮮卑為地名沮渠麴粥曰勒兵向西平出苕藋史照釋文曰藋徒栗切費本同余按字書藋徒弔翻至一百一十六卷安帝義熙二年照亦自知其誤矣魏襲中山慕容麟追至派水為魏所敗而還史照釋文曰派匹拜切派谷名在河東安邑費本同余按魏襲中山慕容麟追至派水當在中山界若河東安邑果有派谷非燕魏交兵之地也是年中山飢甚九月慕容麟出據新市魏主圭攻之麟退阻派水圭與戰於義臺大破之魏收魏書地形志中山郡新市縣有義臺城則派水在中山新市明矣派音攻乎翻通鑑一百一十凡二條二年燕主寶至乙連長上段速骨宋赤眉等作亂史照釋文曰長上人名海陵本同余謂衛兵更畨迭上長上者宿衛官名異於衆兵之迭上者也唐武散階有懷化執戟長上歸德執戟長上此則長上為官名之明證也楊軌西奔􅀈海史照釋文曰􅀈音未詳余按闞駰十三州志金城臨羌縣有卑和羌海酈道元曰古西零之地􅀈海其此地歟􅀈與零同音憐通鑑一百一十一凡二條三年張豁戍柳泉史照釋文作張詻呼各切海陵本同余按通鑑諸本及晉書皆作張豁字書詻音魚格切照音亦非四年西秦王乾歸遷都苑川史照釋文曰苑川邑即陳倉縣後魏改今名海陵本同余按乞伏氏始居麥田後居苑川又徙金城今復都苑川皆不出漢天水金城二郡界水經注苑川水出天水勇士縣之子城南山東北流歷子城川又北徑牧師苑漢牧苑之地也有東西二苑城相去七里西城即乞伏所都苑川水又北入于河陳倉之地此時屬姚秦固非乞伏所有姚秦與乞伏後皆并於赫連後魏滅赫連并有關隴之地後乃改陳倉為宛川縣陳倉之宛川與西秦所都之苑川字有宛苑之異而改陳倉為宛川又在百許年之後史照殆未之考也一百一十五卷安帝義熙六年又誤通鑑一百一十二凡二條五年河西王利鹿孤遣騎襲沮渠蒙遜執蒙遜從弟鄯善茍子史照釋文曰鄯善復姓其先西域人以國為姓茍子其名海陵本同余按通鑑本文明以鄯善茍子為蒙遜從弟凡讀通鑑者不俟博考已知鄯善之非姓矣是後沮渠鄯善復見於宋武帝永初二年釋文之誤愈不可掩桓玄縛元顯於舫前而數之史照釋文曰舫甫往切海陵本同余按舫甫妄翻照音誤通鑑一百一十三凡一條元興三年劉裕斬桓修修司馬刁𢎞帥文武佐吏來赴裕謂曰今日賊玄之首已當梟於大航矣史照釋文曰大航方舟也余按大航謂朱雀航也在建康朱雀門外秦淮水上通鑑一百一十四凡六條義熙元年秦主興命鳩摩羅什翻譯經論三百餘卷史照釋文曰翻譯翻覆而尋譯也余謂古之譯者傳四方之言此所謂翻譯者翻夷言為華言也尋繹之繹從糸不從言義亦不同殷仲文請治樂劉裕曰性所不解史照釋文曰解古介切曉也費本同余謂此亦蜀人土音之訛解曉之解音胡買翻三年楊盛遣軍臨濜口史照釋文曰濜水出襄陽費本同余按水經注濜水北發武都氐中南徑張魯城東又南過陽平關西而南入于沔謂之濜口有濜口城濜水在漢中不在襄陽史照蜀人也而不知濜水所在况四海疆域之廣乎魏主圭北巡至濡源史照釋文曰濡乃官切水出涿郡海陵本同余按史照以廣韻為據廣韻所謂濡水出涿郡又因漢書地理志涿郡故安下注云易水至范陽入濡為據然地理志自有二濡水人不詳考耳漢志所謂涿郡之濡水水經注云出故安縣西北窮獨山南谷東流至容城縣西北大利亭東南與易水合而注于巨馬水此一濡水也遼西郡肥如下注云玄水東入濡水濡水東入海陽水經云濡水從塞外來東南過遼西令支縣北又東南過海陽縣西南入于海海陽亦屬遼西郡此又一濡水也酈道元云濡水出禦夷鎮東南蓋此濡水發源於遼西塞外禦夷鎮東南也魏主圭北巡至濡源正此地四年乞伏熾盤築城於嵻㟍山而據之史照釋文曰嵻㟍山在西羌余按照説以丁度集韻為據也夷考當時乞伏氏據苑川其地西至枹罕東盡隴坁北限赫連南界吐谷渾嵻㟍山蓋在苑川西南宋朝西境止於秦渭故嵻㟍山在羌中丁度集韻以宋朝疆理為據也若引以注十六國地界則疏矣南燕河凍皆合而澠水不冰史照釋文曰澠彌兖切或作黽通作沔余謂此澠水乃淄澠之澠音神陵翻南燕都廣固澠水徑其城西河凍皆合而澠水不冰逼近都城故以為變異若音彌兖切者乃殽澠之澠時屬秦境安得為南燕之變異邪照又曰通作沔沔漢之沔安得與殽澠之澠通而沔漢亦非南燕境易大傳曰中心疑者其辭枝史照之謂矣一百二十卷宋文帝元嘉三年誤同通鑑一百一十五凡二條五年魏清河王紹凶狠無賴好劫剝行人以為樂史照釋文曰劫取也剝削也余謂照釋劫剝之義劫近是而剝全非劫強奪取之也剝謂裭剝行人衣服六年韓綽諫南燕主超曰正當努力自強以壯士民之心史照釋文曰努奴故切余謂努力之努音奴古翻蜀人以土音轉易四聲如此類者甚衆讀者審其是而已矣通鑑一百一十六凡三條七年盧循徑向交州李脫等結集俚獠以應循史照釋文曰俚南夷種名西南夷謂之獠余按南方有蠻有俚俚人惟交廣有之獠則蜀之西南徼外亦有之李勢之時獠自山出侵居漢地蜀始有獠太史公作西南夷傳其時未有獠也豈可言西南夷謂之獠哉况此乃交州之獠尤不可以為西南夷八年夏王勃勃欲攻熾盤王買德諫曰熾盤吾之與國史照釋文曰諸侯相許與者名曰與國余謂與國者相與相親之國非相許與也仇池公楊盛叛秦侵擾祁山史照釋文曰祁山在武都西羌中余謂漢武帝未開置武都郡則可言祁山在羌中既置郡則祁山為王土矣水經注祁山在嶓冢之西七十許里東北去上邽二百四十里杜佑曰祁山在今同谷郡長道縣東十里以為在西羌中可乎通鑑一百一十七凡三條十一年魏崔浩曰輕騎南下布濩林薄之間史照釋文曰濩胡郭切布濩地名在代北余謂崔浩言布濩林薄之間正祖司馬相如上林賦布濩太原語法郭璞注云布濩猶布露也毛晃曰布濩流散也濩音胡故翻史照音義俱非十二年西秦王熾盤攻秦洮陽公彭利和於漒川史照釋文曰洮陽零陵邑屬荆州余按漢書地理志零陵郡固有洮陽縣但此洮陽在隴西時屬姚秦地理志所謂洮水出西羌中東至隴西入河沙州記曰嵹城東北三百里有曾城城臨洮水漢章帝建初二年羌攻南部都尉於臨洮上遣馬防耿恭救之諸羌退聚洮陽即此城也洮水出嵹臺山徑吐谷渾中而東入塞嵹一作漒故其地亦謂之漒川亦謂之沙漒晉惠帝置洮陽縣屬狄道郡以其地在洮水之陽也即通鑑上下文而參觀前志則知此洮陽決非零陵邑矣是後一百二十卷宋文帝元嘉四年注則又曰洮陽地屬零陵諸羌之地也是但因通鑑本文有招慰洮陽諸羌之語故以為諸羌之地一百三十七卷齊武帝永明八年注則又曰洮陽零陵邑齊時為吐谷渾戍兵處是又但因通鑑本文有吐谷渾王伏連籌修泥和洮陽二城置戍之語又以為吐谷渾戍兵處終不悟零陵之為誤也沙門曇永使王華提衣襆自隨史照釋文曰襆博木切爾雅裳削幅謂之襆海陵本同余按爾雅所謂裳削幅者自是􅀈字非此襆字此襆字音房玉翻帊也所以包裹衣物魏舒襆被而出韓愈文所謂襆被入直皆此襆也照音義皆誤一百七十九卷隋文帝仁壽二年亦有此誤通鑑一百一十八凡四條十三年王鎮惡進軍澠池遣毛德祖襲尹雅於蠡吾城禽之史照釋文曰蠡吾縣之城在髙陽國屬冀州余按地志髙陽國固自有蠡吾縣但劉裕伐秦命王鎮惡自殽澠入關輔既進軍澠池遣毛德祖襲蠡吾城考其地里之逺近則此蠡吾城非高陽國之蠡吾縣明矣據晉書載記蠡吾城當在宜陽之西宋白續通典曰魏賈逵為澠池令理蠡城蠡城後魏初猶屬𢎞農西魏移澠池縣於今福昌縣西六十五里唐之福昌縣本宜陽縣蠡吾城蓋即蠡城也姚強姚難合兵屯涇上以拒鎮惡史照釋文曰涇水出安定涇陽开頭山余按史照釋止言涇水發源之地耳漢書地理志涇水東南至陽陵入渭姚強等所屯涇上其地當在漢京兆陽陵界十四年秦王熾盤以左丞相曇逹都督洮罕以東諸軍事史照釋文曰洮罕地名余按洮罕謂臨洮枹罕之地洮罕故是地名然臨洮枹罕各是一處恭帝元熙元年王康還洛陽保金墉城魏河內鎮將于栗磾遊騎在芒山上攻逼交至史照釋文曰應劭曰芒屬沛國芒縣之山也余謂照引應劭説以注漢高祖隱芒碭山澤間則可矣此時魏兵至芒山以逼金墉謂洛陽之北芒山也若魏兵在沛國芒縣之山安能逼金墉哉通鑑一百一十九凡六條宋武帝永初元年宋王留子義康為都督豫司雍並四州諸軍事史照釋文曰雍州名入南北系宋按南北史無地理志今用晉志郡邑相統屬處各於逐國土地合音釋者各分所系海陵本費本同余按宋武削平關洛隨失關中雍州仍東晉之舊還復僑治襄陽此時古雍州之域已屬赫連安得系宋耶照又言南北史無地理志用晉志各於逐國所有土地分系此鹵莽之説也南北國地理沈約宋書魏收魏書蕭子顯齊書各有地志梁陳北齊後周四朝地理則長孫無忌等集於隋書謂之五代志曷嘗無可考乎照之淺妄欲蓋而章又按此一節照以南北朝並立州郡各有分系蓋以此為通鑑中間大節目處海陵本及費氏本與照本無一字異費氏蜀中鬻書之家固宜用照釋刋行公休在照前數十年使照用公休之説則必拈出公休釋文以為依據今觀二家釋文照未嘗拈出公休而海陵板行公休本真是蹈襲史照以是知海陵本為好事者託公休以欺誤後人也涼公歆與沮渠蒙遜戰于蓼泉史照釋文曰蓼力竹切海陵本同余謂史無明音當讀如字二年謝晦賔客輻湊門巷填咽史照釋文曰咽音因塞也本作垔費本同余謂咽一結翻亦以咽塞不通為義遍考字書咽字無音因者三年魏長孫嵩實姓拔拔奚斤姓達奚穆觀姓丘穆陵丘堆姓丘敦史照釋文曰皆代北復姓即後魏拓跋氏也余按魏收魏書官氏志魏氏之先統國有九十九姓獻帝七分國人使兄弟各攝領之以兄為紇骨氏後改為胡氏次兄為普氏後改為周氏次兄為拔拔氏後改為長孫氏弟為逹奚氏後改為奚氏次弟為伊婁氏後改為伊氏次弟為丘敦氏後改為丘氏次弟為矦氏後改為亥氏此十氏皆拓跋同出也若丘穆陵氏則神元帝時餘部諸姓內入之一也非拓跋同出也且丘穆陵乃三字姓非復姓也獻帝鄰神元浩汾二帝皆追諡秦王熾盤徴秦州牧曇逹為左丞相史照釋文曰曇姓也余按晉安帝義熙八年熾盤以其弟曇逹鎮談郊則曇逹其名而姓乞伏安得姓曇乎營陽王景平元年禿髮傉檀之死也史照釋文曰秃髮烏孤以後魏元興元年僣號西平王及國滅其弟傉檀入魏賜姓元氏海陵本同余按通鑑烏孤稱西平王乃後魏皇始二年明年魏改元天興無元興年號晉安帝義熙十年秃髮氏為乞伏熾盤所併傉檀遂歸于熾盤傉檀之子賀奔魏魏主嗣愛賀之才謂曰卿之先與朕同源賜姓源氏蓋歸魏者傉檀之子非傉檀也賜姓源氏非元氏也傉檀為熾盤所鴆其死非命故其子欲為復讐通鑑書其死以先事照不能詳觀通鑑考其本末而謂傉檀入魏差繆甚矣通鑑釋文辨誤卷五
