body:
  text: 通鑑釋文辯誤卷七宋胡三省撰通鑑一百四十二凡二條東昏矦永元元年魏邀齊兵歸路陳顯逹引兵度水西人情沮恐史炤釋文曰沮將豫切沮䘮而恐愳也費同本余按沮䘮之沮音在呂翻從將豫切者乃沮洳之沮也史炤以沮止之沮沮䘮之沮讀為去聲者甚多不欲枚舉讀通鑑者自决擇可也顯逹之北伐軍入汮均口馮道根説顯逹曰汮均水迅急難進易退史炤釋文曰汮均皆水名余謂汮均一水也按水經注均水有三名均水發源𢎞農郡盧氏縣之熊耳山南逕順陽縣當渉都邑之北南入于沔地理志言熊耳之山㳙水出焉東南至順陽入于沔者也又曰順陽縣西有石山南臨汮水汮水又南流注于沔水謂之汮口又曰沔水自武當縣東南流逕渉都城東北均水入焉謂之均口則㳙汮均雖有三名實一水也孫愐曰汮水名出析縣北山入沔今作均葢汮均同音或曰汮口或曰均口後人遂連汮均二字言之謂為汮均口通鑑一百四十四凡三條和帝中興元年魏主召禧勰詳入見曰比纒尫疹苟延視息史炤釋文曰疹章忍切瘾疹也一曰唇瘍費本同余按字書瘾疹之疹章忍切尫疹之疹丑刃翻尫弱也疹疾也自言弱疾茍延視息若患瘾疹何至言茍延視息哉史炤釋疹字一百七十二卷陳宣帝太建八年二百三十六卷唐順宗永貞元年皆誤而三變其說各辯于後陳伯之收兵退保湖口留陳虎牙守湓城史炤釋文曰湓水之城在廬江尋陽余按漢書地理志尋陽固屬廬江郡然漢之尋陽在江北至晉以後尋陽在江南沈約宋志曰尋陽本縣名因水名縣水南注江二漢屬廬江吳立鄿春郡尋陽縣屬焉晉武帝太康元年省鄿春郡以尋陽屬武昌二年以武昌之尋陽復屬廬江郡是時尋陽縣猶在江北惠帝永興元年分廬江武昌立尋陽郡治江南之柴桑自時厥後江北尋陽之名移於江南而湓浦柴桑皆在尋陽郡管下史炤若言湓城在尋陽猶可言在廬江之尋陽則不可新亭城主江道林引兵出戰史炤釋文作道怵音敕律切謂之非誤可乎通鑑一百四十五凡一條梁武帝天監元年魏小峴戍主党灋宗襲大峴戍破之海陵本釋文曰小峴山名在襄陽大峴山名在琅邪陽都縣史炤釋一百二十八卷宋孝武帝孝建元年同余觀海陵本不從史炤之説以襄陽之峴山為小峴琅邪之大峴關為大峴自以為得其説矣殊不知自襄陽至琅邪㡬千百里豈輕兵掩襲之所能制勝乎况是時襄陽之峴山屬梁境琅邪之大峴關屬魏境党灋宗魏將也乃戌梁境之峴山而襲魏境之大峴關其説又為不通按小峴大峴在歴陽合肥之間小峴在合肥之東大峴又在小峴之東是後韋叡克小峴進攻合肥是小峴在合肥之東明矣宋孝武帝孝建元年魯爽自壽陽舉兵進屯大峴食少而退薛安都自歴陽進兵追及爽於小峴斬之是大峴在小峴之東又明矣二峴相去葢不甚逺也費本注曰党丁浪切余按党音底朗翻無從去聲者此亦蜀人土音之訛通鑑一百四十六凡三條二年魏邢巒表云在南之日曾立巴州鎮静夷獠史炤釋文曰西南夷謂之獠海陵本同余按史炤以獠為西南夷至是三矣已辯之於前今復申言之蜀主李勢之時獠始自山出從巴西至犍為梓潼布滿山谷李延壽北史曰獠盖南蠻之别種卭笮川洞之間散居山谷種類甚多略無氏族之别又無名字所生男女惟以長幼次第呼之二百四十五卷唐僖宗中和二年炤又以獠為戎夷别名是又略變前説而其誤終身不能改也五年魏涇州陳瞻亦聚衆稱王史炤釋文曰涇宣城邑余謂此魏所置涇州也按魏收地形志魏置涇州於安定臨涇城若宣城郡之涇縣則在江南屬梁非魏土也且通鑑書魏涇州而以梁宣城郡之涇縣為釋曾是可以欺後學乎將軍藍懷恭與魏邢巒戰于睢口敗績巒進圍宿豫史炤釋文曰睢水之口在元魏梁郡余按水經注睢水首受陳留蒗蕩渠東過梁國睢陽縣南又東過相縣故城南又東逕彭城之靈壁東又東逕睢陵縣故城北又東南逕下相縣故城南又東南流入于泗謂之睢口睢口不在梁郡也通鑑一百四十七凡五條七年馬仙琕籖求應赴史炤釋文曰籖郵籖海陵本同余按李延壽南史故事府州部論事皆籖前直叙所論之事後云謹籖月日下又云某官某籖馬仙琕籖求應赴正此籖也以為郵籖何所據乎魏邢巒乘勝長驅至懸瓠因度汝水圍其城史炤釋文曰汝水出上洛盧氏還歸山東入淮余按汝出盧氏過梁縣又東南過潁川郟縣又東南過定陵郾又東南過汝南上蔡縣西又東逕懸瓠城北汝水枝别左出西北流又屈西東轉又西南會汝形若懸瓠城因名焉故邢巒之兵度汝水而圍懸瓠史炤但能言汝水所出及所入處耳八年許懋議孫皓嘗遣董朝至陽羡禪國山史炤釋文曰陽羡㑹稽邑海陵本同余按陽羡縣前漢屬㑹稽郡後漢屬吳郡東晉以後屬義興郡又分陽羡為國山縣九年吳承伯反奄至吳興吏民恇擾史炤釋文作怇擾注曰音巨恐擾也海陵本同余按怇字乃恇字之誤也炤從而為之音釋繆矣字書亦無怇字恇音去王翻十年魏汾州山胡劉龍駒聚衆反史炤釋文曰汾水出太原晉陽山西南入河後魏置汾州余按汾水所出所經所入已辯於一百二十四卷宋文帝元嘉二十三年但史炤今之注較之前注愈誤汾水出太原汾陽北山非晉陽山也且魏太和十二年置汾州治蒲子城孝昌之亂淪陷又移治西河領西河吐京五城定陽等郡此時汾州猶治蒲子劉龍駒盖山胡種居汾州部内者也炤以汾水出入處釋汾州失之逺矣通鑑一百四十八凡一條十五年淮堰成或謂康絢鑿湬東注又縱反間於魏蕭寶寅信之鑿山深五丈開湬北注史炤釋文曰湬即由切水名或普焦切余按湬字惟丁度集韵有之無普焦切一音以通鑑本文觀之湬者溝瀆之類非水名也通鑑一百四十九凡一條普通二年琬琰殿火史炤釋文曰琬琰璧名余按周禮有琬圭琰圭鄭氏注曰琬猶圓也琰剡上如是則琬圭圜其上琰圭剡其上琬琰皆圭名非璧名然此以琬琰名殿耳而致辯於圭璧之間正以分别字義不得不爾通鑑一百五十凡五條五年魏凉州幢師于菩提等史炤釋文曰幢帥猶連率也余按禮記王制三十國為連連有率魏安能行古制哉柔然之法百人為幢幢有帥秀容人乞伏莫干聚衆攻郡殺太守南秀容牧子萬干乞眞反秀容酋長爾朱榮討平之史炤釋文曰秀容本漢汾陽縣地後省之至元魏置肆州秀容縣按史炤之誤余已辯之於一百八卷晉孝武帝太元十九年而爾朱居秀容之本末則未之及也按爾朱氏世居秀容川爾朱榮髙祖羽健從魏主珪攻燕主寶有功環其所居割地三百里以封之爾朱氏自此彊盛此北秀容也又有南秀容則漢汾陽縣地也魏置秀容郡及秀容䕶軍於此其地在汾水之北北秀容又在汾陽之北史家慮北秀容南秀容之無以别也故乞伏莫干則曰秀容人萬干乞眞則曰南秀容牧子此其分别甚明史炤不能詳考混而言之非深於通鑑者也魏郢州刺史裴詢與蠻酋西郢州刺史田朴特相表裏史炤釋文曰郢州名屬後魏余謂若如炤釋則凡欲注書以求自見於後世者豈不甚易按是時南北分王各有郢州魏置郢州於義陽梁郢州則治夏口六年崔延伯别造大盾内為鎻柱使壯士負而趨史炤釋文曰盾食尹切本作輴車轉者海陵本同余謂盾即干盾之盾所以捍鋒矢者輴者載柩之車音勑倫翻史炤繆矣邵陵王編問賣䱇者令吞䱇而死史炤釋文曰䱇七演切魚名皮可為鼔一曰蛇䱇黃質黒文海陵本同余按皮可為鼓者鼉也陸璣草木䟽云鼉似蜥蜴四足長丈餘甲如鎧皮堅厚宜冒鼓詩所云鼉鼔逢逢者盖鼉皮所冒之鼓也字書鼉字亦作鱓音徒何切既皮可冒鼓豈人所能吞哉曰蛇䱇者近之䱇亦作鱓音七演翻二字同而音異故炤釋莫知所决擇通鑑一百五十一凡二條七年魏安州三戍兵反杜洛周自松岍赴之史炤釋文曰岍苦堅切地名海陵本同余按岍字當讀與􅛜陘同音戸經翻唐志營州西北百里曰松陘􅊐魏安州治廣陽郡之方城縣唐檀州是也大通元年魏源子邕裴衍行至陽平漳水曲史炤釋文曰漳水在陽平東北山海經云漳水出荆山南注于沮水余按炤因通鑑本文知漳水在陽平東北而又引沮漳之漳水雜以為釋習之而不察甚矣魏文帝分魏郡置陽平郡治館陶通鑑一百五十二凡五條二年魏北道行臺楊津守定州城居鮮于脩禮杜洛周之間迭來攻圍史炤釋文提起間迭二字註云間居莧切代也厠也余按史炤之説則以間迭來攻圍為句殊不顧上句讀不成文其繆甚矣當以居鮮于脩禮杜洛周之間為一句迭來攻圍為一句間讀如字郡民續靈珍攻番城以應梁史炤釋文曰番蒲何切余按蕃縣漢屬魯國晉惠帝元康中廢屬彭城郡魏收地形志曰孝昌三年置蕃郡治蕃城元象二年併彭城武定五年復置蕃郡漢書音義番陽縣之番音蒲何翻魯國蕃縣之蕃音皮或云皮反字之誤反讀如字是時梁將王弁侵魏徐州蕃郡民續靈珍攻蕃城以應梁此蕃郡蕃城即漢魯國之蕃縣傳寫通鑑者番上缺艸遂為畨郡番城史炤又從而音蒲何切誤矣葛榮列陳數十里箕張而進史炤釋文曰箕張猶春秋魚麗之陳余按左傳魚麗之陳先偏後伍伍承彌縫箕張之陳與魚麗之陳固當不同列宿之象箕張翼舒箕四星下二星翕而相近上二星開張列陳前濶而後狹故曰箕張即今軍中言杷頭陳也葛榮至洛魏主御閶闔門引見史炤釋文曰閶闔天門也海陵本同余按閶闔門洛陽宮城門辯已見八十四巻晉惠帝太安元年史炤前説已誤此又以閶闔為天門宮城門固取天門以為名然徑以為天門則不可一百六十巻太清元年閶闔門注亦誤羊侃自瑕丘潰圍出魏境至渣口史炤釋文曰渣側加切水名出義陽一作溠海陵本同余按水經注偪陽有柤水南亂沂而注于沭謂之柤口柤音側加翻即此渣口也但字異耳杜預曰溠水出義陽厥縣西義陽唐之申州瑕丘唐之兖州治所偪陽在唐徐州界羊侃南奔自瑕丘至徐州之渣口道里甚徑若自兖州至申州道里甚逺觀者可以知所决擇矣通鑑一百五十三凡二條中大通元年魏楊昱據滎陽陳慶之攻之將士相帥蟻附而入史炤釋文曰蟻蚍蜉也附者謂其能屯聚也余謂蟻能附著木石墻壁而行縁而登高史言陳慶之將士縁滎陽城而登若蟻之附木石墻壁而登髙然非以蟻能屯聚為諭也初魏以梁益二州境土荒逺更立巴州以統諸獠又立隆城鎮史炤釋文曰巴春秋時巴地晉宋間為夷獠所居至後魏得其地立巴州余按漢書地理志巴郡十一縣皆春秋時巴國之地漢獻帝時劉焉劉璋父子分巴為三郡其後分置郡縣寖以益多自閬渝至于䕫涪皆巴地也未嘗盡為夷獠所居三國之時蜀都護李嚴嘗請以五郡為巴州諸葛亮不許至蕭齊卒置之蕭子顯齊志曰三峽險隘山蠻寇賊宋末置三巴校尉以鎮之既省復置齊高帝建元二年置巴州分巴東建平涪陵巴郡屬焉武帝永明元年省巴州故天監二年邢巒表魏主曰在南之日嘗立巴州鎮靜夷獠謂此也由此觀之巴州之立尚矣特廢置不常耳非魏立也通鑑一百五十四凡二條二年魏爾朱榮曰擁生蠻北填六鎮史炤釋文曰填讀曰鎮余謂此乃補填之填音停年翻言欲驅生蠻以補填六鎮叛亡之戶陳慶之引兵圍懸瓠破魏潁州刺史婁起等於溱水史炤釋文曰溱側詵切水名在河南余按此史炤據廣韻以為釋也廣韻所謂溱水在河南者以周宣王弟鄭桓公邑于新鄭而食溱洧新鄭縣漢屬河南郡故云然時陳慶之圍懸瓠懸瓠城在汝南安能北至新鄭之溱與婁起等戰也水經注溱水出汝南平輿縣浮石嶺北青衣山東南逕朗陵縣故城西東北逕宐春縣故城北又東北入于汝陳慶之破婁起等實於此水也通鑑一百五十六凡四條五年賀㧞勝遣軍攻馮翊安定沔陽鄼城皆㧞之於是沔北蕩為丘墟矣史炤釋文曰沔陽漢中邑余按漢中郡自漢以來固有沔陽縣然以歴代地志考之宋立馮翊安定等僑郡於沔北梁置沔陽郡於漢竟陵縣之地後周以為復州置鄼城郡於漢隂縣之地亦皆沔北北屬梁雍州刺史以通鑑下文觀之可以知矣漢中之沔陽縣屬梁州時梁州之地已為魏有史炤釋非魏主西奔至稠桑潼關大都督毛鴻賓迎獻酒食史炤釋文曰稠桑地名在滎陽西余按魏主自洛西奔至稠桑而毛鴻賓自潼關迎獻酒食則稠桑在洛陽之西潼關之東明矣恒農郡胡城縣有稠桑驛通鑑書魏主先至胡城而後至稠桑稠桑在胡城之西不在滎陽之西滎陽在洛陽東去稠桑逺矣一百八十四巻隋恭帝義寧元年竇琮等追及屈突通於稠桑炤釋亦誤但兩事有自東徂西自西徂東之異耳辯見于後賀㧞勝自南陽帥所部西赴關中至淅陽史炤釋文曰淅㫖熱切淅陽郡名淅水所出余按魏淅陽郡漢𢎞農郡析縣之地也有析水後魏置析陽郡魏收地形志只從漢書作析字隋書五代志乃作淅字宋朝鄧州淅川内鄉二縣即其地炤以為淅水所出是矣若音㫖熱切則浙字非淅字也魏孝武帝閨門無禮史炤釋文作闔門注云闔胡獵切閉也今按通鑑諸本皆作閨門下文書閨門無禮事甚詳史炤誤矣通鑑一百五十七凡三條大同三年東魏丞相歡遊汾陽之天池史炤釋文曰汾水之陽河東邑余按汾陽縣自漢至後魏皆屬太原郡魏自正光以後北邉盗起恒朔陷沒乃置秀容郡於漢汾陽縣地唐忻州之秀容縣是也若隋地理志太原郡之汾陽縣則漢之陽曲縣地漢之汾陽縣與隋之汾陽縣皆非河東邑而高歡所遊者乃秀容之汾陽也隋煬帝建汾陽宮即此地魏大都督宇文貴進據潁川東魏行臺任祥􅅲保宛陵史炤釋文曰宛陵宣城邑彭澤聚在西余按史炤參取漢書地理志及晉書地理志以為釋殊不知地理志漢河南郡又有苑陵縣晉屬滎陽郡後魏屬陳留郡天平以後屬廣武郡任祥所退保者也詳考諸志宣城之宛陵與任祥所保之苑陵字有苑宛之異傳寫者誤以苑為宛史炤遂誤釋為宣城之宛陵所謂差之毫釐繆以千里也魏行臺楊白駒與東魏陽州刺史段粲戰于蓼塢史炤釋文曰蓼即安豐之邑費本同余按漢書地理志蓼六二縣皆屬六安國蓼六春秋時猶為列國臯陶之後也俱為楚所滅晉地理志蓼縣始屬安豐郡然考魏收地形志此時東魏置陽州於宐陽西魏以楊白駒為行臺使之東略其交兵正在河潼間安得戰於安豐之蓼邑邪水經注蓼水出河北縣襄山蓼谷盖當時之人於此谷築塢因謂之蓼塢漢書音義曰襄山在潼關北十餘里通鑑一百五十八凡二條四年魏廣州守將駱超史炤釋文作駱越注曰駱姓也越其名余按駱越乃漢時南方蠻之種名此魏將也通鑑諸本皆作駱超參考通鑑前後所書亦超字為是炤於一百五十四巻中大通二年亦以為駱超九年宇文泰登邙山以襲高歡黎眀泰軍與歡軍遇史炤釋文曰黎音離黎猶比也謂比至天眀也海陵本同余按史記黎明之黎作邌説文曰邌徐也讀與黎同音力兮翻程大昌曰徐廣云黎猶比也將明之時也此説非也黎棃字通黎黒色也黒與明相雜欲曉未曉之交也猶曰昧爽也昧暗也爽明也亦明暗相雜也遲明即未及乎明也厥明質明則已曉也讀黎如離恐駭俗且當從説文音此音亦有黒義字書棃字亦有從力兮翻者通鑑一百五十九凡一條十一年柔然頭兵可汗使其弟秃突佳來送女且報聘史炤釋文以聘為娉注曰說文娉問也謂昏禮問名余按古禮有交聘之聘有聘女之聘說文始以聘女之聘為娉字與交聘之聘分為二字然古之聘字雖同而時聘之禮與聘女之禮異周禮時聘曰問以結諸侯之好又曰穀圭以聘女此聘字之同也春秋左氏傳宣九年孟獻子聘于周十年劉康公來報聘交聘之聘也文四年貴聘而賤逆君子是以知出姜之不允於魯七年穆伯又聘於莒莒人以聲已辭則為襄仲聘焉聘女之聘也聘字皆同而為禮則異凡讀經傳者居然可知也左傳書報聘之事非一柔然固不可以古禮律之然其使弟來送女則猶古人致女之禮也報聘則是報高歡之使聘亦古者列國來聘報聘之意史言且者謂送女且報聘也當是時高歡未嘗許以女女柔然何昏禮問名之有若問名不當言報娉字只當作聘字以交聘之聘為釋且者不專為一事并有餘事之謂通鑑一百六十凡二條太清元年荀濟知上有大志然負氣不服常謂人曰㑹於盾鼻上磨墨檄之史炤釋文曰矛盾之鼻也余按荀濟只言盾鼻史炤乃汎引矛為説以雜之盾之有鼻盖盾背有隆起處故謂之鼻記朱干設錫鄭𤣥注曰干盾也錫傅其背如龜也正義曰詩云鏤錫謂以金飾之用金琢傅其盾背盾背外高龜形亦外高故云如龜盖見漢禮然也或謂錫即盾鼻矛若有鼻當施於何所二年西豐公大春守石頭史炤釋文曰石頭在丹陽秣陵建業中孫權城之余按江左置丹陽尹秣陵建業二縣皆治京邑建業改為建康自避晉愍帝諱始當時二縣分治以秦淮水為界炤以為在秣陵建業中者抑以為在二縣中間邪既不能指定實處而其文質俚亦甚矣且漢建安中孫權築石頭城至此三百餘年通鑑書石頭事凡幾史炤於魏文帝黃初五年晉海西公太和五年釋已誤此釋又添一誤也張舜民曰石頭去臺城九里天生城壁在清凉寺北覆舟山上江行自北來者循石頭城轉入秦淮通鑑一百六十二凡二條李遷仕樊文皎帥鋭卒五千深入至菰首橋東史炤釋文曰菰首橋在淮地海陵本同余按淮者秦淮水也李遷仕等先將兵度淮攻東府前柵焚之矦景􅅲衆軍營于青溪之東遷仕又進至菰首橋東則此橋當在青溪上曰在淮地何邪御甘露厨有乾苔味酸鹹分給戰士史炤釋文曰苔蘚也海陵本同余謂苔生於海其形如髪春二三月海人採取之納土窖中出而曬之成片今南人多食之若苔蘚者生於階墻及陰濕之地安可食邪通鑑一百六十三凡二條簡文帝大寶元年陳霸先修崎頭古城徙居之史炤釋文曰崎頭城名在梁地余謂矦景雖專梁命未改江淮以南皆梁地崎頭為梁地一語不注可也按陳霸先自始興出兵度大庾嶺既破蔡路養於南野遂居崎頭古城崎頭之地今不可知必在南康郡界南康今贑州侯景遣侯瑱隨于慶徇蠡南諸郡史炤釋文曰蠡南地名蠡力兮切又力㡳切余謂蠡南諸郡指彭蠡湖以南諸郡如豫章廬陵安成臨川南康是也蠡音禮力兮切非通鑑一百六十四凡二條二年任約追胡僧祐及於芊口海陵本釋文作芋口芋羽俱切又王遇切地名余按芋字本芊字之誤姚思亷梁書曰芊口在南平郡安南縣界不能博考而妄為音切可乎芊音千元帝承聖元年侯子鑒以鵃􅀈千艘載戰士海陵本釋文曰鵃􅀈上止遥切又陟交切下力鳥切余按丁度集韵鵃丁了翻􅀈朗鳥翻類篇曰鵃􅀈船長貌海陵本音釋殊無所據通鑑一百六十五凡一條三年嚴超逹自秦郡進圍涇州費本注曰涇州盖以涇水為名余按五代志江都郡永福縣梁置涇州領涇城東陽二郡李延壽北史曰梁涇州在石梁此乃因涇城以名州非涇水也通鑑一百六十六凡三條敬帝紹泰元年齊平秦王歸彥譛清河王岳曰清河僣擬宮禁制為永巷史炤釋文曰永巷列宮名有長巷故名之也余按宮中長巷曰永巷自應劭已有此説未嘗以永巷為列宮名高歸彥譛高岳謂其私第僣擬宮中為永巷耳觀通鑑本文可見炤説之僻繆一百七十巻陳宣帝太建元年永巷史炤復有此繆說晉安民陳羽世為閩中豪姓史炤釋文曰閩中郡名即南越地余按閩中乃漢閩越地非南越地梁亦未嘗置閩中郡下巻陳武帝永定元年誤同太平元年魏以岐陽之地封安定世子覺為周公史炤釋文曰岐陽本元魏秦平郡至西魏改余按西魏改秦平郡為岐山郡未嘗改為岐陽魏以岐陽之地封宇文覺盖指岐山之陽漢雍郿二縣地後魏真君六年於漢郿縣地置周城縣岐山之下周自古公亶父至文王居之故謂之岐周拓䟦之縣名宇文之國號皆本諸此通鑑一百六十七凡五條陳武帝永定元年齊以長廣王湛為尚書令史炤釋文曰湛市林切又持林切丈減切余謂上兩音皆非也當從下音周晉公䕶與李植相質植辭窮史炤釋文曰質軄利切質當以為信余謂質軄日翻對靣相辨正為質禮記曲禮夫人之諱雖質君之前臣不諱也鄭注云質猶對也是質有對之義通鑑下文言李植辭窮可以知非質當之質也至一百七十三巻宣帝太建十年齊王憲與于智相質炤則曰質軄日切正也謂正自相當釋相質之義雖未為明切而亦知軄利切之為非矣置刪定郎治律令史炤釋文曰陳置此官以治律令余謂注書如此何所發明按曹魏之世置尚書曹二十三郎有定科郎劉宋置十九曹郎文帝元嘉十八年增置刪定曹郎盖魏世之定科郎也至于齊梁亦皆置之以刪定律令陳受梁禪政事皆由中書省置二十一局各當尚書諸曹摠國機要尚書惟聽受而已特置刪定郎以治律令帝裸裎為樂史炤釋文曰裎袒也古襌衣趙魏之間無袌者謂任余按朱氏孟子解裸裎露身也義甚簡明襌衣之説本之廣韵無袌謂任此語全不可曉或者任字其裎字之誤乎若服襌衣則非裸裎矣炤不過欲艱深其辭以㒺後學二年惶怖且悲不覺聲顫史炤釋文曰䡀注云㫖善切揺也通作顫余按通鑑釋文正作顫字當音之膳翻䡀音㫖善切者孫愐云裸形無可蔽也非聲顫之義通鑑釋文辯誤巻七
