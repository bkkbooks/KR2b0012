body:
  text: 通鑑釋文辯誤巻九宋胡三省撰通鑑一百八十八凡四條三年趙郡公孝恭撃蕭銑東平王闍提斬之史炤釋文曰闍辰遮切姓也余按古無闍姓闍提葢蕭銑之子姪而封王王世充自將戰兵左輔大將軍楊公卿帥左龍驤二十八府騎兵左遊撃大將軍郭善才帥内軍二十八府步兵右遊撃大將軍䟦野綱帥外軍二十八府步兵總三萬人以僃唐史炤釋文曰左右龍驤左右遊擊分騎兵歩兵各有府皆隋之制王世充因之余按隋志無龍驤遊擊分騎歩兵之制有府兵而已史炤以意妄為之説七月世充洧州長史張公謹與刺史崔樞以州城來降史炤釋文曰洧州本尉氏縣王世充始置尉州武德四年以尉氏扶溝􅋣陵置洧州余按炤釋以新志尉氏縣注為據而不考州縣之建置離合其歲月有先後也通鑑是年九月書世充尉州刺史時德叡帥所部杞夏陳隋許潁蔚七州來降炤又注曰尉州本尉氏縣王世充置武德三年時德叡以州來降秦王改為南汴州復改為洧州貞觀元年廢屬汴州若如炤説則王世充於尉氏縣置洧尉二州也殊不知五代史眀言隋置洧州於潁川之􅋣陵縣大業初廢盖王世充復置洧州於􅋣陵縣置尉州於尉氏縣是年崔樞時德叡既降唐明年唐乃以尉氏扶溝􅋣陵置洧州也以高開道為蔚州總管史炤釋文曰蔚州本鴈門郡又隋上谷郡飛狐縣也唐初沒突厥武德六年置余按蔚州本雁門郡之靈丘上谷郡之飛狐縣地東魏置靈丘郡後周置尉州隋廢郡及州以靈丘縣屬雁門郡唐為蔚州安邊郡後改興唐郡史炤於雁門郡下逸之靈丘三字失之逺矣通鑑一百八十九凡六條四年以靺鞨渠帥突地稽為燕州總管史炤釋文曰燕州本靈壽縣隋置在唐廢焉屬鎮州海陵本同余按舊唐書地理志義寕元年置燕州於靈壽縣是年廢州復為靈壽縣屬恒州至穆宗諱恒始改恒州為鎮州此燕州隋於營州之境汝羅故城置遼西郡以處粟末靺鞨唐遂於其地置燕州以其渠帥為總管非靈壽之燕州也王世充平州刺史周仲隱以城來降史炤釋文曰平州本當陽縣王世充置武德六年更名玉州八年州廢屬江陵郡余按當陽之平州本後周置隋廢之矣武德四年置平州於當陽因是年既平蕭銑而復置當陽乃蕭銑之地王世充安得而置平州竊意王世充置平州於洛州河隂縣河隂古平隂也葢於此置平州秦王世民被黄金甲齊王元吉等二十五將隨其後前後部鼔吹史炤釋文曰凡鼔吹總八音言之余觀史炤釋鼔吹多以為音律壎篪之樂今又曰總八音言之是皆未知鼔吹之所從始也蔡邕曰鼔吹軍樂也黄帝岐伯所作以揚德建武勸士諷敵也後世謂之短簫鐃歌應劭漢鹵簿圗惟有騎執箛箛即笳不云鼔吹而漢世有黄門鼔吹漢享宴食舉樂十三曲與魏世鼔吹長簫同長簫短簫伎錄並云絲竹合作執節者歌又建初錄云務成黄爵𤣥雲逺期皆騎吹曲非鼔吹曲此則列於殿庭者為鼔吹從行鼔吹為騎吹二曲異也又孫權觀魏武軍作鼔吹而還漢世萬人將軍給鼔吹魏晋世假將帥牙門曲葢鼔吹唐宋以來天子郊祀竣事還宮鼔吹振作則是鼔吹之樂國容軍容皆用之俘王世充竇建德獻于太廟行飲至之禮以饗之海陵本釋文曰飲於禁切余按左傳三年而治兵出而振旅歸而飲至以數軍實杜預注曰飲於廟以數車徒器械及所獲也陸德明無音飲當讀如字褒州道安撫使郭行方攻蕭銑鄀州㧞之史炤釋文曰褒州本西縣武德三年置八年州廢屬興元余按褒州置於漢中蕭銑時據江陵唐置安撫使所以招撫銑衆必不置於漢中盖道里相去逺也時平王世充方得襄州必置安撫使於襄州既以安撫新民又以招撫銑衆下書攻㧞鄀州鄀州本樂鄉縣地貞觀八年廢鄀州以樂鄉屬襄州郭行方自襄州進攻鄀州道里便近褒當作襄又德宗朝方改梁州為興元府此時未應以西縣屬興元為言亦一誤也徐圎朗昌州治中劉善行以須昌來降史炤釋文曰昌州本蒲縣武德二年置貞觀元年州廢𨽻隰州費本同余謂此時徐圎朗據兖鄆自以須昌縣置昌州耳蒲縣之昌州逺在汾隰徐圎朗安能越關河而有此土邪通鑑一百九十凡九條五年俚帥楊世畧以循潮二州降史炤釋文曰俚南夷之酋費本同余按南夷曰蠻曰俚曰蜑各是一種酋字但可解帥字耳二月戊寅汴州摠管王要漢攻徐圎朗杞州㧞之史炤釋文曰本北海縣始因營丘人拒賊權置杞州時汴州雍丘縣亦置杞州非此費本同余按新唐書地理志北海之杞州武德二年已復為營丘縣而雍丘之杞州與汴州接壤未經省併王要漢所攻㧞者正北杞州乃以為非何邪遷州人鄧士政執刺史李敬昂以反史炤釋文曰按志闕此州費本同余按隋唐書地理志西魏以房陵置遷州以秦漢以來諸侯王以罪廢者多遷房陵故以名州隋大業初改曰房州唐武德初復曰遷州志未嘗闕此州也高開道寇蠡州史炤釋文曰蠡落戈切武德五年以蒲州博野縣置蠡州余按新唐書地理志武德五年以瀛州之博野清苑定州之義豐置蠡州盖因漢蠡吾亭以名州金人亦於博野縣置蠡州北至燕京四百九十里蠡音禮落戈切非蒲州當作瀛州觀州刺史劉㑹以城叛附黒闥史炤釋文曰觀州本九門縣隋置九門郡武德元年曰觀州五年廢屬鎮州時觀州有二其一在弓高縣非此費本同余按新唐書地理志武德四年置觀州於弓高而九門之觀州廢於五年劉㑹叛在是年十月葢弓高之觀州為是南州刺史龎孝恭史炤釋文曰南州屬劒南道羈縻州武德二年開南蠻置二年更名僰州四年復故名費本同余按新唐書地理志武德四年以合浦郡之合浦南昌二縣置南州通鑑下文書南越州寗道明高州首領馮暄俱反南越州今之廉州高州今猶如故則三州相挻而反皆在嶺南道此所謂南州乃合浦之南州非劒南道之羈縻州明矣高開道引奚騎寇幽州費氏本以奚為突注云突東胡别種突騎者突國騎兵也余徧考通鑑諸本皆作奚騎且東胡别種未嘗有突國奚正東胡種也其先曰庫真奚亦曰庫莫奚八月甲辰突厥寇真州又寇馬邑史炤釋文曰按志真州有三武德五年置真州曰南縣置積州及前真州貞觀元年改積州為後真州後皆廢唐劒南道復有真州今突厥所寇乃河東道然河東無此州志又不載疑字誤費本同余按史炤所謂真州有三前真州置於九真移風縣後真州則是年置積州於日南縣九年改南陵州貞觀九年始改後真州劒南之真州則天寳五載方分臨翼郡置以新唐書地理志考之此時止有九真移風之真州亦非同時有三真州也史炤但見通鑑於此時書突厥寇真州又寇馬邑以為所寇乃河東道考之於志而河東道無真州遂疑字誤余詳考舊唐書地理志武德二年置綏州總管府營雲銀真等十一州此真州盖置於銀州真鄉縣且通鑑上文書癸未突厥寇原州乙酉寇朔州原州屬關内道朔州屬河東道突厥入寇之兵分為兩道八月甲辰寇真州者西路兵也寇馬邑者東路兵也史炤於河東道求真州所以失之愈逺周法明登戰船飲酒張善安遣刺客數人詐乗漁艓而至遂殺法明而去史炤釋文曰漁漁獵也余謂捕魚者為漁捕獸者為獵漁自是漁獵自是獵三尺童子能分别其義史炤之識不若童子鹵莽甚矣通鑑一百九十一凡二條八年突厥寇藺州史炤釋文曰按突厥寇鄯岷等州併寇蘭州皆隴右道而隴右無藺州藺字疑作蘭余按史炤疑藺州之當作蘭州是也但詳考通鑑突厥寇藺州在九月至十月戊寅乃始寇鄯州無寇岷州事其所援據不無少差耳突厥寇彭州史炤釋文曰彭州屬羈縻州本洪州貞觀三年置屬隴右道按寕州彭原及劒南道復有兩彭州皆非此費本同余按隴右道之羈縻彭州本洪州貞觀三年置七年方改彭州則此時隴右羈縻州未有彭州也劒南道之彭州武后垂拱二年方分益州置此二彭州皆非突厥所寇者也若寕州彭原縣之彭州乃武德元年置治合川縣唐都關中邠寕突厥兵衝也此時突厥正寇寕州彭原之彭州炤乃以為非可謂擇焉不精矣通鑑一百九十二凡二條九年韓州刺史封同人詐乗驛馬入朝史炤釋文曰武德元年析潞州襄垣等縣置韓州貞觀十七年州廢仍屬潞州又同州韓城縣置西韓州非此費本同余謂襄垣之韓州去長安太逺封同人葢自韓城入朝太宗貞觀元年吏部侍郎觀城劉林甫史炤釋文曰觀城屬開德府費本同余按觀縣漢屬東郡光武改曰衛縣晉魏屬頓丘郡曰衛國縣隋開皇六年改曰觀城縣屬魏州唐武德四年分屬澶州是年廢澶州縣還故屬代宗大厯七年復置澶州至宋始以澶州為開德府此時澶州已廢亦未有開德府也通鑑一百九十三凡二條三年房𤣥齡不以己長格物史炤釋文曰捍挌於物無所容受也費本同余謂格正也以己所能正人欲人人皆然謂之格非捍挌之挌也格字從木捍挌之挌從手六十巻漢獻帝初平二年邴原清議以格物與此同義史炤以為廢格之格亦非辯已在前上謂侍臣曰李大亮可謂忠直賜以胡缾及荀悦漢紀史炤釋文曰胡缾汲水器余謂史炤但以廣韵為據易井卦羸其缾左傳孫蒯飲馬於重丘毁其缾是皆謂汲器也戰國秦趙澠池之㑹藺相如曰請奏盆缾秦李斯上秦王書曰撃甕叩缾則缾者罌缶之類不特施之汲水且以為樂矣至唐人如楊惠元缾甖不發如韓愈詩無計離瓶罌則缾者以盛酒盛物不復以汲水器為缾矣唐太宗賜李大亮胡缾盖酒器也非汲水器也今北人酌酒以相勸酧者亦曰胡缾未識其規制與太宗之胡缾合乎否也缾瓶字通通鑑一百九十四凡一條十一年王珪令公主執笲行盥饋之禮史炤釋文作笄注曰笄堅奚切簮也費本同余按此非笄字乃笲字陸德明經典釋文曰笲音煩一音皮彥翻器名以葦若竹為之其形如筥衣之以青繒以盛棗栗腵脩之屬士昏禮曰舅坐于阼階西面姑坐于房外南面婦執笲棗栗進東面拜奠于舅席訖婦又執腵脩升進北面拜奠于姑席盥饋者士昏禮曰婦盥饋特豚合升側載鄭氏注曰側載者右胖載之舅爼左胖載之姑爼異尊卑舅姑共席于奥其饌各以南為上王珪正令公主行婦禮史炤以為執笄義何所據通鑑一百九十五凡二條十四年陳倉折衝都尉魯寧自恃髙班慢罵陳倉尉史炤釋文曰班給也余謂班字固有給義然此班以班列為義晉行人子朱曰班爵同何以黜朱於朝梁武帝分百二十號將軍為二十四班皆班列之班也唐制上府折衝都尉正四品上中府從四品下下府正五品下五品以上皆為高班尚書左丞韋悰句司農木橦價貴於民間史炤釋文曰橦徒紅切木名花可為布出字書海陵本費本同余按橦諸容翻木一截也唐式柴長三尺五寸為一橦通鑑一百九十六凡八條十五年突厥侯利苾可汗史炤釋文作俟利苾注曰俟渠之切余按諸本通鑑及新舊唐書皆作侯利苾百濟來告其王扶餘璋之䘮史炤釋文曰百濟西域國本扶餘别種余按百濟東夷國名其先以百家濟海種類寖盛遂以為國號炤既言百濟為扶餘之種亦必知扶餘之為東夷矣乃以百濟為西域國何自為乖越也大度設自赤柯濼北走史炤釋文曰濼音歴海陵本同余按濼音匹各翻今自江淮以北率謂積水為濼音歴者艸名也一名貫衆見本草西突厥乙毗陸可汗西擊康居道過米國破之史炤釋文曰米國唐國枝庻王者余謂唐當作康此字因傳寫而誤也新唐書曰康國古康居也枝庻分王曰安曰曹曰石曰米曰何曰火尋曰戊地曰史十七年魏徵薨命百官九品以上皆起䘮給羽葆鼔吹陪葬昭陵史炤釋文曰羽葆天子華盖天子之儀衛也又唐制鼔吹五部一鼔吹二羽葆羽葆部有十八曲鼔吹音律管壎之樂余按孔頴逹正義曰羽葆者以鳥羽注於柄頭章懷太子賢曰葆以五采羽合聚為之鼔吹非音律管壎之樂辯己見前樂則有曲羽葆儀飾也安得有所謂十八曲此皆史炤無所根據而妄為之説又通鑑下文載徵妻裴氏之言曰徵平生儉素今葬以一品羽儀非亡者之志則知給以羽葆非天子之儀衛也壯士昝君譽梁猛彪史炤釋文曰猛彪虎文余按梁猛彪者人姓名奚庸以虎文為釋太子承乾嘗謂左右曰我試作可汗死因僵卧於地史炤釋文作僵仆注曰仆芳遇切余按諸本通鑑皆作僵臥作仆非良乆太子欻起史炤釋文曰欻起有所吹起余謂欻忽也太子初焉僵臥於地良乆忽然而起耳豈有所吹而起哉炤之踈僻如此通鑑一百九十七凡三條十七年往返萬里道涉沙磧無水草史炤釋文曰沙磧水渚有石者余按此沙蹟所謂沙漠大磧也既無水草又安得有水渚哉薛延陀本一俟斤史炤釋文曰北虜謂大臣曰俟斤余謂俟斤者突厥鐵勒諸部酋帥之稱褚遂良上疏曰龍沙以北部落無算史炤釋文曰廣志流沙在玉門關外有三名三龍沙海陵本同余謂龍沙即指言沙漠也自漢以來匈奴單于所居謂之龍庭隨水艸遷徙無常處故因謂沙幕為龍沙此即隂山之外大漠西盡居延東極遼海者也玉門關外之流沙介在西垂非褚遂良所指之龍沙邪律德光之死而北歸也趙延壽謂人曰我不復入龍沙矣亦謂沙漠通鑑一百九十八凡四條十九年上自繋薪於馬鞘以助役史炤釋文曰鞘仙妙切馬上刀劒室也海陵本費本同余謂鞘音所交翻鞭鞘也刀劒室安可以繋薪乎上從飛騎三千人馳入臨渝關史炤釋文曰渝容朱切臨渝關本曰臨閭關在平州石城縣余按漢書地理志北平郡有石城縣遼西郡有臨渝縣注云渝水首受白狼東入塞水經注云白狼水逕黃龍城西又東北出東流為二水右水疑即渝水也西南廵山逕一故城西以為河連城疑是臨渝縣之故城新唐書地理志營州城西四百八十里有渝關守捉五代史云幽州北七百里有渝關下有渝水通海循海有道狹處纔數尺是所謂臨渝關也宋白續通典曰漢石城舊縣取碣石立如城以名之唐貞觀十五年於故臨渝縣城置臨渝縣萬歲通天二年改為石城臨渝在石城猶有足徵所謂臨渝者以臨渝水而名若曰臨閭殊無所據漢書音義渝音喩今讀如字二十年上嘗幸未央宮辟仗已過史炤釋文曰辟匹亦切執兵仗以辟行人海陵本同余謂炤釋義是而音非辟讀為闢若匹亦切則讀如僻矣二十一年高士廉遺言不欲以北首夷衾輒屈車駕史炤釋文曰禮記自小斂以往用夷衾夷衾質殺之裁猶冒也注云冐所以韜尸重形者也小斂又覆以夷衾製如冒耳大夫𤣥冒黼殺余按䘮大記君錦冒黼殺綴旁七大夫𤣥冒黼殺綴旁五凡冒質長與手齊殺三尺自小斂以往用夷衾夷衾質殺之裁猶冒也鄭𤣥注云冒者既襲所以韜尸重形也殺冒之下帬韜足上行者也小斂又覆以夷衾裁猶制也孔頴逹正義曰冒謂襲後小斂前所用以韜尸也冒有質殺者作兩囊每輒横縫合一頭又縫連一邊餘一邊不縫兩囊皆然也上者曰質下者曰殺故鄭注士䘮禮云冒韜尸者制如直嚢上曰質下曰殺質正也其用之先以殺韜足而上後以質韜首而下綴旁七者上下安七帶綴以結之故云綴旁七也大夫綴旁五及𤣥冒者尊卑之差也凡冒質長與手齊言冒之質從頭韜來至下長短與手齊也殺三尺者殺從足韜上長三尺自小斂以往用夷衾者往猶後也小斂前有冒故不用夷衾自小斂後衣多不可用冒故用夷衾覆之也士䘮禮云幠用夷衾覆尸柩之衾也夷衾質殺之裁猶冒也者裁猶制也言夷衾所用上齊於手下二尺所用繒色及長短制度如冒之質殺但不復為囊及旁綴也然始死幠用斂衾是大斂之衾自小斂以前覆之至小斂時君錦衾大夫縞衾用之小斂斂訖别制夷衾以覆之其小斂以前所用大斂之衾停而不用至將大斂及陳衣又更制一衾主用大斂也所謂大斂二衾者其夷衾至大斂時所用無文當應總入大斂衣内併斂之也合注䟽而觀之則夷衾上質下殺之制如冒而不為囊及旁綴固與冒有不同者通鑑一百九十九凡一條高宗永徽元年有司以為服既公除欲以今秋成昏史炤釋文曰公除從吉也王氏音訓謂已成服除之以從公家之事不待終制也余謂公除即漢文帝三十七日釋服之遺制曰公除者以天下為公外雖除服以臨政而親親之思結於内猶終三年之慕公則除服私則未之除也通鑑二百凡二條六年徙居蓬萊宫史炤釋文曰蓬萊宮在京城東北余按唐都長安外城謂之京城次城謂之皇城内城謂之宮城蓬萊宮在宮城内直東北角不在京城東北蓬萊宮後更名含元宮又曰大明宮大明宮曰東内太極宮曰西内皆在宮城中龍朔元年新羅王春秋遣其將金欽將兵至古泗史炤釋文曰説文泗受濟水東入淮余謂古泗地名在百濟國中非中國之泗水不可妄引以為釋然其言中國之泗受濟水亦只説湖陸以南之泗水以其於古泗不相渉故不復辯通鑑二百一凡二條麟德元年州縣每發百姓為兵其壯而富者行錢參逐皆亡匿得免史炤釋文曰參倉含切參互余謂參逐者參逐之人也州縣發人為兵守令不能家至而人發之必有參逐之人以為用參者參預其事者也今之吏典逐者隨逐其後者也今之親隨壯富之人行錢於參逐之人以求免為兵參逐之人既受其賂掩覆而縱之使得亡匿也唐人常語有言參隨者猶參逐也勲官挽引勞苦與白丁無殊史炤釋文曰民男女年十八以上為丁丁從徭役余按唐制民丁從征役得勲級者為勲官無勲級者為白丁且男年十八以上為丁女曷嘗為丁哉通鑑二百二凡二條咸亨三年王及善曰擲倒自有伶官費本注曰伶爐斤切説文弄也余按字書伶郎丁翻無從爐斤切者炤釋用説文而音切則妄自為之四年八品九品並鍮石帶史炤釋文曰鍮容朱切余按鍮石似金今人多以藥物鍊銅為鍮者音託侯翻宋時八品九品官猶鍮石帶史炤仕宋至京官不知有鍮石帶而妄為之音何耶通鑑二百三凡三條永淳元年魏元忠閱視赤縣獄史炤釋文曰中國名曰赤縣神州費本同余按史炤引騶衍之説衍之説先列中國名山大川通谷禽獸水土所殖物類所珍因而推之及海外人之所不能睹以為儒者所謂中國者於天下乃八十一分居其一分耳中國名曰赤縣神州神州自有九州禹之序九州是也不得為州數中國外如神州赤縣者九乃所謂九州也於是有稗海環之人民禽獸莫能相通者如一區中乃為一州如此者九乃有大瀛海環其外天地之際焉史炤引此以釋赤縣則唐之十道乃禹迹之九州是魏元忠悉閱唐十道獄也其説闊逺而不切於事情盖唐之西京以長安萬年為赤縣東都以河南洛陽為赤縣魏元忠所閱者長安萬年兩赤縣獄耳𢎞道元年突厥寇蔚州豐州都督崔智辨邀之於朝那山北兵敗為虜所擒史炤釋文曰朝直遥切那奴多切余按丁度集韵朝那之朝音與邾同音追輸翻二百九巻中宗景龍二年朝那山音亦誤則天垂拱元年樂城文獻公劉仁軌薨史炤釋文曰劉仁軌汴州尉氏人仁軌子及兄子授上柱國者三人州黨榮之號所居為樂城鄉三柱里余謂此因其封邑而名鄉耳樂城縣屬温州武德五年分永嘉置非劉仁軌所封者也漢書地理志河間國有樂城縣後魏改為樂壽縣唐屬瀛州樂城古城在樂壽縣東南十六里唐以古縣名封仁軌通鑑二百四凡一條三年黒齒常之大破突厥於黄花堆史炤釋文曰黃花堆突厥地名余按黃花在神武川元和初朱邪執宐所保之地其地在朔州塞内非突厥地也魏收地形志後魏置神武郡於神武川通鑑二百五凡一條延載元年突厥可汗骨篤祿卒弟黙啜自立為可汗史炤釋文曰黙啜突厥種名余按通鑑明言黙啜為骨篤祿之弟則黙啜乃人名非種名也通鑑二百六凡三條神功元年孫萬榮與其奴逃至潞水東史炤釋文曰潞水在潞州為幷州浸即濁漳水也余按周禮職方氏幷州其浸淶易冀州其浸汾潞其川漳則漳自是漳潞自是潞以周官職方言之則潞非幷州浸以漢地理志言之則潞州漢上黨郡也春秋潞子之國有潞川上黨郡漢屬幷州然皆非孫萬榮授首之地按萬榮時攻幽州軍潰至潞水東為奴所殺是唐幽州之潞水非漢上黨之潞川也水經鮑丘水從塞外來南逕漁陽縣東又南過潞縣西謂之潞水漢光武遣鄧隆撃彭寵軍於潞南即是水也孫萬榮正死於是水之東聖厯元年狄仁傑因食疏糲史炤釋文曰疏菜食也糲脫粟也張晏曰一斛粟舂七斗米為糲余按詩召旻云彼疏斯粺箋云疏麤也謂糲米米之率糲十稗九鑿八侍御七字林云糲米一斛舂為八斗此皆疏即糲也九章算術粟一石為糲米六斗舂糲一斗為粺九升又舂為侍御則七升又曰凡穀一舂一簸為糲米唯論語飯䟽食飲水孔氏注以疏食為菜食諸儒生皆不主其説以疏食為麤飯然疏食猶可以菜食為説若疏糲不若用諸家之説為文從義順也二年左衛鎧曹參軍郭元振史炤釋文曰參軍官名十六衛皆同鎧曹後改為胄曹余按史炤但以參軍為官名參軍之官名何從始耶沈約曰參軍後漢官孫堅為車騎參軍事是也本於府主無敬晉世孫楚為大司馬石苞參軍輕慢苞始制施敬晉永嘉之亂中州人士避亂南度晉元帝以琅邪王鎮建業悉羅致為參軍掾屬行參軍所謂百六掾是也既而為晉王以參軍為奉車都尉掾屬為駙馬都尉行參軍舎人為騎都尉而諸公府都督府置諮議參軍因漢末軍諮祭酒而為之名也至宋有錄事記室戸曹倉曹中直兵外兵騎兵長流賊曹刑獄賊曹城局賊曹法曹田曹水曹鎧曹車曹士曹集右戸墨曹凡十八曹參軍參軍不署曹者無定貟至唐惟衛府率府有錄事及諸曹參軍諸州有錄事及諸司參軍通鑑二百七凡三條長安四年太后疾少間史炤釋文曰間居莧切少愈也余按論語病間釋音如字孔云少差也史炤釋文凡疾間之間並從去聲未知何據乆視四年賈敬宗奏張昌宗强市人田史炤釋文曰强其兩切抑買之也余謂强其良翻非人所願以威勢逼抑而市之謂之强市成均祭酒同鸞臺鳳閣三品李嶠罷為地官尚書史炤釋文曰五帝名學曰成均余按唐百官志垂拱元年改國子監曰成均監以國子祭酒為成均祭酒通鑑釋文辯誤巻九
