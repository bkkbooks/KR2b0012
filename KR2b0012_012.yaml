body:
  text: 通鑑釋文辯誤巻十二宋胡三省撰通鑑二百五十八凡三條昭宗大順元年李存孝擒孫揆韓歸範紤以素練史炤釋文曰糸斥其字未詳海陵本同余按丁度集韵糸斥音充夜翻以䋲維持之也二百六十九巻梁均王乾化四年糸斥音昌者切亦非惟華邠鳳翔鄜夏之兵會之史炤釋文鄜作鄄注曰吉掾切地名余按通鑑言諸鎮之兵會伐李克用者也華者鎮國軍之兵也邠者靜難軍之兵也鳳翔者岐隴之兵也鄜者保大軍也夏者定難軍也通鑑前書張濬㑹宣武鎮國静難保大定難諸軍於晉州可以見矣史炤以鄜為鄄不考故爾鄜音夫二年成都軍民强弱相陵將吏斬之不能禁乃更為酷法或斷腰或斜劈史炤釋文曰劈博厄切分也海陵本同余按音博厄切者乃擘字其字下從手不從刀從刀者音普壁翻剖也通鑑二百五十九凡一條乾寕元年劉建鋒馬殷引兵至澧陵史炤釋文曰澧陵楚地余按唐書地理志醴陵縣屬潭州澧當作醴史炤以其地在戰國時屬楚邪自秦罷侯置守之後不當單引戰國地理以釋唐時州縣以馬殷後封楚王遂以其地為楚地邪則此時劉建鋒主兵馬殷特偏將耳且其兵方至醴陵未得湖湘塊土其地既未屬馬殷殷又未受封為楚王可遽以醴陵為楚地乎其義例不明有如此者通鑑二百六十凡一條二年上曰就使沙陀至此朕自有以枝梧史炤釋文曰梧五故切斜相抵觸也余按唐昭宗所謂枝梧者正引漢書諸將慴伏莫敢枝梧之枝梧為説如淳漢書注曰枝梧猶枝􅀈也臣瓚曰小柱為枝斜柱為梧今屋梧斜柱也未嘗以斜相抵觸為義枝梧皆讀如字通鑑二百六十一凡二條四年朱友恭攻黄州瞿章棄城南保武功寨海陵本釋文作翟章注云翟直格切姓也又音狄余考通鑑上下文乃瞿章非翟章也瞿音其俱翻葛從周奔還楊行宻追之及於渒水史炤釋文曰渒普計普賣二切水在丹陽海陵本同余按類篇渒音必至翻水名在弋陽今渒河在來逺鎮西十里來逺鎮即東正陽也東至壽州二百里史炤音釋俱非也通鑑二百六十二凡一條天復元年王珂遣間使告急於李克用史炤釋文曰間使間諜之使費本同余謂敵兵斷道遣使者投間道而行謂之間使非間諜之使也此後多有以間使為間諜者不欲僂數觀者詳之通鑑二百六十三凡一條二年削漬松柹以飼御馬史炤釋文曰柹鉏里切海陵本同余按音鉏里切者果名松柹之柹音孚吠翻斫木札也時鳳翔受圍積乆芻竭故削松柹令薄漬以飼馬詳考字書果木之柹今人作柿乃木札之柿字也從孚吠切木札之柿今人作柹乃果名之柹字也從鉏里切炤音之誤頗亦由此二百八十巻晉高祖天福元年二百九十三巻周世宗顯德四年削柹音皆誤通鑑二百六十四凡六條三年李克用笑曰賊欲有事淄青史炤釋文曰淄青並州名屬河南道余按炤釋淄青與二百三十三巻憲宗元和十年二百五十五巻僖宗中和二年釋淄青之誤同而更添屬河南道四字夫淄青之屬河南道是唐天寳以前十道按察采訪使所統自分建藩鎮而淄青自為一道號平盧節度使李克用言賊欲有事淄青者時平盧節度使王師範舉兵襲取朱全忠之兖州克用知全忠將攻師範故云爾成汭作巨艦齊山截海劈浪之類甚衆史炤釋文曰劈匹歴切破也又博厄切分也費本同余謂從匹歴切為是辯已見前李嗣昭等復取振武城殺吐谷渾降者二千餘人史炤釋文曰吐谷渾西域國居丼松山之陽洮水之西余按吐谷渾自高宗時為吐蕃所破舉國内徙其國之故地盡入吐蕃此時吐谷渾多居代北不復在丼松山之陽洮水之西矣天祐元年陳班貶湊州司戸史炤釋文曰湊千侯切又則侯切余按新舊唐書地理志無湊州湊當作溱貞觀十六年開山洞置溱州溱州時屬黔中節度使然湊字亦無千侯切一音朱全忠表稱邠岐兵逼畿甸請上幸洛陽史炤釋文曰天子千里地曰畿天子五百里曰甸余按禹貢天子五百里甸服孔安國注云規方千里以為甸服去王城面五百里面五百里則自東至西千里自南至北亦千里王畿千里以四方言之甸服五百里以一面言之畿即甸也非有千里五百里之殊若周禮夏官九畿之籍方千里曰國畿則王畿也禹貢之甸服也其外方五百里曰侯畿又其外方五百里曰甸畿侯畿則禹貢之侯服也若甸畿已為禹貢綏服周官之甸畿非畿甸之謂也皇后出自捧玉巵以飲全忠史炤釋文曰巵古字作觚飲酒器也余按觚有稜之器也巵圓器也古字未必以巵為觚盖炤以為觝即巵字誤作觚耳炤又曰古以角作觝受三升審觀炤釋葢襲用應劭漢書注而不能盡用之也劭云巵飲酒禮器也古以角作受四升古巵字作觝鄭𤣥禮器注凡觴一升曰爵二升曰觚三升曰觶四升曰角五升曰散史炤謂觝受五升既與應劭異抑以鄭𤣥所謂觶者為觝與然後世之玉巵非古之觝也通鑑二百六十五凡二條泌陽劉存史炤釋文曰泌陽縣名屬泌縣余按炤既曰泌陽縣名矣不應又曰屬泌縣是必曰屬泌州而誤作屬泌縣也然泌州本昌州治棗陽唐武德五年改為唐州天祐三年朱全忠徙治泌陽表更名泌州此時唐州未改為泌州不當以泌陽屬泌州為釋歐史職方考只書唐州昭宣帝天祐二年封皇弟褆為潁王史炤釋文曰褆時爾切余按温公注揚子褆以支翻又音題未嘗從時爾切通鑑二百六十六凡六條梁太祖開平元年梁王入舘于魏魏博節度使羅紹威恐王襲之史炤釋文曰魏博唐之藩鎮也節度貝博魏相磁洺衛七州治魏州海陵本同余按唐代宗廣德元年平史朝義以田承嗣為魏博德滄瀛五州都防禦使是年夏五月丁卯制分河北諸州以魏博德為魏州管此藩鎮之始也大歴七年魏博節度使田承嗣表分魏州置澶州八年昭義節度使薛嵩薨承嗣襲取相貝洺衛磁詔諸鎮討之盧子期之敗磁州復歸于昭義而淄青李正已取德州遂為己有承嗣所有者魏博貝相澶衛洺七州田悦之敗洺州復歸于昭義自此世襲更史氏何氏樂氏羅氏皆保有六州故羅紹威之悔誅牙兵謂人曰合六州四十三縣鐡不能為此錯安得七州哉山後八軍廵檢使李承約史炤釋文曰山後八軍謂涿營瀛莫平薊媯檀皆屬盧龍節度使盧龍乃幽州范陽郡也海陵本同余按涿營瀛莫平薊媯檀此盧龍廵屬八州非山後八軍也涿營瀛莫平薊皆在山前惟媯檀在山後又有新武二州與媯檀為四州置八軍以備契丹河東故有山後八軍廵檢使盧龍古塞名在平州肥如縣燕慕容令所謂守肥如之險者也唐武德初改肥如為盧龍縣後置盧龍軍於其地尋又以范陽節度使為盧龍節度使而治幽州盧龍之地非幽州范陽郡地也若曰盧龍節度使治幽州范陽郡則可矣朱全昱睨帝曰朱三汝本碭山一民也史炤釋文曰碭山秦之碭郡在唐為宋州余按漢書地理志梁國故秦碭郡顔師古注曰以有碭山故名碭郡漢初置梁國都碭後都雎陽應劭曰碭山在碭縣東括地志曰碭山縣本漢碭縣在宋州東一百五十里是則碭山縣唐屬宋州不為宋州也宋州治睢陽唐志云光化二年朱全忠以碭山虞城單父曹州之成武表置輝州則碭山縣此時屬輝州矣以養子宣武節度副使友文為開封尹史炤釋文曰宣武節鎮本治宋州梁徙于汴州海陵本同余按唐肅宗乾元二年置汴滑節度使治滑州上元二年廢寳應元年復置河南節度使治汴州代宗以田神功為汴宋節度使亦治汴州大厯中李靈曜作亂於汴州命淮西節度使李忠臣等討平之因命忠臣以淮西節度治汴州德宗建中二年分宋亳潁别為節度使以宋州刺史劉洽為之治宋州尋號宣武節度使此宣宋節度治宋州之始也至興元二年劉洽破李希烈得汴州遂徙治焉自此迄于唐亡宣武節度皆治汴州未嘗徙也及梁受唐禪定都汴州乃復徙宣武節度于宋州而汴州置開封尹史炤殆未嘗深考本末也以權知荆南留後高季昌為節度使史炤釋文曰高季昌字賂孫陜州陜石人余按五代史高季昌字貽孫非字賂孫也陜州峽石人非陜石也二年晉兵猶屯余吾寨史炤釋文曰余音餘又音徐余吾水名在朔方即其地以為寨海陵本同余按漢書朔方有余吾水時晉兵救上黨而屯余吾寨炤指朔方之余吾水為註計其地之相去無乃太逺漢書地理志上黨郡有余吾縣章懷太子賢注曰余吾故城在今潞州屯留縣西北晉兵所屯正此地也通鑑二百六十七凡三條三年岐王置翟州於鄜城史炤釋文曰翟直格切余謂翟當讀為狄春秋戰國時岐梁涇漆之北皆戎狄之地岐王置翟州盖取諸此劉守文以重賂招誘契丹吐谷渾之衆史炤釋文曰吐谷渾乞伏乾歸之苗裔自後魏以來名見中國居於青海之上焉余按吐谷渾徒河鮮卑慕容渉歸之庻長子晉時度漠而西居於青海之上其後遂以為部落之名自晉以來通鑑書吐谷渾屢矣史炤前此釋文亦言其出于鮮卑慕容氏於此忽以為乞伏乾歸之苗裔乞伏乾歸據河隴在東晉太元間當是時吐谷渾立國乆矣烏得以為乞伏乾歸之苗裔乎炤釋前後牴牾大率如此又按高宗之世吐谷渾為吐蕃所破徙鄯州尋徙靈州唐為置安樂州以處之後吐蕃復取安樂州而殘部徙朔方河東今劉守文所招誘者河東管内雲朔等州之吐谷渾也不在青海之上四年晉王退臥帳中張承業褰帳撫王曰此豈王安寢時邪史炤釋文曰褰帳説文絝也余按説文所謂褰絝盖因春秋傳徵褰與襦而有此説張承業褰帳言褰開晉王所臥之帳耳安可以褰絝為釋通鑑二百六十八凡四條梁太祖乾化元年南平襄王劉隱病亟史炤釋文曰亟紀力切敏疾也又去吏切余按禮記夫子之病革矣革讀與亟同病亟言病勢危急也不當以敏疾為釋若去吏切之亟數數也愈非病亟之義史炤大抵只據廣韵為釋文更不尋繹通鑑文義其敝至此二年帝夜遁旦至冀州蓨之耕者皆荷鉏奮梃逐之史炤釋文曰梃木片余按此即孟子所謂制梃以撻秦楚之堅甲利兵之梃梃者杖也豈木片之謂乎此亦信用廣韵之過也博王友文來朝請帝還東都史炤釋文曰朝請才性切余謂朝請之請漢書固音才性翻然通鑑書博王友文來朝朝字當句斷請帝還東都請當讀如字朝字屬上句請字屬下句文理曉然史炤惟不知句讀遂并文理失之是後二百七十一巻均王禎明五年林思諤來朝請幸所治炤亦以朝請釋之其誤同均王乾化三年徐温曰浙人輕而怯史炤釋文曰江水東至㑹稽山隂而折故吳會之地因以稱浙海陵本同余按浙江上游受衢婺歙三港之水水出兩山之間盤廻百折至錢塘而入海故謂之浙江越婺衢台明温處七州為浙東杭蘇常潤秀湖睦為浙西此唐末所分也錢氏時跨有兩浙故徐温謂其兵為浙人若云江水東至㑹稽山隂為浙江此漢桑欽水經之説至唐已分山隂西界置蕭山縣浙江過蕭山入海太史公謂吳為江南一都㑹故後人謂吳為吳㑹今蘇州是其地也吳㑹之地固亦屬兩浙不得顓稱為浙也或以吳㑹指言漢吳郡㑹稽之地然漢㑹稽之地兼有七閩七閩之地唐為福建觀察使所統唐末為威武軍節度使所統非浙也通鑑二百六十九凡一條禎明元年劉鄩引兵自黃澤西去道險士卒援藤葛而進史炤釋文藤作蕂注曰蕂詩證切苣蕂胡麻也余按胡麻今人皆種之其根淺手可擢而㧞豈可援以登險乎山路多藤葛故劉鄩之卒援以登險道藤音徒曾翻通鑑二百七十凡四條四年嚴可求以厚利募贑石水工故吳兵奄至䖍州城下史炤釋文曰吉州有贑石山遂興水與䖍州相近海陵本同余按䖍州之贑水自州治後北流一百八十里至吉州萬安縣界為灘十有八怪石如精鐵突兀廉厲錯峙波面俚俗謂之贑石非山名也水工生長於其地習知灘險熟於操舟然後無觸破覆沒之患故以厚利募之以行舟若山則安用水工哉以忠義節度使高萬興兼保大節度使幷鎮鄜延史炤釋文曰鄜延並州名余按唐末以鄜州為保大軍延州為保塞軍梁改保塞軍為忠義軍則鄜延二州為二鎮矣李嗣源見晉軍橈敗史炤釋文曰橈火高切其字從手海陵本同余按橈字從木音奴敎翻勢屈為橈左傳所謂師徒橈敗音義正如此五年賀瓌攻德勝南城設睥睨戰格如城狀史炤釋文曰睥睨衺視也海陵本同余按城上短垣謂之睥睨非衺視之睥睨也通鑑下文言如城狀可以知矣通鑑二百七十一凡一條六年趙王鎔雍容自逸事皆仰成於僚佐史炤釋文曰仰恃也余按仰成之語本於書畢命周康王垂拱仰成乃是康王以父師優禮畢公自言以冲幼而仰成於耆壽俊之意如左傳所謂百穀仰膏雨漢書所謂氐首仰給其義皆同非恃也通鑑二百七十二凡三條後唐莊宗同光元年王彥章引兵踰汶將攻鄆州史炤釋文曰汶水出兖州萊蕪縣余按汶水發源於萊蕪縣原山西南流過鄆州中都縣東北中都今為汶上縣距鄆州九十餘里王彥章引兵踰汶水其地在中都東北不在萊蕪帝發中都舁王彥章自隨史炤釋文曰舁羊諸切共舉余按以車載人前挽後推亦謂之舁其義固不專於共舉也高季興入朝上從容問曰朕欲用兵於吳蜀二國何先史炤釋文曰從容休燕也余按朝廷之儀君臨之以莊臣承之以敬若從容顧問則氣象安舒上下之情親宻無間上則不峻不廹下則不陵不遽是所謂從容也何必休燕然後為從容哉通鑑二百七十三凡一條三年張全義以羅貫高伉怨之史炤釋文曰伉高極也余按亢字則有高極之義此伉字之義敵也羅貫之為人必氣貌峻厲言語彊直其事上也如敵已然故張全義以其高伉而惡之通鑑二百七十四凡三條長和驃信鄭旻史炤釋文曰驃信南詔也余按唐末南詔改國號曰長和其君曰驃信長和者南詔也驃信者南詔之君也滏陽張礪史炤釋文曰滏陽縣名屬惠州余按唐滅梁復以惠州為磁州孫鐸曰賊既勢挫必當離散然後可撲討也史炤釋文曰撲掌也余按撲討之撲撃也以為掌何義通鑑二百七十五凡一條明宗天成元年入洛拾莊宗骨於灰燼之中而殯之史炤釋文曰殯殮也余按古禮斂自是斂殯自是殯自天子至諸侯卿大夫士皆有小斂大斂若殯則菆塗也炤釋以殯殮同義亦以廣韵為據考之於記檀弓子思之言曰䘮三日而殯凡附於身者必誠必信則殯似有殮義孔頴達䟽以為此士大夫之禮葢亦因小斂大斂然後殯致疑也唐自許敬宗等去國䘏篇天子之䘮禮隨時斟酌損益就簡便而為之况五季之時邪通鑑二百七十六凡三條三年高從嗣請與馬希範挑戰史炤釋文曰挑徒弔切余按挑戰之挑徒了翻四年吳武昌節度使李簡以疾求還江都卒于採石史炤釋文曰採石一名牛渚山在丹陽縣北大江中唐改縣曰當塗余按漢書地理志丹陽縣屬丹陽郡當塗縣屬九江郡禹會諸侯於塗山即其地在濠壽之間永嘉䘮亂淮民南度晉成帝立當塗縣於于湖縣以處僑民其後遂為實土唐貞觀八年省丹陽縣入當塗當塗有縣其來尚矣非唐改丹陽為當塗也徐知誥召徐知詢飲以金鍾酌酒賜之知詢疑有毒引它器均之跽獻知誥知誥不肻受伶人申漸高徑前為俳諧語掠二酒合飲之史炤釋文曰合葛闔切兩龠為合費本同余按史言申漸高掠取金鍾及它器之酒合而飲之安取兩龠為合之義哉通鑑二百七十七凡一條長興元年董璋姚洪令壯士十人刲其肉史炤釋文曰刲刺也余謂刲割也非刺也通鑑二百七十八凡二條三年幽州奏契丹屯納蘭泊史炤釋文曰納蘭泊地名近幽州海陵本同余按歐陽公四夷雜錄時幽州有備契丹主西徙橫帳居納蘭泊出寇雲朔之間則納蘭泊在雲朔塞外不近幽州也四年閩薛文傑隂求富民之罪被榜箠者胷背分受仍以銅斗火熨之史炤釋文曰熨於胃切余按楊堅執周政李穆使人奉熨斗於堅曰願持此以尉安天下則熨字有尉音但今人讀熨字多音紆物翻通鑑二百七十九凡一條潞王清泰元年王以西都留守王思同當東出之道尤欲與之相結説以利害餌以美妓不從史炤釋文曰餌飤之也余謂此言餌者取釣餌之義釣者以餌引魚而鉤致之史言潞王餌王思同正此義也通鑑二百八十凡二條後晉高祖天福元年唐主夜與近臣從容語史炤釋文曰從容猶内燕也余按史炤多以從容為間燕已辯之於二百七十二巻後唐莊宗同光元年至此又以從容為内燕矣薛文遇曰諺有之當道築室三年不成史炤釋文曰諺猶傳言也余謂諺者今人所謂俗語也通鑑二百八十一凡三條二年張從賓引兵東扼汜水關史炤釋文曰汜水縣有虎牢關成臯關旋門關余按漢之成臯周之虎牢也穆天子傳云七萃之士生捕虎以獻天子天子畜之東虢命曰虎牢春秋城虎牢以偪鄭即其地劉項相拒於成臯扼虎牢之險也唐初秦王世民守虎牢以破竇建德是雖縣曰成臯而虎牢之名猶在唐改成臯縣為汜水縣新唐書地理志注曰縣有虎牢關成臯故關旋門關旋門關在成臯縣西旋門坂酈道元所謂陟此阪而東趣成臯者也自此東至板城渚口為成臯關成臯關即虎牢關也所謂故關者先時所立之關也曰故關者史表言其有新關耳成臯縣即改為汜水縣關亦改呼為汜水關王暉殺安遠節度使王瓌史炤釋文瓌作瓖注曰思將切余按通鑑諸本皆作瓌字音古囬翻行軍司馬張朏史炤釋文曰朏敷尾切又滂佩切余按字書敷尾之朏其旁從月滂佩之昢其旁從日若依炤釋兼兩音是以朏昢為同一字也通鑑二百八十二凡三條四年以唐許王從益為郇國公史炤釋文曰郇地名在河東解縣余按此以古國名封從益為公使奉唐明宗之祀而已非使有其地也五年楚王希範自謂伏波之後史炤釋文曰漢馬援封伏波將軍余謂伏波將軍而言封史筆有此義例否其鄙陋無識槩可見矣安審暉敗唐兵於雲夢澤中史炤釋文曰雲夢二澤名在楚地余按禹貢雲土夢作乂孔安國注云雲夢之澤在江南左傳楚王以鄭伯田江南之夢杜預注云楚之雲夢跨江南北漢書地理志雲夢澤在南郡華容縣南祝穆曰據左傳䢵夫人弃子文於夢中言夢而不言雲楚子避吳入于雲中言雲而不言夢則知雲夢二澤也漢陽志亦云雲在江之北夢在江之南此皆以二澤為説者也又安陸有雲夢澤枝江有雲夢城盖古之雲夢澤甚廣而後世悉為邑居聚落故地之以雲夢得名者非一處安審暉敗唐兵於雲夢澤即安陸之雲夢澤非古之所謂雲夢二澤也通鑑二百八十三凡三條七年同鄜援兵繼至史炤釋文曰同鄜二州名余謂同鄜二州自唐末以來同州為匡國軍鄜州為保大軍已為二鎮矣齊王天福八年楚王希範好自誇大為長槍大槊飾之以金可執而不可用史炤釋文曰通俗文剡木傷盗曰槍余謂凡注書者發明正文大義使讀者因而求之無所凝滯也如炤此注於大義為何如哉開運元年河决浸汴曹單濮鄆五州之境史炤釋文曰單時戰切余按單州因單父縣以名州單音善從去聲者蜀人土音之訛也通鑑二百八十五凡一條吳越程昭恱譛闞璠杜昭逹謀奉錢仁俊作亂下獄鍛鍊成之史炤釋文曰鍛鍊爍冶金也余謂炤於此語之下更有以喻成獄也一語文意方足古人謂以獄辭成人之罪者曰鍛鍊其引喻之義甚精盖冶金者既爍之以火又淬之以水鍊之以鎚而後能成器舞文巧詆之吏其訊囚也威之以笞箠木索質之以參伍證佐或弛或張或緩或急以困之使答辯者變意易辭惟其所欲以成獄故比之鍛鍊通鑑二百八十六凡一條後漢高祖天福十二年奚王伊喇史炤釋文曰拽以制切刺奴八切余謂拽羊列翻刺郎葛翻伊喇舊作拽刺今按遼史國語解改正史炤胡三省翻切係屬舊名姑存之通鑑二百八十七凡一條李廷珪將兵出子午谷以援長安史炤釋文曰三秦記子午長安正南山名秦嶺谷一名樊川余按樊川以漢高祖封樊噲而得名其地正直唐長安城南此則平川也言自樊川入子午谷則可以子午谷一名樊川則不可通鑑二百八十八凡二條乾祐元年羌族㖡毋殺綏州刺史李仁裕史炤釋文曰㖡其字未詳海陵本費本同余按龍龕手鏡㖡音夜蜀眉州刺史申貴撃漢箭筈安都寨破之史炤釋文曰箭末曰筈筈會也謂與弦相㑹通作括費本同余謂箭筈嶺名有箭筈關在鳳翔西南界上宋高宗紹興元年金將沒立郎君自鳳翔攻箭筈關吳玠遣將撃退之盖亦蜀口關隘處史炤蜀人也不知箭筈之為地名而汎言箭筈訓義可見其孤陋寡聞矣通鑑二百八十九凡一條三年馬希萼賜希廣死彭師暠葬之瀏陽門外史炤釋文曰瀏陽縣名屬潭州余謂潭州固有瀏陽縣而瀏陽門則潭州城門名也不當以縣名為釋自潭州城出瀏陽者謂之瀏陽門出醴陵者謂之醴陵門通鑑二百九十凡一條周太祖廣順元年劉崇即皇帝位於晉陽史炤釋文曰劉崇自太原以北有州十余按通鑑書劉崇有幷汾忻代嵐憲隆蔚沁遼麟石十二州之地史炤言有州十是以歐史軄方考為據而忘通鑑下文也汾石二州在太原西南遼沁二州在太原東南劉崇疆土亦不止於自太原以北也通鑑二百九十一凡四條二年南漢將潘崇徹破王逵于蠔石史炤釋文曰蠔字未詳海陵本同余按蠔音豪附石而生韓愈所謂蠔相粘為山者也生於海中者亦謂之礪王峻爭之不已史炤釋文曰爭則迸切通作諍余謂爭讀如字文理自通帝猶愍之史炤釋文曰愍眉殯切憐也余謂愍讀與閔同音隕翻不從去聲此亦炤土音之訛顯德元年契丹通事楊耨姑舉城降史炤釋文曰耨乃豆切余以西北土音求之耨當音奴篤翻通鑑二百九十二凡二條二年蜀將趙玭舉秦州城降史炤釋文玭作玼注曰淺氏切又千禮切余按通鑑諸本皆作玭當音蒲眠翻又毗賓翻帝至壽春城下營于淝水之陽史炤釋文曰淝水出九江山入淮在廬州合肥縣費本同余按淝水出九江良餘山過合肥縣又過壽春城北而入于淮淝水去壽春城纔二里耳世宗下營正在此水之陽史炤但以應劭漢書注肥水至合肥與淮合之説為據而不考世宗所營之地不在合肥也通鑑二百九十三凡一條三年唐孫晟謂王崇質曰吾思之熟矣終不負永陵一培土史炤釋文曰培鋪枚切瓦未燒者按漢書張釋之傳云長陵一抔土顔師古注曰音歩矦切手掬也其字從手或讀為杯非也又按培字當作抔意同而兩音當互讀也余按瓦未燒之培當作坯字與手掬之抔音既不同而意義亦不同也况張釋之所謂取長陵一抔土意謂發陵惡察察言故曰取一抔土孫晟所謂終不負永陵一培土言將以死報唐不負其先帝山陵耳其立言命意全是不同培當讀為培塿之培音薄口翻説文曰培塿小阜亦冢也孫晟言一培土猶言一冢土耳唐陸龜䝉築城詞曰城上一培土手中千萬杵則培土以益土為義一培猶言益一畚土也若據陸詩培音蒲枚翻亦通通鑑二百九十四凡二條六年舳艫相連數十里史炤釋文曰漢律名船方長為舳艫余按漢書武帝紀舳艫千里李斐注曰舳船後持柁處艫船前持櫂處言其船前後相衘千里不絶也小顔三劉無以異其説翰林學士單父王著史炤釋文曰單父縣名屬宋州余按唐書地理志單父縣固屬宋州然唐末朱全忠置輝州於碭山分單父屬焉尋徙輝州治單父後唐改輝州為單州此時單父縣屬單州不屬宋州也通鑑釋文辯誤巻十二
