body:
  text: 通鑑釋文辯誤卷一宋胡三省撰通鑑一凡二條周威列王二十三年智伯求蔡臯狼之地於趙襄子史炤釋文曰臯狼春秋蔡地後為趙邑海陵本費本同余按春秋之時晉楚爭盟晉不能越鄭而服蔡三卿分晉韓得成臯因以并鄭時蔡已為楚所滅鄭之南境亦入于楚就使臯狼為蔡地趙襄子安得而有之漢書地理志西河郡有臯狼縣又有藺縣漢之西河春秋以来皆為晉土而古文藺字與蔡字近或者蔡字其藺字之訛歟安王十三年齊田和㑹魏文侯楚人衛人于濁澤史炤釋文曰濁水名按漢志濁水出齊郡廣縣媯山海陵本費本同余謂釋文誤矣史記書齊魏濁澤之㑹徐廣注云長社有濁澤又酈道元水經注曰皇陂水出胡城西北胡城潁隂縣之狐人亭也皇陂古長社縣之濁澤也史炤縱不能逺考水經注亦不能近考史記注乎八十四卷晉惠帝元寕元年濁澤注誤與此同海陵本費氏本則又為炤所誤也通鑑二凡六條顯王元年齊伐魏取觀津史炤釋文曰齊伐魏惠王請獻觀以和觧即此觀津也海陵本費本同余按班志信都國有觀津縣是時屬趙地去齊境甚逺又東郡有畔觀縣水經大河故瀆東逕五鹿之野又東逕衛國故城南古斟觀也徐廣亦曰觀今衛縣史記正義曰魏州觀城縣古觀國國語注云觀國夏太康弟五人之所封也以其地臨河津故亦曰觀津齊伐魏所取者也史炤但據史記所書以明觀地而不詳言之後人不能博攷地理讀其釋文將遂以為信都之觀津豈不誤之乎八年秦孝公令國中曰昔我穆公自岐雍之間修德行武東平晉亂以河為界史炤釋文曰岐謂岐山雍州名謂東崤西漢南商北居庸四山之所擁翳也費本同余謂以岐為岐山是也以雍為州名則非按班書地理志岐山在扶風美陽縣西北雍縣亦屬扶風應劭注云四面積高曰雍又按史記秦紀犬戎殺周幽王秦襄公以兵救周戰甚力有功平王避戎東徙洛邑賜襄公以岐山以西之地傳至曾孫德公初居雍城徐廣注云今縣在右扶風穆公德公子也東平晉亂其地至于河是則所謂岐雍之間乃岐山雍縣之間非指雍州州名為言也李廵注爾雅釋州名雍州固有壅蔽之義然以四履所至言之東崤可言也其西則越隴抵于河非漢也南商可言也其北則甘泉九嵕諸山居庸關乃在幽州懸隔河山何啻千餘里安能為雍州之擁翳哉其説雍州之義亦非也二百六十七卷梁太祖開平二年釋雍州其誤同十六年魏伐趙齊使田忌救之田忌欲引兵之趙孫子曰夫解雜亂紛糾者不控拳救鬬者不摶撠批亢擣虚形格勢禁自為解耳今梁趙相攻輕兵鋭卒必竭於外子不若引兵疾走魏都據其街路衝其方虚海陵本釋文曰虛音墟余謂虚當讀如字衝其方虛即上文所謂擣虚也史記索隱義亦如此若讀為墟全無意義史炤曰擣築也言乗其虚則自解也義與余同海陵本託公休之名實蹈襲史炤本至其自立異義者識見又下於史炤二十八年龎涓自知智窮兵敗乃自剄史炤釋文曰剄吉定切以刀自割頸海陵本費本同余按剄字音古鼎翻别無它音炤從去聲非也三十一年趙良語商君持矛而操闟㦸者旁車而趨史炤釋文曰闟吐臘切海陵本費本同余按薛綜注曰取四㦸函車邉此葢令力士旁車而趨有急則操闟㦸以禦之也後漢書輿服志有闟㦸車晉志曰闟㦸車長㦸邪偃在後唐韵㦸名曰闟音所及翻史炤音非三十六年蘇秦説趙肅侯合天下將相㑹于洹水之上史炤釋文曰在鄴説文水在齊魯間海陵本費本同余按徐廣注曰洹水出汲郡林慮縣水經曰洹水出上黨泫氏縣東北出山逕鄴縣南又東過内黄縣北東入於白溝蘇秦所謂㑹于洹上者正指在鄴之洹水非指齊魯間之洹水二百五十七卷唐僖宗文德元年二百六十巻昭宗乾元三年洹水注誤與此同通鑑三凡二條赧王三年張儀説趙王曰秦有敝甲凋兵軍于澠池史炤釋文曰澠池趙邑余按趙與韓魏接境韓有野王上黨魏有河東河内而澠池則秦地也漢地理志澠池縣屬𢎞農郡趙安能越韓魏而有𢎞農之澠池邪炤説非是海陵本誤同九年趙王使王賁之楚海陵本釋文曰賁音奔翦之子離之父余按翦之子離之父之王賁乃秦將也此王賁乃趙人海陵本誤矣通鑑四凡六條二十年主父探雀鷇而食之史炤釋文曰鷇克角切鳥子欲出者海陵本費本同余按爾雅曰生哺鷇生噣雛釋云辨鳥子之異名也鳥子生而須母哺食者為鷇謂燕雀之屬也生而能自啄者為雛謂雞雉之屬也鷇音居候翻炤音非三十一年淖齒執湣王而數之史炤釋文曰數所矩切一二而責之也余按漢書音義數責之數音所具翻炤自漢紀以後皆從音義至魏晉紀音所矩切者又雜出乎其間三十二年齊湣王子法章變名姓為莒太史敫家傭海陵本釋文曰敫吉了切史記作嬓余按徐廣注敫音躍一音皎海陵本從徐廣下音也漢書王子侯表有敫字顔師古注云敫古穆字今從此音三十五年秦白起敗趙軍取代光狼城史炤釋文曰光狼城名本中山地趙武霛王取之其地在代海陵本同余按史以代光狼城聮而書之以為其地在代可也而云本中山地中山與代舊為兩國代在常山夏屋山之北中山在常山之南既云在代不當云本中山地四十二年秦王將使武安君與韓魏代楚黄歇上書曰先王不忘三世接地於齊以絶從親之要海陵本釋文曰要於笑切約也余按史記索隱要讀曰腰以言山東合從韓魏是其腰葢秦得韓魏之地然後能東接於齊楚不可得而北燕趙不可得而南是絶從親之要也索隱之説意義為長今王使盛橋守事於韓史炤釋文曰橋音矯海陵本同余按史記諸家註並無音當讀如字通鑑五凡三條五十五年趙王以趙括代廉頗將括母上書言括不可使王曰毋置之吾已决矣史炤釋文提起毋置二字注其下曰句斷毋者止之也使置其事而無復言也余按炤謂毋者止之也是讀母為毋字又以毋置為句斷則以之字屬下句全不成文葢母者謂括母也趙王使括母置其事不須復言吾已决計使括為將文意甚順何必妄為穿鑿母當讀為母子之母通置之為一句蒼頡篇曰母字其中有兩㸃象人乳形豎通者毋音無今諸家板行通鑑及史記皆作母字而妄以毋字為説是又以字學誤後人矣竒兵一萬五千人絶趙軍之後又五千騎絶趙壁間趙軍分而為二史炤釋文曰間居棧切間隔之也余謂若從炤説當以間趙軍為句與下句分而為二意頗重複若以又五千騎絶趙壁間為句與上句竒兵二萬五千人絶趙軍之後句法文意殊為停當間讀如字每見為句讀之學者於一句之間截而分屬上下句求發先儒之所未發者以見聖賢深意若文意自来通順而於一字兩字或四三字之間創分句讀以為新竒似不必爾又按間隔之間本無上聲而史炤音居棧切葢字書棧字有平上二音蜀人土音以平上二聲從去聲者甚多此亦是以上聲從去聲幸字書棧字有二音可以援從去聲其他則拘閡而不通矣秦隴以去聲為入梁益則平聲似去葢古人已病之五十八年呂不韋見秦子異人説之曰子傒有承國之業史炤釋文曰傒胡啓切秦孝文王之子余謂此傒字即左傳齊高傒之傒陸德明曰傒音兮若音胡啓切則是溪字非傒字也通鑑六凡五條秦昭襄王五十二年齊人隆技擊史炤釋文曰技巨至切海陵本同余按技渠綺翻炤音非莊襄王二年蒙驁伐趙定太原取楡次狼孟等三十七城史炤釋文曰次一音慈余按楡次縣自漢至唐及宋未嘗改名讀皆如字史記諸家音注及正義皆無音漢書音義亦無音惟武威郡揟次縣孟康注曰揟音子如翻次音咨一作恣亦無慈音然此乃武威揟次縣也與太原楡次縣不相關未知史炤何所據也三年毛公薛公見信陵君曰公子所以重於諸侯者徒以有魏也史炤釋文曰重直用切海陵本同余按文義此乃輕重之重音直隴翻若音直用翻乃再三之義考經典釋文可見始皇六年秦踰黽阨之塞以攻楚不便史炤釋文曰黽彌兖切海陵本同余按續漢志江夏郡鄳縣古冥阨之塞也史記正義曰黽阨之塞在申州黽音盲炤音非九年文信侯詐以舎人嫪毐為宦者史炤釋文曰嫪盧道切海陵本同余按顔師古漢書音義嫪音居蚪翻許愼曰郎到翻姓也無盧道切者得非蜀人以道理之道為去聲乎公休河内人生長京洛未必操蜀音也通鑑七凡八條二十三年王翦取陳以南至平輿大破楚師至蘄南史炤釋文曰楚地江夏有蘄春亭海陵本同余按漢書地理志沛郡有蘄縣史記正義曰蘄徐州縣此以唐時疆理言也以漢地理言之陳沛接境王翦既破楚師至沛郡之蘄縣南楚時都壽春遂渡淮而滅楚若以為江夏之蘄春則已越壽春而南近大江以道理考之史炤之誤明矣雍門司馬史炤釋文曰雍紆龍切齊城門海陵本同余按左傳晉圍齊伐雍門之萩經典釋文雍音於用翻二十六年郡置守尉監海陵本釋文曰監居衘切余謂守尉監皆秦分三十六郡所置官名此監當從去聲若監郡之監則監字從平聲記王制天子使其大夫為三監監於方伯之國陸德明釋文監古暫翻監於古衘翻可以見矣二十八年始皇東行郡縣上鄒嶧山史炤釋文曰嶧山在東海海陵本同余按漢書地理志魯國鄒縣嶧山在北應劭注曰邾文公遷于繹即此括地志鄒嶧山在兖州鄒縣南二十二里盖縣有遷徙故漢時嶧山則在縣北唐時則在縣南也惡得在東海邪三十五年寫蜀荆地材皆至關中史炤釋文曰寫四夜切舎車解馬為寫或作卸費本同余謂此非舎車解馬之卸乃前寫放宮室之寫通鑑二十六年云每破諸侯寫放其宮室作之咸陽北阪上寫讀如字寫之為義除也盡也晉時人多説寫字杜預注左傳云寫器令空郗夫人語二弟云傾筐倒寫皆除盡之義始皇曰吾慕真人自謂真人不稱朕海陵本釋文曰稱去聲不稱不惬意也余謂始皇初并天下自稱曰朕至此不稱朕耳稱當從平聲三十七年將軍恬賜死以兵屬裨將王離史炤釋文曰屬音蜀附也費本同余謂屬音之欲翻付也上將賜死以兵付裨將安有屬附之義哉以水銀為百川江河大海機相灌輸史炤釋文曰機弩括也相息亮切羣經音辯相訓共言機共灌輸也余按説文主發謂之機弩之有機亦主於發故謂之機此所謂機相灌輸止言發機以相灌輸耳不可徑以弩括為釋若以此釋上文機弩可也上文云上為機弩有穿近者輒射之釋機相灌輸則非也相音息亮切者贊相之相相視之相也若相灌輸之相讀當從平聲炤讀從去聲義何所取又引羣經音辯相訓共則亦當從平聲决無讀從息亮切之理通鑑八凡四條二世二年章邯守濮陽環水史炤釋文曰環戶班切海陵本同余按漢書音義環音宦凡環玦之環讀如字環遶之環音宦主重明法史炤釋文曰重直龍切海陵本同余按二世之言曰凡所為貴有天下者得肆意極欲主重明法也是以肆意極欲與主重明法為二事主重者謂君臣之勢上之所主者重則下之勢輕重音直隴翻直龍切非項羽軍漳南史炤釋文曰漳南漳水之南山海經曰漳水出荆山余按山海經曰漳水出荆山南注于沮水此左傳所謂江漢沮漳楚之望也項羽軍漳南與章邯相持在唐相州滏陽縣界下文項羽使蒲將軍引兵度三戶軍漳南服䖍注曰三戶漳水津也孟康注曰在鄴西南三十里此豈荆山之漳水哉九十七卷晉康帝建元二年趙王虎投王波父子之尸于漳水海陵釋文之誤與此正同詳辯于後二世夢白虎齧其左驂馬殺之史炤釋文曰三馬為驂海陵本同余按王肅云古者一轅之車夏后氏駕兩馬謂之麗殷益以一騑謂之驂周人又益以一騑謂之駟自時厥後夹轅曰服兩旁曰驂詩所謂兩服上襄兩驂鴈行者也史言左驂則必有右驂不當引三馬為驂以釋左驂通鑑九凡五條漢高帝元年秦王嬰降軹道旁史炤釋文曰字書云車輪之穿為軹余按漢書注徐廣曰軹道在霸陵蘇林曰在長安東十三里漢宮殿疏曰軹道亭東去霸城觀五里東去霸水百歩烏得以車軹為説邪項羽立董翳為翟王都高奴史炤釋文曰翟直格切海陵本同余謂上郡古白翟所居故以翳為翟王古字翟狄通炤音非立呉芮為衡山王都邾史炤釋文曰古邾子國即邾縣屬江夏余按古邾國漢魯國鄒縣也若江夏之邾縣先儒以為楚滅邾徙其君於此非古邾子國也二年諸將盡讙史炤釋文曰讙與歡同余謂讙與諠同讙者譁然不服之聲歡者忻然相得之意諸將盡讙者不服之聲也讙音許元翻楚追擊漢軍至靈壁東睢水上史炤釋文曰睢水在梁國睢陽海陵本同余按水經注睢水出陳留縣西蒗蕩渠而東北流又東北過睢陽縣南又東北過相縣南又逕彭城之靈壁東而東南流項羽敗漢王處也以此觀之睢水固過睢陽而楚追敗漢軍處乃在靈壁東之睢水上不在睢陽也二百五十一卷唐懿宗咸通九年睢水注誤與此同通鑑十凡一條四年漢王不可必身居項王掌握中數矣史炤釋文曰數去聲余按漢書音義數所角翻史記正義色庾切己非矣况從去聲哉通鑑十一凡六條五年項王分其騎為四隊四鄉史炤釋文曰隊音隧余按此乃羣隊之隊音徒對翻鄉讀曰嚮言項王分其從騎為四隊四嚮以禦漢軍文意甚明漢書王莽𫝊置六鄉六隊顔師古曰隊音遂葢因莽倣周禮鄉遂之制而為之音若引以音羣隊之隊則誤矣田横與其客二人乘傳詣洛陽史炤釋文曰乗𫝊者依乗符𫝊而行若使者持節爾𫝊者以木為之長尺五書符於上以為信余按如淳漢書注曰四馬高足為置𫝊中足為馳傳下足為乘𫝊一馬二馬為軺𫝊急者乗一乗𫝊師古曰𫝊若今之驛古者以車謂之𫝊車其後單置馬謂之驛騎此乃驛𫝊之𫝊非符𫝊之𫝊也史炤自是以後凡釋乗𫝊處或以為車𫝊或以為符𫝊其曰車𫝊者依漢書音義而為說其曰符𫝊者則臆見横於中終不知其誤也婁敬戍隴西過洛陽脱輓輅海陵本釋文曰輅音洛余按蘇林漢書注曰輅音凍􅏖之􅏖一木横遮車前二人挽之三人推之顔師古曰輅音胡格翻􅏖音同廣韵􅏖音涸若從蘇音洛當作􅏖史炤曰輅音路亦非也周自后稷封邰史炤釋文曰邰在右扶風􅐥功縣余按班志右扶風有斄縣斄古邰字又有武功縣顔師古注曰斄即今武功故城是史記正義曰雍州武功縣西南二十三里故斄城是也葢邰與武功在漢時為兩縣並屬右扶風後世則省邰縣併入武功縣至唐則􅐥功縣屬雍州而扶風為岐州顔師古張守節皆引唐時州縣以釋古邰城所在史炤不能深知厯代郡縣之離合徑言邰在右扶風武功縣殊不知漢右扶風所領邰自是邰縣武功自是武功縣至唐則古邰城在雍州􅐥功縣界内豈可以為在右扶風武功縣邪若曰在唐雍州武功縣則可矣傷夷者未起史炤釋文曰傷夷讀曰創夷余謂傷夷皆讀如本字文意自明何必讀傷字為創字邪六年亟發兵坑豎子耳史炤釋文曰亟欺冀切又音急余按字書亟從欺冀切者其義數數也此言亟發兵猶言急發兵也亟音紀力翻其義疾也趣也急也亟字有急義而無急音至一百三十二巻宋明帝泰始三年亟字兼有去吏紀力二切是又兩存其音而不審其義之各有攸當也通鑑十二凡二條八年上撃韓王信餘寇於東垣史炤釋文曰高帝十一年更名真定國余按高帝十一年擊陳豨豨將趙利守東垣帝攻之卒罵帝既㧞東垣卒罵者斬之不罵者原之因改東垣曰真定是改東垣縣為真定縣也至武帝元鼎四年始置真定國高帝曷嘗置真定國哉十二年漢别將撃英布軍洮水南北皆大破之史炤釋文曰洮音兆在淮南海陵本同蘇林曰洮音兆徐廣曰洮音道在江淮間余謂史炤引用蘇音而所謂在淮南者因英布王淮南遂簒取徐廣之説以為洮水在淮南意之也按通鑑上文布軍既敗走江南高祖令别將追之别將撃布軍于洮水南北皆大破之則洮水在江南明矣羅含湘中記零陵有洮水水經注洮水出洮陽縣西南東流注于湘水漢書地理志洮陽屬零陵郡如淳注洮音韜葢英布舊與長沙王婚既敗走往從之而洮水時屬長沙國境内英布之軍實大敗於此也通鑑十三凡一條文帝元年趙佗以兵威財物賂遺閩越西甌駱役屬焉史炤釋文曰顔師古謂駱役為駱越余按師古注西甌即駱越也未嘗以駱役為駱越葢閩越是一種西甌駱是一種役屬者役使而服屬之通鑑十四凡一條二年太僕見馬遺財足餘皆以給傳置史炤釋文曰置者置郵也以其居符𫝊之所故謂之𫝊置猶𫝊舍也余謂𫝊置即驛𫝊之𫝊非符𫝊之𫝊炤言置郵是也言符𫝊之所非也此其誤猶十一卷高祖五年釋田横乗𫝊之誤通鑑十五凡二條十四年上自欲征匈奴羣臣諫不聽皇太后固要上乃止海陵本釋文曰要力笑切余謂要之為義刼也約勒也此所謂固要言力約止之也要讀如邀海陵本音非十六年扐侯辟光為濟南王史炤釋文曰扐音勒余按易大𫝊歸竒於扐記王制用數之扐音勒若漢書音義則扐侯之扐音力通鑑十六凡二條景帝前四年王夫人知帝嗛栗姬史炤釋文曰嗛苦簟切恨也當作慊余按漢書音義嗛乎監翻口有所銜曰嗛景帝心銜栗姬史因用此字中六年上行幸雍郊五畤史炤釋文曰畤者封土積高之所秦有西畤鄜畤武畤好畤宻畤皆在右扶風所以祭天地五帝余按史記封禪書秦襄公始居西垂自以為主少皥之神作西畤祠白帝此畤在唐秦州上邽縣界襄公之後文公東獵汧渭之間卜居之而吉文公夢黄蛇自天下屬地其口止於鄜衍於是作鄜畤其地後為鄜縣唐之鄜州是也雍旁有故呉陽武畤雍東有好畤皆廢無祠作鄜畤後七十八年秦德公既立卜都雍雍之諸祠自此興德公卒後宣公作宻畤於渭南祭青帝又其後秦靈公作呉陽上畤作下畤祭炎帝索隠曰呉陽地名葢在岳之南余按索隠所謂岳者呉山也山南為陽故謂呉陽之地在岳之南班書地理志呉山在汧縣西史記正義以為陜州芮城縣北之條山恐誤又其後櫟陽雨金秦獻公自以為得金瑞作畦畤櫟陽而祀白帝封禪書所載秦嵗時之奉祠者非一惟雍四畤上帝為尊漢高帝二年東撃項籍而還入關問故秦時上帝祠何帝也對曰四帝有白青黄赤帝之祠高帝曰吾聞天有五帝而有四何也皆不能對高帝曰吾知之矣乃待我而具五也乃立黑帝祠命曰北畤有司進祠上不親往至文帝始郊見雍五畤祠索隠曰據秦舊而言秦襄公始列為諸侯而作西畤文公卜居汧渭之間皆非雍也至德公卜居雍而後宣公作宻畤祠青帝靈公作上畤祠黄帝作下畤祠炎帝獻公作畦畤祠白帝是為四并高祖增黑帝而五也以余攷之西畤鄜畤固不在雍而呉陽上畤下畤及櫟陽畦畤亦不在雍也自秦德公居雍而諸祠始興於雍後人以雍積高為神明之隩遂合白青黄赤四帝之祠而祠於雍高帝又立黒帝祠故雍有五帝畤史炤以為西鄜武好宻五畤皆在右扶風若史言扶風五畤猶曰依史而為之説史言幸雍郊五畤則雍乃扶風之一縣豈可包扶風一郡之大界言之邪况西畤在隴西郡上邽縣鄜畤在馮翊鄜縣既不可以為皆在扶風而雍之武畤好畤皆廢無祠不在五畤之數史炤之説失之逺矣一百卷晉穆帝升平二年秦王堅祠五畤釋文之誤與此同通鑑釋文辯誤卷一
