body:
  text: 通鑑釋文辨誤卷六宋胡三省撰通鑑一百二十凡五條文帝元嘉元年蹺騎史照釋文曰蹺牽么切行輕貌海陵本同余按通鑑本文是年即無蹺字史照於蹺騎之上注貂渠是秦王熾盤遣太子暮末出貂渠谷攻河西事下注偼妤是尊帝母胡倢妤事二事之間有王華領驍騎將軍事是誤以驍騎為蹺騎而曲為之説也魏主命長孫翰尉眷北擊柔然魏主自將屯柞山史照釋文曰柞山其地在柔然國余按魏收魏書帝紀魏未遷洛以前諸帝多幸柞山其山在大河之西世祖始光三年度君子津襲統萬至其城下徙萬餘家而還至柞山班所虜獲於將士神麚二年十一月西巡狩田於河西至柞山而還以此徵之可以見矣且魏主遣將擊柔然自將大軍為後繼以壯聲勢耳豈必至柔然國中而屯兵乎三年謝晦弟黃門侍郎皭史照釋文曰皭疾雀切余按字書疾雀切皭字埤蒼曰白色也皭音子肖翻釋小明也晦皭兄弟也其命名之字旁皆從日音子肖翻為是湟河史照釋文曰湟胡光切説文細繒也余按照釋湟河而引説文細繒全不可曉詳考通鑑是年有秦夏戰于嵻㟍山又攻湟河事至于年末有魏令漏戶輸繒帛事蓋音胡光切者注湟河之湟字也引説文者注繒帛也此又傳寫之誤四年魏奚斤上疏言赫連昌亡保上邽鳩合餘燼史照釋文曰鳩鶻鵃也鳩合猶烏合之稱費本同余按左傳郯子言少皥以鳥名官五鳩鳩民者也五鳩指言祝鳩氏睢鳩氏鳲鳩氏爽鳩氏鶻鳩氏至於鳩民之鳩則以聚民為義此言鳩合亦謂聚合耳安得以鶻鵃為注其言猶烏合之稱尤非鳩合之義通鑑一百二十一凡一條五年秦王暮末以叔父光祿大夫沃陵為涼州牧史照釋文曰沃陵姓也海陵本同余按通鑑本文既言沃陵為暮末叔父則乞伏者其姓而沃陵者其名此不難見也史照之昏繆乃如此通鑑一百二十二凡二條十年魏平涼休屠征西將軍金崕史照釋文曰休屠武威邑屬北涼費本同余謂金崕者本胸奴休屠種居於平涼魏以為征西將軍通鑑文意甚明若因地志武威郡有休屠縣引以為注則通鑑本文休屠之上有平涼二字便説不行史照繆矣楊難當攻葭萌獲晉壽太守范延朗海陵本釋文曰葭萌縣名屬梓潼余按葭萌縣漢屬梓潼郡劉蜀改為漢壽縣晉改為晉壽縣孝武帝太元十五年梁州刺史周馥表分梓潼北界立晉壽郡治古葭萌之地通鑑一百二十三凡二條十五年太子率更何承天立史學史照釋文曰率更令官名也猶秦中更也海陵本同余按漢書百官表即有太子率更令續漢志本注曰主庶子舍人更直晉志率更令主宮殿門戶及賞罰事職如光祿勳衛尉中更秦爵級非官也十六年老父被苫而耕史照釋文曰苫草覆屋余按被苫而耕蓋被苫於身以蔽雨非覆屋也通鑑一百二十四凡三條十九年雍州刺史劉道産善為政民安其業小大豐贍由是民間有襄陽樂歌山蠻不可制者皆出沿沔為村落史照釋文曰樂歌山蠻其地在雍州襄陽海陵本同余謂襄陽之民安其業大小豐贍故有襄陽樂之歌凡昔日山蠻之不可制者慕王民之豐樂故皆出山緣沔而居因通鑑本文而求其義居然可見樂歌句斷照乃以樂歌山蠻為句是不求其義也二十年魏皮豹子鎮仇池楊文德來求援詔以為武都王屯葭蘆城史照釋文曰葭蘆城度赤河經岐山三百四十里即其地海陵本同余按今階州福津縣東南七十里有葭蘆城世傳魏將鄧艾與蜀將薑維相持於此後魏置葭蘆縣後周併入盤堤縣仇池山在成州之西百里階成二州皆古武都郡地岐山在鳳翔府東去葭蘆道里甚逺史照之言未可信也二十三年魏主軍至東雍州臨薛永宗壘永宗出戰大敗與家人皆赴汾水死史照釋文曰汾水出汾陽北山余按史照止能言汾水發源之地不知薛永宗舉家赴汾水而死其地不在太原汾陽界水經汾水出太原汾陽北山東南過晉陽梗陽大陵平陶等縣南入河東界過永安楊平陽等縣又南過臨汾縣東又屈從縣南西流經絳縣故城北左傳所謂晉都新田有汾澮以流其惡者也又西徑魏正平郡南東雍州治所也太和中罷州立郡東雍州南之汾水乃薛永宗舉家赴水處漢書地理志曰汾水出汾陽北山過郡二行千三百四十里而入于河千三百四十里之汾水或源或委當隨地注釋而後能有别通鑑一百二十五凡二條二十七年魏主圍懸瓠施大鉤於衝車之端以鉤樓堞史照釋文曰鉤劒屬費本同余謂如古者吳鉤之鉤可以言劒屬此所謂大鉤者乃詩以爾鉤援之鉤言施大鉤於衝車之端以鉤樓堞則非劒明矣芮芮亦遣使逺輸誠欵史照釋文曰芮芮國名余按芮芮即蠕蠕魏呼柔然為蠕蠕南人語轉為芮芮沈約宋書李延壽南史皆以蠕蠕為芮芮從南人語音也通鑑一百二十六凡二條二十八年魏人乃肉薄登城史照釋文曰謂相背負而上城也余謂薄迫也不用梯衝以身迫城緣之而上謂之肉薄登城魏宗愛殺秦王翰於永巷史照釋文曰永巷宮中所直名漢官儀曰令一人宦者為之秩六百石掌宮婢侍史余按永巷者宮中之長巷史直言宗愛殺翰於長巷耳宮中所直名五字既不可曉又不必引漢書永巷令為釋一百六十六卷梁敬帝紹泰元年一百七十卷陳宣帝太建元年皆有永巷事照釋愈繆通鑑一百二十七凡三條三十年武陵王軍于溧洲費本注曰溧水名出丹陽溧陽縣余謂溧水固出溧陽溧洲則在大江中魯秀等攻大航克之王羅漢聞官軍已度即放仗降緣渚幢隊以次奔散海陵本釋文曰幢隊執幡幢之隊者余按是時南北朝用兵各置幢主隊主皆有副非執幡幢之隊也史照誤同而注在上文幢隊主副之下海陵本移置於此蓋亦疑上文有幢隊主副四字而不得其説耳卒散民盡可蹻足而待也史照釋文曰蹻紇約切舉足行高也又丘妖切舉足謂之蹻余謂照上音義俱非當從下音義通鑑一百二十八凡三條孝武帝孝建元年魯爽引兵直趣歷陽薛安都宗越等戍歷陽與爽前鋒楊胡興等戰斬之爽不能進留軍大峴使魯瑜屯小峴史照釋文曰大峴山名在夀州六安縣有五峴山是以分大小峴桐城亦有五峴非此余按史照但以魯爽自夀陽趣歷陽而留軍大峴遂謂大小峴皆在夀州六安縣殊不知六安縣在夀陽西大小峴在夀陽東不特在夀陽東也又在合肥之東自夀陽東過合肥而後至小峴又自小峴而東乃至大峴六朝都建康自歷陽而西趣夀陽自夀陽而東向建康大小峴乃兵馬往來之要路通鑑書大小峴不一審諦考之可以概見余又於一百五十四卷梁武帝天監元年辨海陵本釋大小峴之誤參取而觀之則知地理未易言也臧質進計於南郡王義宣曰下官中流鼓棹直趣石頭史照釋文曰鼓棹歌鼓而行舟也海陵本同余按鼓之為義擊也扇也動蕩之也擊棹以行舟漢書所謂樓船卒水居擊棹者今人謂之打棹打亦與擊同義鼓棹之義夫人能知之照乃謂歌鼓以行舟淺繆甚矣何尚之曰夏口在荆江之中正對沔口史照釋文曰沔水出武都東南入江過江夏謂之夏水余按史照釋用應劭漢書注劭注江夏郡曰沔水自江别至南郡華容為夏水過郡入江故曰江夏水經曰夏水出江流于江陵縣東南又東過華容縣南又東過江夏雲杜縣入于沔沔水又東過江夏沙羡縣北南入于江酈道元注云江津豫章口東有中夏口是夏水之首江之汜也原夫夏之為名始於分江冬竭夏流故納厥稱既有中夏之目亦苞大夏之名其決水之所出謂之堵口自堵口下沔水通兼夏目而會于江謂之夏汭故春秋左傳沈尹射奔命夏汭杜預注曰漢水曲入江即夏口矣庾仲雍亦曰夏口一曰沔口酈道元又曰黃鵠山東北對夏口城孫權所築也對岸則入沔津故城以夏口為名亦沙羡縣治沈約志曰江夏郡本治安陸是年徙治夏口夏口本沙羡土沈約所云正何尚之所謂夏口在荆江之中正對沔口者也章懷太子賢亦謂夏口戍在鄂州故唐以來皆指卾州為夏口歷考諸家之説自應劭至庾仲雍皆以為沔口即夏口自孫權築夏口城至唐置鄂州則夏口之名移於江南而沔水入江之口止謂之沔口或謂之漢口夏口之名遂與沔口對立分在江之南北以此釋何尚之之言乃為明白史照止引應劭注而不能究其地名之離合余故僃論之通鑑一百二十九凡一條大明三年豈可三緘史照釋文曰家語魯人三緘其口余按孔子家語孔子觀周入后稷之廟有金人三緘其口銘其背曰古之慎言也豈魯人哉通鑑一百三十凡二條明帝泰始元年魏侍中司徒平原王陸麗史照釋文曰陸姓也古帝號有陸終其後因以為氏海陵本同余按陸麗者陸俟之子陸突之孫本步六孤氏與拓跋氏皆起於代北世領部落魏孝文帝變胡俗凡代北三字姓及復姓皆改為單姓作史者從簡便因以後所改姓書之陸麗安得為陸終之後乎綖環錢史照釋文曰綖夷然切費本同余謂夷然切者乃左傳所謂衡紞紘綖之綖注云冠上覆也綖環之綖音私箭翻蓋當時鵝眼錢薄小一千之長不盈三寸而綖環錢又劣於鵝眼貫之以綖其狀如環故曰綖環若以為冠上覆之綖非其義矣丁度集韻線線綖皆同音同義近世學者弗之考耳通鑑一百三十一凡三條二年汝南新蔡二郡太守周矜起兵於懸瓠史照釋文曰矜居陵切説文矛柄也海陵本同余按周矜人姓名也安得以矛柄為義且矛柄之矜音其巾翻若居陵切則為矜憐之矜稍識文理者豈不知周矜為人姓名史照乖繆如此類者甚衆東軍據岸結寨史照釋文曰寨籬落也余按此乃營寨寨柵之寨非籬落也蕭道成世子賾為南康贑令史照釋文曰贑古送切費本同余按漢書地理志贑縣屬豫章郡如淳音感顏師古音古暗翻劉昫音古濫翻獨廣韻音古送切史照釋文多以廣韻為據致此誤也贑縣當章貢二水之會故合章貢二字為贑字若音古送切則是指貢水為縣名而遺章水矣二百九卷唐睿宗景雲元年二百一十二卷玄宗開元十一年贑注亦誤通鑑一百三十二凡一條三年魏尉元上言賊向彭城必由清泗過宿豫歷下邳趨青州亦由下邳沂水經東安史照釋文曰沂水出東海費縣東西入海余按漢書地理志沂水出泰山蓋縣南至下邳入泗過郡五行六百里水經沂水出泰山蓋縣艾山南徑開陽襄賁郯良城等縣又南過下邳縣西南入于泗尉元言南國進兵向青州水路必由泗入沂泝沂而經東安乃可至青州沂水未嘗出於費縣亦未嘗入海史照妄矣通鑑一百三十三凡一條七年分交廣置越州治臨漳史照釋文曰臨漳本漢鄴縣地海陵本同余按晉愍帝諱鄴改鄴縣為臨漳尋淪沒於石勒復為鄴縣東魏天平初始復分鄴立臨漳縣宋分交廣置越州安能逺北界治魏郡之臨漳劉昫曰廉州合浦縣宋分置臨漳郡則越州之所治者合浦之臨漳也通鑑一百三十四凡三條順帝升明元年蒼梧王針椎鑿鋸不離左右史照釋文曰鋸居御切槍唐也通作鐻余考史照槍唐之説既未知其所據而以鋸通作鐻之説徵之子史則亦妄矣按鋸字先秦古書未之有也字書引古史考云孟莊子作鋸音居庶切解截器也若鐻字則莊子所謂削木為鐻讀與據同史記秦始皇銷鋒鏑以為鍾鐻讀與虡同後漢書羌人以金鐻八枚遺張奐鐻戎夷貫耳也音求於翻鐻字曷嘗與刀鋸之鋸通哉王敬則以刀鐶塞窐孔呼門甚急史照釋文曰窐音圭甑空也海陵本同余按字書窐字固以甑下孔為釋但呼門而塞甑孔事不相關且甑孔甚大非刀鐶所能塞蓋門旁有孔三角如圭頭以窺外人因謂之圭孔後人遂於圭上加穴耳二年王僧虔奏大明中即以宮縣合和鞞拂史照釋文曰釋名鞞禆也禆助鼓節也呂氏春秋帝嚳令人作鞞鼓之樂余按鞞拂皆舞名也晉志曰鞞舞未詳所起然漢代已施於宴享矣拂舞出自江左舊云吳舞撿其歌非吳舞也亦陳於殿庭以此觀之史照誤矣通鑑一百三十五凡四條齊高帝建元元年宋順帝下詔禪位于齊帝逃于佛蓋之下太后自帥閹人索得之史照釋文曰閹人宮中守門者費本同余按閹即周禮之奄鄭氏注云奄精氣閉藏者今謂之宦人陸德明音義奄於檢翻劉於驗翻徐於劒翻今於奄字加門則音淹釋者因其加門也遂以宦者守門為義殊不思前史凡閹人給事宮中者皆曰閹宦初不以守門為義史照説拘矣二年魏師攻鍾離崔文仲遣軍主崔孝伯度淮攻魏茌戍主龍得矦等殺之史照釋文曰泰山郡有山茌縣茌山在其東北海陵本同余按齊徐州治鍾離自鍾離渡淮攻茌眉蓋淺攻也茌眉自是淮北地名魏於此置戌非泰山之山茌縣也北上黃蠻文勉德寇汶陽汶陽太守戴元賓棄城奔江陵史照釋文曰汶音問魯郡之邑余按沈約宋書云汶陽太守何承天志新立去江陵陸行四百里水行七百里上黃縣宋初屬襄陽後屬長寧郡郡去江陵陸行六十里水經注晉武帝割臨沮之北鄉中廬之南鄉立上黃縣治軡鄉在宜城西義熙初分新城郡立汶陽郡治錫城縣春秋時楚伐庸至于錫冗者也其地在臨沮縣西北若如史照説以為魯郡之汶陽則非襄陽上黃蠻所得而攻而郡守亦無從而奔江陵也自南北分據建置郡縣多與古郡縣之名錯出其所建置之地非深考不能知也一百四十三卷東昏矦永元二年釋汶陽誤同四年南康公禇淵卒世子賁恥其父失節以爵讓其弟蓁史照釋文曰賁恥符非切姓也恥其名海陵本同余按褚賁淵子也通鑑之文甚明賁恥其父失節者以淵奉宋氏社稷輸之於齊也不當以賁為姓恥為名史照之誤多類此賁讀曰蕡音符分翻通鑑一百三十六凡三條武帝永明三年李叔獻獻十二隊純銀兜鍪乃孔雀毦史照釋文曰孔雀鳥名毦者毛羽飾也博雅曰㲥毦罽也一曰積羽為衣一曰兜鍪上飾余謂毦者以孔雀毛為兜鍪飾耳不必引㲥毦及積羽為衣以雜其説五年魏主詔七廟親子孫及外戚緦麻已上親賦役無所與史照釋文曰緦兩麻一絲之布也余按禮記雜記曰朝服十五升去其半而緦加灰錫也注曰緦精粗與朝服同去其半則六百縷而疏也又無事其布而不灰焉正義曰朝服精細全用十五升布為之去其半而緦者緦麻於朝服十五升之內抽去其半以七升半用為緦麻服之衰服也鄭注云喪服去其半而緦如絲是也加灰錫也者取緦以為布又加灰治之則曰錫錫言滑易也注云又無事其布而不灰焉者經云去其半而緦始云加灰錫明此緦衰不加灰不治布故也詳考雜記注疏則朝服之布十五升去其半者為緦麻服之衰其加灰治布者則為錫衰史照以緦為兩麻一絲之布其説不經見六年魏築城於醴陽陳顯逹攻拔之進攻沘陽史照釋文作澧陽注曰天門邑余按天門郡之澧陽今之澧州沘陽縣今之唐州唐州與澧州相去甚逺敻隔江漢陳顯逹既拔醴陽遂攻沘陽是沘陽與醴陽相近非天門之澧陽明矣水經注沘水出沘陽西北太湖山東南流過沘陽縣南又南流而與澧水會澧水源出桐柏山與淮同源而别流西注又西北流徑平氏故城東又西注沘水魏蓋於此水之隄築城又水經於淮水注曰淮水與澧水同源俱導西流為醴東流為淮正作此醴字通鑑一百三十七凡一條八年魏太皇太后馮氏徂高祖勺飲不入口者五日史照釋文曰勺職略切挹取也余按詩泂酌彼行潦挹彼注兹此酌字音職略翻以挹取為説周官考工記梓人為飲器勺一升勺音上酌翻勺飲之義取此非挹取之酌也通鑑一百三十八凡二條十一年王融行逢朱雀桁開喧湫不得進史照釋文曰湫即由切本作啾謂喧譁啾唧也費本同余謂此湫即左傳湫隘之湫顧野王云湫子小翻隘也以喧譁湫隘為説文義自通何必改為啾唧之啾乎車前無八騶何得稱丈夫史照釋文曰騶廄御也余按晉志諸公諸從公車前給騶八人王融望為公輔故云然騶者在車前傳呼辟開道止行人者今人所謂騶哄徐勉曰王君名高望促難可並􅗓衣裾史照釋文曰􅗓帛也費本同余謂於此以帛為釋其義殊為不通按字書弊字亦有從敝從衣者以弊為説其義乃通通鑑一百三十九凡一條明帝建武元年魏安定靖王休卒自卒至殯魏主三臨其第史照釋文曰臨力禁切哭也余謂此君臨臣喪之臨讀如字君臨臣喪固哭之但史言三臨其第當以臨幸臨視之臨為義漢書賈山所謂賜衰麻絰而三臨其喪正古者待大臣之禮魏主用斯禮也通鑑一百四十凡三條二年魏主曰代人遷洛者宜悉葬邙山其先有夫死於代者聽妻還葬夫死於洛者不得還代就妻其餘州之人自聽從便史照釋文提起妻其二字注曰妻七計切以女嫁人曰妻余謂若如照釋當以妻其餘州之人為句讀之便使上下文皆失其指義童而習者不為也按通鑑上文時廣川王諧卒其妻先死於代而諧從魏主南遷死於洛有司於其葬地審以新尊從舊卑之義故魏主因是定制以為夫尊妻卑夫葬於代而妻死於洛則妻當還葬於代以從夫若妻葬於代而夫死於洛不得還葬於代以就妻除代人之外餘州之人不用此制各從其便妻字句斷其字當屬下句文理曉然妻讀如字沮水氐楊馥之為齊擊武典氐楊集始破之史照釋文曰沮水出房陵東至郢入江余謂沮水有二辨已見七十七卷魏元帝景元二年此沮水乃武都沮縣之沮水非出房陵之沮水也元和郡縣志曰今興州城古之武興城也武興及沮縣之沮水皆屬漢武都郡界房陵則屬漢中郡唐之房州是也楊氏諸氐皆居武都不居房陵也一百四十八卷梁武帝天監十四年釋沮水誤同其曰新城房陵則以曹魏分漢中置新城郡欲以新異觀者之目耳三年魏寇司州櫟城戍主魏僧岷拒破之史照釋文曰櫟城在司州屬後魏余按此時魏寇齊之司州為櫟城戍主所破則櫟城屬齊不屬魏明矣齊之司州鎮義陽通鑑一百四十一凡四條四年魏發冀定瀛相濟五州兵海陵本釋文曰瀛州即河內郡余按瀛州河間郡地非河內也李崇搓山分道史照釋文曰搓山與氐羌相近槎鋤加切亦作查海陵本同余按槎音仕雅翻邪斫木也此與晉穆帝永和六年燕命慕輿埿搓山通道同義史照於此以搓山為山名又愈誤矣聚礌石臨崖下之史照釋文曰礌落罪切推石自高而下也余謂釋是而音非音洛罪切者礌硌之礌推石自高而下之礌當音盧對翻漢書李陵傳乘隅下壘石壘音盧對翻音義正與此礌同特古字借用不同耳徐州刺史裴叔業引兵攻虹城史照釋文曰虹戶工切後魏之地余謂此虹城即漢虹縣也今泗州猶有虹縣漢書音義虹音貢今人讀如絳南齊徐州刺史鎮鍾離裴叔業自鍾離引兵度淮攻魏之虹城以撓魏南寇之兵正今泗州之虹縣也史照音戶工切特隨字自為之音非有所據也通鑑釋文辨誤卷六
