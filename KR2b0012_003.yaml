body:
  text: 通鑑釋文辨誤卷三宋胡三省撰通鑑五十六凡二條靈帝建寧元年段熲追羌出橋門與戰於奢延澤落川令鮮水上連破之史照釋文曰令鮮水名在張掖觻得縣界一名合黎水一名羌谷水費本同余謂此史照承章懷注之誤也章懷注曰令鮮水名在甘州張掖縣界一名羌谷水一名合黎水史照因賢注之羌谷水參以班書地理志張掖觻得縣有羌谷水遂曰令鮮水在張掖觻得縣界殊不思段熲之擊羌也先破之於高平之逢義山遂追之出上郡橋門與戰於奢延澤落川令鮮水上連破之又破於靈武谷奢延澤在上郡奢延縣西南靈武谷在北地靈武縣則所謂令鮮水當在奢延澤西南靈武谷東北非張掖之羌谷水明矣注通鑑者當審觀段熲前後轉戰之地而求其地望之逺近段熲前後與羌戰皆在漢安定北地上郡界張掖逺在河西段熲之兵焉能至彼乎黃門從官騶踏踧陳蕃曰死老魅復能損我曹貟數奪我禀假不史照釋文曰禀力錦切或作廪假音價貸也謂不以廪餘相貸費本同余按蔡質漢儀尚書僕射與右丞對掌廪假錢穀又續漢志諸將軍府有禀假掾吏主禀假蓋以錢粟給之謂之禀禀音彼錦翻因給廪而生音義二字通用而義亦相生也假者月給不足於用或預借於官者也時宦官恣橫黃門從官騶冗濫尤甚陳蕃自桓帝以來為尚書令嫉其冗濫數格奪其禀假此輩銜怨因其被收遂辱詈以泄其憤言禀假錢穀文書至尚書蕃數格奪之也豈謂不以廪餘相貸邪假音價亦蜀人土音廣韵有上去二音通鑑五十七凡一條熹平元年㑹稽妖賊許生起句章史照釋文曰句音鉤海陵本同余按漢書㑹稽句章之句無音陸德明經典釋文句章之句音九具翻如淳韋昭皆音拘史照音鉤無所據通鑑五十八凡二條光和四年帝好為私稸收天下之珍貨每郡國貢獻先輸中署名為導行費史照釋文曰導徒浩切導引也費本同余按字書道字從徒浩切者理也路也直也無導引之義以導引為義者當音徒到翻中平四年長沙賊區星史照釋文曰區虧于切余按唐韵區音豈俱切注云漢有長沙區景又音烏侯切注云今郴州有是姓意者此姓有兩音也通鑑五十九凡四條五年屠各胡攻殺並州刺史張懿海陵本釋文曰屠各即休屠地也余按徒各胡胸奴種也晉書曰北狄以種落為類其入居塞內者有屠各等十九種皆有部落不得雜錯屠各最豪貴故得為單于統理諸種杜佑曰頭曼冒頓即屠各種也漢書地理志武威郡故休屠王地屠各烏得為休屠地乎史照曰各胡乃其名號尤繆然照之誤起於五十四卷桓帝延熹元年海陵本不過蹈襲史照而已九十四卷晉成帝咸和四年屠各注其誤同六年董卓議太后踧迫永樂宮至令憂死史照釋文曰踧子六切行平易也迫逼也猶言行平易而逼之余謂照說自相反既曰行平易矣何至逼迫之事此踧字與前建寧元年黃門從官騶踏踧陳蕃之踧同義或曰踏踧當作蹴此踧迫之踧當作蹙又按照所謂平易者本毛詩踧踧周道𫝊訓然平易之踧音徒歷翻今音子六切亦非也獻帝初平元年關東州郡皆起兵討董卓推勃海太守袁紹為盟主紹自號車騎將軍諸將皆板授官號史照釋文曰板通作版以版籍授官費本同余按字書板版二字古今通用然於此謂以版籍授官則非也漢制度曰帝之下書有四一曰䇿書二曰制書三曰詔書四曰誡敕䇿書者編簡也其制長二尺短者半之篆書起年月日稱皇帝以命諸侯王公以罪免亦賜䇿書而以𨽻書凡一木兩行唯此為異也制書者帝者制度之命其文曰制詔三公皆璽封尚書令即重封露布州郡也其文曰告某官云云如故事誡敕者謂敕刺史太守其文曰有詔敕某官他皆倣此李雲書曰尺一拜用不經御省章懷注曰尺一之板謂詔䇿也見漢官儀則拜授官號漢用尺一䇿也時董卓挾天子袁紹等罔攸禀令故權宜板授官號言無皇帝璽信以白板授之也豈以板籍授官乎官謂牧守令長號謂將軍校尉也董卓取長安洛陽鐘簴以鑄錢史照釋文曰簴音具海陵本同余按簴音其呂翻至七十三卷魏明帝青龍元年簴音其矩切則照亦悟音具之非矣通鑑六十凡二條二年邴原性剛直清議以格物史照釋文曰格古伯切廢格之格以清議廢人又音閣海陵本同余謂格正也言以清議正物也格讀如字照以為廢格之格是知讀漢書而未曉文義夫因文見義各有攸當不可滯於一隅學問思辨聖人之所以教人也然聖人之所謂學問思辨詎止此哉觸類而長之亦可以知學之無止法矣三年麴義兵伏楯下不動史照釋文曰楯殊閏切余謂史照之誤猶四十九卷章帝元初元年音板楯之誤也楯當音食尹翻讀通鑑者可以意求其音後不重出通鑑六十一凡二條興平二年李傕送饋郭汜妻以䜴為藥擲以示汜史照釋文曰擲直炙切搔也擲也投也與擲同余謂此乃挑擲抉擲之擲音他歷翻董承楊定脅𢎞農督郵海陵本釋文引馮鑑續事始云督郵即後漢郡主簿也隋始改為録事參軍主勾稽文簿舉彈善惡史照注先已見四十五卷明帝永平七年以此愈知海陵本為蹈襲史照姑移前置後相與欺誤後學而已余按通典録事參軍晉置為公府官舉彈善惡本州郡職也後代刺史有軍而開府者並置之漢有郡主簿職與州主簿同隋初以録事參軍為郡官則并主簿之職矣煬帝又置主簿唐武德初復為録事參軍若漢之督郵掌監屬縣各郡有東西南北中部謂之五部督郵韋昭辨釋名云督郵主諸縣罰負郵殿糾攝之也又按後漢書郅惲為汝南功曹太守歐陽歙嘗㑹宴屬吏歙教曰西部督郵繇延天資忠貞不嚴而治宜顯之於朝太守敬嘉厥休牛酒養德主簿讀書教戶曹引延受賜惲於下坐愀然而前曰按延資性貪邪外方內圎朋黨搆姦罔上害民明府以惡為股肱以直從曲惲敢再拜奉觥歙慙不知所言則漢郡有主簿又有督郵也古者郵通作尤督郵以糾督屬縣愆尤為職而録事參軍亦以舉彈善惡為職愆尤善惡以簿書之隋之録事參軍始並領漢郡主簿督郵之職馮鑑以為督郵即漢主簿亦既繆矣照等又引以為據訛謬相𫝊曷其有極不辨可乎通鑑六十二凡四條建安元年董承奔野王韓暹屯聞喜胡才楊奉之塢鄉史照釋文曰塢鄉即太原塢縣余按此時諸將奉獻帝居安邑既而互相疑阻各自分屯安邑聞喜野王皆在河東河內之境塢鄉則河南緱氏縣之塢聚是也是後帝自安邑還雒陽楊奉出屯汝南之梁縣此又自塢鄉而南屯梁縣也以地里而考其移屯之次序則塢鄉為緱氏之塢聚明矣太原之塢縣去安邑為逺隔山嶺楊奉若往太原之塢不能復奉獻帝還雒陽及出屯梁縣二年曹操東征袁術術留其將橋蕤等于蘄陽以拒操操擊破蕤等皆斬之術走渡淮史照釋文曰水經蘄水出江夏蘄春縣北山酈道元注云即蘄山也又南對蘄陽注于大江亦謂之蘄陽口余按史照此注乃承章懷注之誤也按三國志袁術時侵陳曹操東征之術留蕤等拒操蕤等敗死術走度淮則是戰於淮北也蘄陽屬江夏其地在淮南而蘄陽口又蘄水入江之口也袁術若留橋蕤等於淮南之蘄陽操兵自北來則蕤敗而術走度淮將焉往哉蕤等拒操處蓋沛國之蘄縣也范史衍陽字而通鑑因之章懷因蘄陽而注誤史照又承其誤也三年呂布遣許汜王楷求救於袁術術曰云云汜楷曰明上今不救布為自敗耳布破明上亦破也史照釋文曰明上猶明府也余按漢時諸州牧郡守人稱之為明府袁術僣號故汜楷稱之為明上以汜楷命言之意觀之蓋尊於明府矣番陽民帥别立宗部言我已立郡海昏上繚不受發召海陵本釋文曰繚盧皎切余按水經注僚水導源建昌縣漢元帝永光二年分海昏立建昌僚水又東徑新吳縣漢中平中立僚水又徑海昏縣謂之上僚水以此言之繚當讀為僚海陵本音誤通鑑六十三凡一條四年曹操常從士徐他史照釋文曰從疾容切相就之士也費本同余謂常從者士之常隨從在左右者也從音才用翻通鑑六十四凡一條十年白騎入東垣高幹入濩澤史照釋文曰東垣即陳留長垣侯國也余按此東垣乃河東郡之垣縣時杜畿守河東東垣及濩澤皆河東屬縣也詳觀通鑑上下文則可以知之矣通鑑六十五凡一條十三年孔融與郗慮有隙史照釋文曰郗綺㦸切海陵本同余謂郗丑之翻若綺㦸切則郤字也史照於字畫亦不審諦如此八十九卷晉愍帝建興元年釋郗鑒海陵本之誤與此同通鑑六十六凡二條十六年曹操與韓遂交馬語秦胡觀者前後重沓史照釋文曰重沓重足著地也海陵本同余按漢書所謂重足而立言人畏懼之甚不敢並足著地故重足而立也此直謂秦人胡人夙知曹操之威名聚而觀之前後重沓安有重足著地之事哉十八年魏公操引軍還參凉州軍事楊阜言於操史照釋文曰參所今切地名余觀照釋是以引軍還參為句下文曰凉州軍事楊阜凉州軍事何官邪當以引軍還為句參凉州軍事楊阜為句文義方通參音倉含翻沈約曰參軍後漢官孫堅為車騎參軍事是也通鑑六十七凡一條十九年劉備以蔣琬為廣都長衆事不治時又沈醉費本注曰沈持甘切作沉非是余按字書沈即沉字書所謂沈酗沈湎經典釋文云沈直金翻沒也蓋謂沈溺於酒醉而不能自勝耳若音特甘切則讀近耽字不若音直金翻有經典釋文可以依據通鑑六十八凡二條二十四年陸遜進封婁侯史照釋文曰婁㑹稽邑海陵本同余按婁縣前漢屬㑹稽郡後漢則屬吳郡今蘇州崑山縣即其地七十一卷魏明帝太和三年誤同子敬即駮言不可史照釋文曰駁雜也言不同也余謂駮異也立異議以糾駮羣議之非非雜也通鑑六十九凡四條魏文帝黃初元年王以安定太守鄒岐為凉州刺史史照釋文曰漢改雍州曰凉州治隴西魏分凉州置秦州治上邽余按此時凉州刺史已徙治武威後漢凉州刺史治漢陽郡隴縣非隴西也為壇於繁陽史照釋文曰繁陽魏郡之邑在繁水之陽其界為繁淵海陵本同余謂魏王時南巡至潁川郡之潁隂縣築壇於曲蠡之繁陽亭是年遂以繁陽為繁昌縣史照但以魏王時居鄴遂以為築壇於魏郡之繁陽殊不考其南巡及受禪本末實築壇於潁川之繁陽也二年翊軍將軍趙雲史照釋文曰翊飛貌故以號將軍海陵本同余謂羽翼之翼則有飛義此以輔翊為義古者輔翊之翊通用翼字既有翊字則當各隨字為義若說飛軍將軍必非命官之義靈獻之世已置翊軍校尉後遂以為將軍號張既潜由且次出武威胡以為神引還顯美史照釋文曰顯美地名在武威之張掖余按漢武帝開河西列置四郡武威張掖皆郡名也顯美縣前漢屬張掖郡後漢及魏晉屬武威郡史照以顯美為地名在武威之張掖將以武威為郡張掖為縣乎通鑑七十凡六條四年曹仁向濡須先揚聲欲東攻羡溪史照釋文曰羡音夷江夏沙羡縣即其處去濡須三十里海陵本同余按史照言羡溪去濡須三十里此以杜佑通典為據也若以為江夏沙羡縣即其處則大謬矣濡須在今巢縣東南四十五里沈約宋志江夏沙陽縣本漢沙羡縣治夏口自夏口至濡須何啻八九百里安得以杜佑所謂去濡須三十里之羡溪扶合江夏之沙羡乎沙羡之羡音夷羡溪之羡讀如字朱然伺間隙攻破魏兩屯史照釋文曰間古限切間厠之間海陵本同余謂間廁之間音古莧翻安有音古限切者若言間隙之間讀從平聲則亦謂之中間空隙處也諸葛亮發教與羣下曰猶棄敝蹻而獲珠玉史照釋文曰虞卿躡蹻擔簦之蹻釋云蹻草屨也舉夭切海陵本同余按史記徐廣注曰蹻草屨也無音索隱曰音腳又按韵書三十小韵內有蹻字居夭切驕也詩周頌蹻蹻王之造𫝊云蹻蹻武貌音才老翻居表翻變大雅小子蹻蹻𫝊云蹻蹻驕貌音其略翻皆非草蹻之蹻韻書草蹻之蹻訖約翻正與索隱音同五年帝為水軍親御龍舟循蔡潁浮淮如壽春史照釋文曰按漢書蔡即九江下蔡縣亦古州來國其地在淮潁之㑹潁水出潁川陽城東至下蔡入淮左𫝊楚靈王狩于州來次于潁尾是也海陵本同余謂史照言淮潁之㑹固可以釋自潁浮淮其謂循蔡潁之蔡為下蔡則非矣夫所謂循蔡潁浮淮者循蔡水至潁水出潁口而浮淮也魏收地形志陳留扶溝縣有蔡河蔡河自浚儀東南流而入于潁潁水東南流而入于淮魏文帝龍舟所行水道固至下蔡入淮然言循蔡潁者循蔡河以至循潁河也吳徐盛植木衣葦為疑城假樓自石頭至于江乘史照釋文曰石頭城名在吳丹陽郡秣陵即其地費本同余按史照釋蓋因漢獻帝建安十七年孫權作石頭城徙治秣陵而有是說然秣陵縣與石頭城自是兩處秣陵縣在東石頭城在西江表𫝊張紘謂孫權曰秣陵楚武王所置名為金陵地藝岡阜連石頭秦始皇東巡經此縣掘斷連岡改名秣陵是秣陵與石頭為兩處之一證也晉書郗隆𫝊隆為揚州刺史鎮秣陵齊王冏檄令赴討趙王倫隆停檄不下時王邃鎮石頭隆軍西赴邃甚衆奉邃攻隆殺之是秣陵與石頭為兩處之二證也一百二卷晉海西公太和五年釋石頭誤同六年帝以舟師循渦入淮史照釋文曰渦烏禾切水洄為渦又古禾切說文水入淮在漢沛國譙縣海陵本同余按渦是水名不當以水洄為渦為釋因此誤音烏禾切其從古禾切及引說文為釋是矣且謂在沛國譙縣則此時已分置譙郡通鑑七十一凡六條明帝太和二年橫門邸閣與散民之榖足周食也史照釋文曰邸閣據說文屬國舍也下又有邸閣非此余觀照說蓋以漢昭帝使丞相率百官送鄯善王於橫門外遂傅合說文以為橫門外有屬國舍殊不思漢長安城中有郡國邸又有蠻夷邸所謂屬國舍即蠻夷邸在藳街不在橫門魏延言橫門邸閣與散民之榖足以周食是指邸閣為積粟之所豈屬國舍乎况許叔重只以屬國舍釋邸字未嘗釋邸閣也漢郡國朝宿之舍皆曰邸叔重但以為屬國舍亦已拘矣史照援以釋邸閣愈逺而不近矣照又云下又有邸閣非此此謂青龍元年諸葛亮治斜谷邸閣也亮所治邸閣亦以蓄米是二邸閣其義正同邸閣之義詳見于下亮揚聲由斜谷道取郿使趙雲鄧芝為疑兵據箕谷史照釋文曰箕谷或謂郿縣郿塢是余按史照因上文有由斜谷取郿一語遂設或人之說以箕谷為郿縣郿塢然考後漢書馮異𫝊箕谷當在陳倉之南漢中之北亮聲言由斜谷取郿遣趙雲等據箕谷為疑軍是其軍未至郿也馬謖與張郃戰于街亭郃大破之諸葛亮拔西縣千餘家還漢中史照釋文曰漢陽隴縣有街泉亭所謂街亭即此海陵本同余按照說以續漢志為據而續漢志所載在隴縣者乃街泉亭非街亭隋志漢川郡西縣有街亭山魏時西縣亦屬漢陽郡通鑑下文書諸葛亮拔西縣千餘家還漢中則街亭在西縣明矣吳王守陽羡長史照釋文曰陽羡漢㑹稽邑余按陽羡縣前漢屬㑹稽郡自後漢和帝以後至吳皆屬吳郡三年漢蕭何定漢律益為九篇又有令三百餘篇决事比九百六卷史照釋文曰比毗至切近也謂律法近有九百六卷海陵本同余按顔師古漢書音義曰比以例相比况也則比字當讀如字觀通鑑正文律自是律令自是令决事比自是决事比豈得以比為近謂律法近有九百六卷邪晉志云魏文侯師李悝悝撰次諸國法著法經以為王者之政莫急於盜賊故其律始於盜賊盜賊須劾捕故著網捕二篇其輕狡越城博戲僣假不廉淫侈踰制以為雜律一篇又以其律具其加減故所著六篇蕭何定律除亡秦參夷連坐之罪增部主見知之條益事律興廏戶三篇合為九篇叔孫通益律所不及傍章十八篇張湯越宮律二十七篇趙禹朝律六篇合六十篇又漢時决事集為令甲以下三百餘篇及司徒鮑公撰嫁娶辭訟决為法比都目凡九百六卷此通鑑所據以為書者也四年吳主揚聲欲至合肥史照釋文曰合肥漢九江邑應劭曰夏水出城父東南至此與淮合故曰合肥余按應劭所云酈道元固疑之矣道元曰施水受肥水於廣陽鄉東南流徑合肥縣應劭云夏水出城父東南至此與肥合故曰合肥闞駰亦云出沛國城父東至此合為肥余按川殊泒别無㳂注之理方知應闞二說非實證也蓋夏水暴長施合於肥故曰合肥夫道元以夏水出城父而東南流入于淮則與淮合無絶淮而南流至合肥縣與肥水合之理而施水上受肥水於廣陽鄉東南流徑合肥縣又東南流而入于漅湖肥水西北注淮而施水東南入漅湖已自分流惟夏月暴水漲溢則二水復能合於合肥縣界故合肥以此得名道元之說庶乎信而有徵矣通鑑七十二凡八條六年帝行如摩陂治許昌宮史照釋文曰摩陂地名在古郟鄏即漢之河南縣海陵本同余按水經注摩陂在潁川郟縣縱廣可十五里此豈河南之郟鄏哉以下文治許昌宮觀之可以知史照之謬矣許昌宮在潁川許縣魏改許縣曰許昌田豫以兵屯據成山史照釋文曰成音盛海陵本同余按漢書地理志東萊郡不夜縣有成山成無他音當讀如字劉曄曰臣得與聞大謀常恐眯夢漏泄以益臣罪史照釋文曰物入目曰眯寐中神遊曰夢余按物入目曰眯是莊子所謂播糠眯目之眯非眯夢之謂也字書眯一作㝥說文曰寐而米厭米即眯字厭讀為魘此眯夢之眯也青龍元年鮮卑軻比能誘保塞鮮卑步度根自勒萬騎迎其纍重於陘北並州刺史畢軌表輒出軍以外威比能內鎮步度根史照釋文曰井陘山名在常山郡陘北言在井陘之北海陵本同余按陘北者陘嶺之北也漢靈帝末羌胡大擾定襄雲中五原朔方上郡並流徙分散建安二十年集塞下荒地置新興郡自陘嶺以北盡弃之唐代州雁門縣有西陘關東陘關即古陘嶺之隘烏得指常山井陘之北為陘北邪若是常山亦不當并州刺史出軍史照之踈大率類此至四百四十一卷齊明帝建武四年陘北注其誤同諸葛亮運米集斜谷口治斜谷邸閣史照釋文曰邸或作阺岸旁欲落者故以閣為道海陵本同余按史照釋邸閣於橫門邸閣因漢嘗令百官送鄯善王於橫門外則以屬國舍為釋於斜谷邸閣因斜谷有閣道則以閣道為釋而其所謂岸旁欲落者取楊雄解嘲響若阺隤之阺為義不知邸閣乃以積粟魏延所謂橫門邸閣足以周食王基所謂南頓有大邸閣計足軍人四十日糧皆邸閣積粟之明證也諸葛亮治斜谷邸閣亦是積所運之米以為伐魏之資非治阺岸閣道也通鑑所書者三觀其上下文則阺閣之義不待辨而明矣程大昌曰為邸為閣貯糧也通典漕運門後魏於水運所立邸閣八所俗名為倉陸遜入江夏催人種葑豆史照釋文曰葑方用切菰根也江東有葑田海陵本同余按葑音封菜也亦謂之蔓菁豆菽也陸遜之兵時在江夏催人種菜及菽示將久駐以給軍食種菰根何用邪又江東之葑田乃是葑泥其深有沒牛者此田又不産菰根諸葛亮作身沒之後退軍節度令魏延斷後史照釋文曰斷都玩切絶也余謂斷後者為殿也勒兵在後以斷追兵斷音丁管翻諸葛亮廢廖立為民徙之汶山史照釋文曰汶亡運切海陵本同余按漢武帝開汶山郡汶音岫禹貢岷嶓既藝岷山導江之岷史記皆作汶索隱曰汶亦作岫楊正衡晉書注汶山亦音岫廣韵十七真韻內亦有汶字武巾切此皆明證也但史照於四十五卷漢明帝永平十七年先有此誤至此又誤焉至八十四卷晉惠帝元寧元年汶山羌之汶音旻則亦知有旻音至八十八卷愍帝建興元年汶山則又音問此輕於著書缺反復紬繹而然也通鑑釋文辨誤卷三
