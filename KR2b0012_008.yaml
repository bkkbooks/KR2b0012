body:
  text: 通鑑釋文辯誤巻八宋胡三省撰通鑑一百六十八凡一條文帝天嘉三年和士開善握槊史炤釋文曰槊通作矟矛長丈八者為槊海陵本同余按握槊局戲也李延壽曰握槊盖胡戲近入中國劉禹錫觀博曰握槊之器其制用骨觚稜四均鏤以朱墨耦而合數取應日月視其轉止依以爭道史炤乃以為握丈八之槊是但知槊之為兵器而未知握槊之為局戲也通鑑一百六十九凡二條五年陳寶應逃至莆口史炤釋文曰莆音甫海陵本同余按莆口在唐泉州莆田縣界今興化軍之地莆音蒲音甫非天康元年周信州蠻冉令賢等反逺結涔陽蠻為聲援史炤釋文曰涔陽渚之蠻在郢中余按後周置信州於永安唐之䕫州也酈道元曰江陵西北有紀南城楚文王自丹陽徙此平王城之班固言楚之郢都也楚辭曰邅吾道兮洞庭望涔陽兮極浦屈原楚人也至洞庭然後可以望涔陽則涔陽之不在郢中亦明矣道元又曰涔水出作唐縣西北天門郡界南流逕涔評屯屯堨涔水溉田數千頃又東南流注于澧水涔陽盖居是水之陽也二百六十六巻梁太祖開平元年雷彥恭攻涔陽公安正此涔陽史炤釋亦誤九域志江陵府公安縣有涔陽鎮通鑑一百七十凡八條臨海王光大元年巴山太守黄法慧從宐陽出醴陵共襲華皎史炤釋文作澧陽注曰天門邑余按地理志醴陵澧陽自是兩縣醴陵縣後漢置屬長沙郡澧陽縣晉武帝太康中立天門郡治焉時華皎據長沙安成王頊使吳明徹等帥舟師泝江攻之又使黄法慧從宐陽出醴陵以襲其不備宐陽漢之宐春縣也晉孝武帝避其母鄭太后諱改為宐陽今袁州宐春郡也自宐春至醴陵不及二百里澧陽則在洞庭太湖之北自宐春襲長沙不出澧陽也齊主封弟仁約為樂浪王史炤釋文曰樂浪郡名古朝鮮之國其地系北齊余按齊主以古郡名爵諸弟為王耳未嘗使之君國子民樂浪古朝鮮之地自晉至于慕容氏之末世已不能有其地北齊安能系屬之哉宣帝太建三年周遣右武伯谷㑹琨等聘于齊史炤釋文作堒注曰其字未詳余按通鑑諸本皆作琨炤所見本於昆旁王偶缺上一畫耳五年齊人於秦郡置秦州州前江浦通涂水史炤釋文曰涂同都切水出益州牧靡南山西北入繩海陵本同余按晉惠帝置堂邑郡於漢堂邑縣至安帝改堂邑郡為秦郡以秦之僑人居其地故也北齊取淮南就以秦郡置秦州唐滁州六合縣即其地因滁水以名州涂讀為滁辯已見七十五巻魏邵陵厲公嘉平三年八十巻晉武帝咸寕五年漢益州郡牧靡之地自宇文倂蜀弃之荒外宇文且不能有其地齊人境土西限於宇文其能有牧靡之地乎是時陳師伐齊以復淮南豈攻益州哉此乃漢堂邑之滁水非漢牧靡之涂水也七年周主伐齊鮑宏曰進兵汾潞直掩晉陽史炤釋文曰汾潞二州名系後周余按周齊敵國疆埸之間各置州郡齊置汾州於西河周置汾州於定陽若潞州上黨郡則屬齊地周建德六年始平齊陳太建之九年也宣政元年分并州上黨郡始置潞州太建之十年也烏得於太建七年以潞州系後周哉盖鮑宏論伐齊直言進兵之路不指州名而指水名自汾水取平陽過雀䑕谷可以掩晉陽自上黨潞川入壺關黃澤亦可以掩晉陽非指二州名也八年周主謂羣臣曰朕去歲屬有疾疹遂不得克平逋寇史炤釋文曰疹章忍切瘾疹皮外小起也余按此疾疹之疹與疢字同音丑刃翻經傳作疢作疹者俗書也周武帝舉大兵以伐國不應以皮外小起瘾疹而還師史炤之淺妄率如此至二百三十六巻唐順宗永貞元年方能以疹為乆疾乃因通鑑正文積疹而生義然音切終不能改也前出河外直為拊背未扼其㗋史炤釋文曰拊揗也謂摩其背也余按周主此語本之婁敬婁敬説高祖曰夫與人鬪不扼其吭而拊其背未能全勝周武帝前此伐齊至河陰而還以鬪為喻猶拊背也拊者擊也不當以拊摩為説若與人鬪而拊摩其背乃是為之搔痒豈是與之鬪邪一百八十四巻隋恭帝義寕元年拊其背注亦誤齊主獵於祁連池史炤釋文曰祁連山之池也在匈奴中余謂此祁連池汾陽之天池也即後所謂獵於天池者也史互言之耳北人謂天為祁連故天池有祁連池之名猶匈奴呼天山為祁連山也祁連山漢書音義釋之甚明汾陽之天池水經注言之甚詳余悉取以注通鑑能讀之者可考見也且齊主獵時周兵已攻晉州若獵於匈奴界中祁連山之池安能以丙辰獵而癸亥即還晉陽邪天池在汾陽縣北燕京山上方里餘燕京山亦謂之管涔山五臺山之一也詳考通鑑所書九月癸亥齊主自獵所還晉陽甲子即集兵庚午帥諸軍趣晉州癸酉昧旦晉州陷此日齊主已分軍向千里徑及汾水關又帥大軍上鷄栖原矣若方與馮淑妃獵於天池驛奏沓至且不暇省安能部分出軍邪盖通鑑會稡諸書以為一書其排日書甲子以李百藥北齊書令狐德棻後周書帝紀為據自與馮淑妃獵天池至晉州已陷乃奏之一段是引用李延壽北史馮淑妃傳所以所記有參差不齊者竊謂丙辰齊主獵於祁連池與後所書與馮淑妃獵於天池實一事也唐書地理志嵐州静樂縣有天池祠竇苹曰天池祠在今寕化軍北六十里橫嶺下管涔山通鑑一百七十三凡一條七年齊領軍大將軍尉相願史炤釋文曰相息良切姓也願其名相氏出姓苑又息浪切後秦錄有馮翊相雲作德獵賦余按史炤之説皆以廣韵為據然尉相願者姓尉名相願若如炤説以相為姓願為名將以尉字為衍字乎時高氏所用皆勲戚也尉相願之進用必以尉景通鑑一百七十四凡三條十二年于仲文軍至蓼隄去梁郡七里史炤釋文曰蓼縣之隄音力竹切費本同余考五代志梁郡無蓼縣也元豐九域志曰蓼堤漢梁孝王築在梁郡西北通鑑本文言去梁郡七里若以蓼縣為梁郡附城之縣則當治郭下若以蓼縣為外縣無縁去城七里便置縣史炤之説不待攻而破矣蓼讀如字于仲文取金鄉席毗羅軍大潰爭投洙水死史炤釋文曰洙水出泰山葢縣臨樂山北入泗余按史炤能言洙水所出與所入而已水經洙水自葢縣西南流至卞縣入泗酈道元注則曰洙水至卞城西南入泗水亂流西南至魯縣東北又分為二南為泗水北為洙瀆春秋莊九年浚洙杜預謂洙水在魯城北浚之以備齊者也孔子敎於洙泗之間闕里是也從征記曰洙泗二水交於魯城東北十七里闕里背洙泗洙水又南逕瑕丘城又西南逕山陽南平陽之顯閭亭又南至高平南入于泗金鄉縣在高平西北縣北有金鄉山前漢未置金鄉縣後漢晉志方有之戴延之西征記焦氏山北有數山漢司隷校尉魯恭葬山南鑿而得金故曰金鄉山金鄉去洙水差逺盖席毗羅軍既潰走于仲文追奔蹙之洙水故爭投水而死也周殺代奰王達滕聞王逌史炤釋文曰代徒對切姓也奰平祕切名也玉音肅姓也達其名海陵本同余謂史炤以代奰王達為二人姓名則下文滕聞王逌亦二人姓名乎釋文以古有玉姓欲以稀姓愚後學殊不思讀通鑑者詳味上下文則代與滕其封國也奰與聞其諡也達與逌其名也其姓則宇文皆後周親王也楊堅專周政而殺之加以惡諡炤既不能發顧以代奰王達四字離析為二人姓名將以愚人人有知識其可愚乎代音徒耐翻王讀如字十一家諡法色取行違曰聞不醉而怒曰奰通鑑一百七十五凡三條十三年隋主如岐州史炤釋文曰岐州元魏所置至隋廢之余按魏書地形志太和十一年置岐州治雍城鎮至煬帝大業三年始改州為郡是年隋文帝受周禪改元開皇岐州未廢也若已廢岐州則史不書如岐州矣沙鉢略從父玷厥居西面號達頭可汗史炤釋文曰玷厥突厥種名余按通鑑本文明言玷厥為沙鉢略之從父號為逹頭可汗讀者皆知玷厥為人名而釋以為突厥種名何其舛也長城公至德元年吐谷渾寇隋臨洮洮州刺史皮子彥出戰敗死汶州摠管梁逺撃走之史炤釋文曰汶音問以汶水為名水出琅邪余按吐谷渾居西垂時寇洮岷汶州即唐之岷州與漢之汶山郡之汶同史炤以琅邪汶水為釋音義皆誤汶山之汶讀曰岷辯已見七十二巻魏明帝青龍元年通鑑一百七十六凡二條二年隋以賀婁子幹為楡關摠管史炤釋文曰楡關在隴右䝉恬為秦將侵胡開地數千里壘石為城樹楡為塞是也余按在隴右者漢金城郡之楡中縣也䝉恬壘石為城樹楡為塞者漢上郡之楡林塞也隋置楡關摠管於唐勝州界三年豐州刺史章大寶昭逹之子也在州貪縱朝廷以太僕卿李暈代之史炤釋文作本暈注曰本與㡷同戎姓暈其名海陵本同余按本字乃李字之誤也史炤别引㡷字以為説此與徐道明見鄭𤣥論語序云書以八寸䇿誤作八十宗因曲為之説者何異通鑑一百七十七凡一條隋文帝開皇九年陳武州刺史鄔居業史炤釋文曰鄔姓也鄔郡太守司馬彌牟之後因以為氏費本同余按史炤據廣韵而為釋也左傳昭二十八年晉滅祁氏羊舌氏分其田以為縣以司馬彌牟為鄔大夫是以鄔為縣非以鄔為郡也以司馬彌牟為縣大夫非以為郡太守也秦罷侯置守三十六郡皆曰守至漢景帝中二年始以郡守為太守此皆考之不精之過也通鑑一百七十八凡一條十八年設鹿角為方陳史炤釋文曰鹿角陳名猶春秋魚麗之陳爾余按炤於一百五十二巻梁武帝大通二年葛榮列陳箕張而進釋曰箕張猶春秋魚麗之陳於此又曰鹿角猶春秋魚麗之陳如此則凡陳法惟有魚麗陳一法而已嘻可笑也設鹿角為方陳者斬木存其大本凡枝皆剡其端如鹿角然埋之陳前以禦胡馬衝突内為方陳非如春秋魚麗之陳也通鑑一百七十九凡二條二十年車騎將軍榆林閻毗史炤釋文曰榆林縣名隋置勝州兼置此縣其地有榆溪塞即䝉恬為秦侵胡累石為城樹榆為塞是也余按史炤於一百七十六巻陳長城公至德二年隋以賀婁子幹為榆關摠管注云榆關在隴右下亦引䝉恬樹榆為塞事今又以為在勝州以此注為是則前注為非矣葢炤以為勝州者以隋志勝州榆林郡及榆林縣為據也然引樹榆為塞事酈道元以為在上郡道元曰諸次水出上郡諸次山其水東逕榆林塞即漢書所謂榆溪舊塞者也自溪西去悉榆柳之藪緣歴沙陵届龜兹西出故謂之廣長榆也王恢云樹榆為塞謂此矣以水經河水所歴考之其地在銀夏之北唐之綏銀麟勝皆漢上郡地炤前言榆關在隴右非也今因榆林而引樹榆為塞事則近之仁壽二年忤意者嚴霜夏零史炤釋文曰零雨余謂此言楊素威權忤其意者禍罰立至如當夏降霜非零雨之謂也通鑑一百八十凡二條四年嵐州刺史喬鍾葵史炤釋文曰嵐州名在太原因岢嵐山為名有渥洼地出良馬亦山氣也余按史炤之説全引廣韵廣韵以為嵐州近太原猶可史炤以為在太原則繆矣漢武帝得神馬渥注水中李斐以為在敦煌界今云嵐州有渥洼地未知廣韻何所據也至云亦山氣也則是廣韻解嵐字為山嵐之嵐其義不為嵐州發也炤亦引之以釋嵐州可謂無所决擇矣楊素姪𤣥挺史炤釋文作𤣥挻注云挻抽延切費本同余按隋書作𤣥挺音徒鼎翻通鑑諸本亦皆作𤣥挺通鑑一百八十一凡二條倭王多利思比孤史炤釋文曰倭女王國名在東海中費本同余按范曄後漢書倭國在韓國東南大海中依山島而居其地大較在會稽東冶之東與朱崖儋耳相近漢桓靈間倭國大亂更相攻伐歴年無主有一女子名卑彌呼事鬼神道能以妖惑衆於是共立為王當時因謂之女王國又按新唐書曰日本古倭奴也其王姓阿毎氏自言初主號天御中主至彥瀲三十二世自彥瀲至目多利思比孤三十一世其間惟一世立女王耳桓靈之際固嘗謂之女王國隋唐之間豈復謂之女王國哉八年宐社於南桑乾水上史炤釋文曰桑乾即馬邑屬雁門余按漢書地理志馬邑縣屬雁門郡桑乾縣屬代郡自是兩縣而謂桑乾即馬邑可乎水經濕水出雁門陰館縣東北過代郡桑乾縣南與桑乾水會因總謂之桑乾水東北流過薊縣故城南時煬帝在薊將伐高䴡故宐社於桑乾水上通鑑一百八十二凡三條九年詔徴天下兵集涿郡史炤釋文曰涿范陽邑余按通鑑本文曰涿郡而史炤以范陽之邑誤矣自漢高帝置涿郡而治涿縣曹魏改涿郡曰范陽郡隋開皇初廢范陽郡大業初倂燕范陽置涿郡治薊而涿縣屬焉此郡名廢置徙治離合之辨也閺鄉張須陀史炤釋文曰閺鄉在洪農胡縣余按史炤以漢地理為釋也元魏以胡縣為胡城縣隋開皇十八年改胡城縣為閺鄉縣史言閺鄉張須陀謂須陀乃此縣人也衛文昇以歩騎二萬度瀍水史炤釋文曰瀍水出河南北山入于河余按水經瀍水出河南穀城縣北山東與千金渠合東過洛陽縣南又東過偃師縣東入于洛炤釋所指河南抑河南郡邪抑河南縣邪其言入河只泥禹貢伊洛瀍澗既入于河一語未嘗詳考川瀆之會歸也通鑑一百八十三凡四條十二年蘇威曰他日賊據長白山今近在汜水史炤釋文曰汜水名在河南成臯余按史炤亦是據漢地理為釋也開皇十八年改成臯為汜水縣有汜水關時屬滎陽郡林士𢎞與劉子翊戰于彭蠡湖史炤釋文曰彭蠡澤名按尚書是江漢合處在揚州之西界余按江水與漢水合於夏口夏口今卾州彭蠡湖在彭澤縣西禹貢言漢水過三澨至于大别南入于江東匯澤為彭蠡其言甚明何嘗言彭蠡是江漢合處漢書地理志湖漢水出雩都東至彭澤入江言彭蠡是江水與湖漢合處則可矣恭帝義寕元年突厥立劉武周為定楊可汗遺以狼頭纛史炤釋文曰突厥先為鄰國所破有一兒弃澤中與狼交合生十子其一最賢者為君長於牙門建狼頭纛故劉武周以此遺突厥余觀通鑑本文突厥立武周為可汗故遺以狼頭纛非武周以遺突厥也朝邑法曹􅀈孝謨以蒲津中潬二城降史炤釋文曰河陽南有中潬城費本同余按字書水中有沙曰潬隋都長安於蒲津起河橋以通河東故有中潬城以守固河橋河陽在洛陽北起橋以度河陰亦有中潬城以守固河橋中潬之名雖同而有河陽橋蒲津橋之異此時唐公引兵自河東欲濟河而西􅀈孝謨以蒲津中潬二城降乃蒲津之中潬非河陽之中潬也蒲津城在橋之西岸通鑑一百八十五凡四條唐高祖武德元年李密以楊汪為宋州總管史炤釋文曰後周武帝以王謙為益州總管總管之名始此費本同余按令狐德棻後周書周明帝武成元年初改都督諸州軍事為總管其見於史者則安成公憲為益州總管尉遲綱為荆州總管尉遲迴為秦州總管則總管之名非始於用王謙也隋煬帝謂蕭后曰儂不失為長城公卿不失為沈后史炤釋文曰沈直金切言為沈湎之后海陵本同余謂煬帝顧天下已亂知必為他人禽已與蕭后不失為陳後主夫婦也按陳後主為隋所禽封長城公其后沈氏君理之女也渉獵經史工書翰陳亡與後主俱入長安及後主薨后自為哀辭文甚酸切煬帝每所廵幸常令從駕及煬帝為宇文化及所弑后自廣陵還鄉里不知所終烏得謂沈后為沈湎之后乎沈音式荏翻宇文化及於帳中南面坐人有白事者黙然不對下牙方取啓狀與唐奉義等參决之史炤釋文曰牙旗名軍中所建下牙言其視事晚也余謂下牙猶古之言退朝也豈視事晚之謂乎劉馮事始曰牙旗者將軍之精軍行建牙後世至於官府早晩軍吏兩謁亦謂之牙呼謂既熟雖天子正殿受朝謁者亦名正牙薛舉進逼髙墌史炤釋文曰高墌城名墌之石切海陵本同余按新唐書地理志寕州定平縣有高墌城墌音章恕翻唐韵有􅀈字亦章恕切釋云畨山豈西蕃中以山為􅀈乎下巻折􅀈音亦誤惟杜佑通典􅀈音思歴切通鑑一百八十六凡三條程知節為王世充騎所逐刺槊洞過知節廻身捩折其槊史炤釋文曰捩力計切拗捩也海陵本同余按韵書捩音力計切琵琶撥也拗捩之捩音練結翻右翊衛大將軍淮安王神通史炤釋文曰唐有十六衛各有左右其左右衛及左右金吾衛謂之四衛餘謂之雜衛費本同余按隋受周禪置左右衛等十二府曰左右衛曰左右武衛曰左右武候曰左右領左右曰左右監門曰左右領軍唐初置十六衛府曰左右翊衛曰左右驍騎衛曰左右屯衛曰左右禦衛曰左右僃身曰左右武衛曰左右監門曰左右候衛至武德五年改左右翊衛曰左右衛屯衛曰威衛禦衛曰領軍衛僃身曰左右餘不改高宗龍朔二年始改左右候衛為左右金吾衛炤謂唐以左右衛及左右金吾衛為四衛盖唐中世以後事也且炤不言翊衛置官之由而泛引四衛為釋未為精切綦公順攻北海劉蘭成襲擊之公順大敗弃營走郡城獲全史炤釋文提起走郡二字注曰走音奏趣嚮也余謂當以弃營走為句以郡字屬下句走讀如字文理明白不煩注釋通鑑一百八十七凡四條二年竇建德收隋鹵簿儀仗史炤釋文曰炙轂子云車駕行幸羽儀導從謂之鹵簿字書鹵大盾也以甲為之所以捍敵甲楯部伍之次皆著之簿籍儀衛皆具五兵獨以甲楯為名者行道之時甲楯居外餘兵在内故謂鹵簿也費本同又張文伯曰五經精義云鹵大盾以大盾領一部之人故言鹵簿宋綬序鹵簿圖謂有文事則有武備故整法物之駕嚴兵師之衛摠曰鹵簿漢蔡邕獨斷曰漢天子出車駕次第謂之鹵簿官有注名曰甘泉鹵簿余謂此皆言天子法從儀物之鹵簿也然公卿儀從亦謂之鹵簿顏竣柄用於宋孝建之初其父延年常乗羸牛笨車逢竣鹵簿輒屏住道側語竣曰吾平生不憙見要人今不幸見汝沈慶之夢引鹵簿入厠中占者曰後必富貴此公卿儀從亦謂之鹵簿之明證也唐制有皇后鹵簿外命婦三品已上亦有鹵簿車駕鹵簿固有甲楯皇后鹵簿必不用甲楯公卿及外命婦鹵簿烏得用甲楯乎然則以鹵簿為取鹵楯為義者末學膚受之説耳二百二十三巻代宗永泰元年鹵簿釋亦誤王世充遣其將高毗寇義州史炤釋文曰義州凡有五一在懷州武德縣一在衛州汲縣一在易州容城縣一在光州商城縣一在眉州洪雅縣武德之義州乃世充境内非所寇者余按通鑑是年五月書世充陷義州復寇西濟州西濟州置於濟源縣新唐書地理志武德二年改懷州安昌縣為武德置北義州則武德之義州正唐境内非王世充境内也高毗所寇即北義州衛州汲縣之義州武德元年置亦唐境也六月丁未劉武周進逼介州七月辛卯宋金剛寇浩州史炤釋文於介州則注曰武德元年以介休縣置浩州又更名介州於浩州注則曰浩州本介休縣又有江州彭澤縣置浩州非此余按此一年事也自六月丁未至七月辛卯四十四日耳州名更改不應如是之遽是年通鑑又書劉武周屢遣兵攻西河浩州刺史劉聸拒之及裴寂敗自晉州以北城鎮俱沒惟西河獨存又是年十一月通鑑又書劉武周寇浩州炤註曰是浩州有二武周所寇乃介休之浩州炤盖守介休置浩州之説殊不思通鑑於六月丁未已書武周陷介州若浩州本是介休縣則已歸武周矣新唐書地理志曰汾州治西河本浩州武德三年更名汾州隋義寕元年以介休平遥置介休郡武德元年曰介州則浩州置于西河介州置于介休明矣杜伏威請降史炤釋文曰杜伏威起淮南又據歴陽與陳稜李子通俱有窺江表之心後為李子通所敗來降海陵本曰杜伏威起淮南後為李子通所破來降余按海陵本刪取史炤釋文以為注亦可以明其實蹈襲史炤而託之公休以欺世也詳觀通鑑本文李子通數破沈法興軍既克陳稜又破沈綸軍而伏威引去而伏威未嘗敗也至武德三年伏威遣輔公祏王雄誕等撃破子通四年又遣雄誕撃禽子通送長安曷嘗為子通所破哉盖是時唐之威德暢洽故伏威請降五年秦王撃徐圎朗聲震淮泗伏威於是懼而入朝詳考事之本末可以見矣通鑑釋文辯誤卷八
