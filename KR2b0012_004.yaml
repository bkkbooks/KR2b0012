body:
  text: 通鑑釋文辯誤卷四宋胡三省撰通鑑七十三凡二條青龍三年帝好土功旣作許昌宮史炤釋文曰許昌漢潁川長社邑獻帝都之魏文帝改曰許昌明帝於此建宮海陵本同余按兩漢志潁川郡有長社縣又有許縣漢獻帝都許魏文帝命曰許昌許昌與長社自是兩縣歴晉至隋唐皆然烏得以許昌為長社邑哉景初元年時有詔錄奪士女前已嫁為民妻者還以配士人又簡選其有姿首者内之掖庭史炤釋文曰掖庭即宮中永巷也後改為掖庭余按漢書音義永巷宮中之長巷也前漢書百官表少府屬官有黃門鉤盾尚方御府永巷内者宦者七官令丞武帝太初元年更名永巷為掖庭此特言官名更改以永巷令為掖庭令耳呂后囚戚夫人於永巷成帝送劉輔於掖庭祕獄自漢初以來凡為是官者掌理後宮有罪者今簡士女而内之掖庭固不可以此為釋也韋昭曰在掖門内謂之掖庭此固可以言之於此宮掖二字人通言之葢居者謂之宮附左右者謂之掖内之掖庭未得班於六宮也通鑑七十四凡三條三年吳主遣諸將唐咨等絡繹相繼史炤釋文作駱驛注曰驛馬也余按前史駱驛與絡繹字雖異而義則同通鑑言絡繹相繼文義不待釋而明豈驛馬之謂乎邵陵厲公正始元年諸葛瑾攻柤中史炤釋文曰柤之加切春秋魯襄公㑹吳于柤即此海陵本同余按春秋柤之㑹杜預注曰柤楚地左傳是年三月癸丑齊太子光先㑹諸侯於鍾離四月戊午㑹于柤丙寅圍偪陽鍾離今濠州偪陽在徐州界以兩地參之則柤在沂沭間此柤中在沔上非春秋㑹吳之地也襄陽記曰柤中之柤讀如租稅之租柤中在上黃縣界去襄陽一百五十里沔南之膏腴沃壤謂之柤中杜佑通典曰柤中在襄州南漳縣界以此言之史炤誤矣正始四年漢董允欲斆費褘之所行史炤釋文曰斆敎也余按斆字固以敎為義但言董允欲敎費褘之所行上下文義殊不通斆當作效通鑑七十五凡六條八年吳揚聲欲入寇王基䇿之曰此不過欲補䘺支黨還自保護耳海陵本釋文曰䘺衣縫解也史炤誤已在五十三卷漢桓帝元嘉元年余按禮記内則衣裳䘺裂謂衣縫解也若此所謂補䘺支黨自當以補綴為義崔寔政論所謂補䘺缺壞枝拄邪傾韓愈詩所謂破襖請來䘺皆與此補䘺同義九年曹爽劾孫禮怨望結刑五歳史炤釋文曰結締也謂刑不解者五歳余謂結者刑法家所謂結正罪名也結刑五歳結以徒作五歳之刑而不輸作嘉平三年王凌聞吳人塞涂水史炤釋文曰涂同都切水名出漢益州牧靡南山西北至越巂入繩水出馬湖合岷江費本同余按通鑑所謂吳人塞涂水者即去年吳主遣軍所作堂邑塗塘也傳寫通鑑者誤添土於涂下為塗當作涂涂水在堂邑今滁州滁河即此水吳塞滁河之水以淹北道限魏兵涂讀曰滁若益州越巂之涂水則在蜀境非吳境也吳人安得而塞之史炤於一百七十一卷陳宣帝太建五年復誤隨事辨之于後令狐愚辟山陽單固為别駕史炤釋文曰單多寒切姓也余按單姓之單音善姓苑以為出於周卿士單襄公之後拓䟦興于代北其部帥有可單氏後孝文帝遷洛用夏變夷改為單氏單音都寒翻都寒之單後魏太和之後始有此姓三國時安有此姓邪四年立皇后張氏東莞太守緝之女也史炤釋文曰東莞漢琅琊邑入三國屬吳余按東莞縣漢屬琅邪郡魏分為東莞郡其地在淮外吳守江而已安能越淮而有東莞邪且魏立皇后而取吳東莞太守之女必無是事丁奉使兵倮身緣堨史炤釋文曰堨於割切壁也說文壁間有隙海陵本同余謂聚土石以壅水曰堨吳築東興堤以遏巢湖故謂之堨七十七卷高貴鄉公丼露二年吳人欲向徐堨正此堨也丁奉之兵捨舟登岸以攻魏屯安有壁隙之可緣哉通鑑七十六凡二條高貴鄉公正元二年司馬師新割目瘤瘡甚史炤釋文曰瘤力救切赤瘤腫病也海陵本同余謂瘤者懸疣附贅之類目瘤之疾今人亦有之瘤音留吳孫峻進至橐臯海陵本釋文曰音拓姑余按海陵本從孟康音也春秋哀十二年會吳于槖臯陸德明經典釋文曰槖章夜翻又音託今其地在無為軍界猶呼為拓臯葢經從上音也臯讀如字通鑑七十七凡二條丼露二年姜維出駱谷至沈嶺時長城積穀甚多而守兵少鄧艾進兵據之以拒維史炤釋文曰長城方城山名左傳所謂楚國方城以為城者在漢南陽堵陽葉縣之境山自比陽連百里號曰方城亦曰長城海陵本同余按姜維出駱谷至沈嶺鄧艾據長城拒之此長城當在郿縣之南沈嶺之北烏得謂為方城之長城乎水經注駱谷水出郿塢東南山駱谷北流逕長城西又北流注于渭此正鄧艾所據之長城也凡註地理須博考史籍仍參考其地之四旁地名以為證據何可容易着筆乎元帝景元二年襄陽太守胡烈表言吳將鄧由等十八屯同謀歸化詔王基部分諸軍徑造沮水以迎之史炤釋文曰沮水出武都東狼谷南至沙羡入江余按漢書地理志沮水有二一出武都沮縣東狼谷中南至沙羡入江蓋合于漢而入江也故水經注云沔水一名沮水一出漢中房陵淮山東至郢入江左傳所謂沮漳之沮也水經又云沮水出漢中房陵縣淮山東南過臨沮縣界又東南逕當陽縣北又東南過枝江縣東南入于江此令王基部分諸軍徑造沮水正指臨沮當陽之沮水非指東狼谷之沮水也通鑑七十八凡一條四年諸葛緒趣截姜維較一日不及史炤釋文曰趣截速斷也趣趨玉切余謂史言諸葛緒趨前將以邀截姜維之軍較遲一日不及於事耳非速斷之謂也趣讀曰趨通鑑七十九凡四條晉武帝太始六年吳丁奉入渦口史炤釋文曰渦屋戈切又姑蕐切海陵本同余謂此渦口即渦水入淮之口史炤於七十卷魏文帝黃初六年音渦為烏禾切已誤矣今愈誤一百六十卷梁武帝太清元年渦陽音古禾切又音𤓰古禾切是𤓰又誤七年吳以陶璜為交州牧璜討降夷獠州境皆平史炤釋文曰西南夷謂之獠余按夷自是夷獠自是獠漢書所謂西南夷以在益州西南徼外者陶璜所討夷獠皆羈屬交州者也烏得以為西南夷乎通鑑下文言州境皆平可以知矣詳又見一百一十六卷安帝義熙七年一百四十六卷梁武帝天監二年八年徐肇夜遁衆兇懼皆弃甲挺走史炤釋文曰甲鎧也挺杖也海陵本同余按梃杖之梃從木不從手從手之挺其義出也㧞也挺走言弃甲㧞身而走也羊祜毎㑹衆江沔史炤釋文曰漢江沔水余按漢沔本是一水故漢書注云漢上曰沔羊祜鎮襄陽其所統之地在江沔之間江岷江也沔漢沔也史言會衆江沔蓋以晉荆州域界言之耳通鑑八十凡三條咸寕四年杜預上疏以為宜敕兖豫等諸州留漢氏舊陂繕以蓄水餘皆決瀝令飢者盡得魚菜螺蜯之饒史炤釋文曰螺大者如斗出日南漲海中余按螺蜯凡陂池湖澤皆有之第不能皆大如斗耳何必言出日南漲海中哉杜預所言正指兖豫陂澤所生之螺蜯非指日南漲海之螺也羊祜好遊峴山史炤釋文曰峴胡甸切余按峴山之峴音胡典翻未嘗有讀從去聲者一百一十九卷宋營陽王景平元年大峴一百六十卷梁武帝太清元年橐駞峴音誤與此同五年琅邪王伷出涂中史炤釋文曰涂同都切水名在堂邑海陵本同余按吳作堂邑涂塘堨今涂河之水以為塘也涂讀與滁同今滁州之全椒六合皆古堂邑地三國時謂之涂中一百一十二卷晉安帝元興元年一百一十七卷義熙十二年涂中音誤與此同通鑑八十一凡四條太康二年戎狄彊獷史炤釋文曰獷古孟切余按字書獷音古猛翻炤亦因土音語轉也三年王愷怳然自失史炤釋文曰怳然狂之貌海陵本同余謂怳然者失意之貌非狂之貌也四年新沓康伯山濤薨史炤釋文曰新沓水名海陵本同余按魏明帝景初三年以遼東東沓縣吏民過海居齊郡界者立新沓縣非水名也六年慕容渉歸與宇文部素有隙史炤釋文曰宇文部南單于之逺屬也余按宇文部亦鮮卑種其先有大人曰普回建國號曰宇文併以為氏宇文猶華言天子也通鑑下卷云鮮卑宇文氏段氏方彊可以知宇文之出於鮮卑史炤殊不之考不已疎乎通鑑八十二凡四條十年鮮卑宇文氏段氏方彊史炤釋文曰段氏鮮卑檀石槐之後余按杜佑通典徒河段疾六眷出於遼西因亂被賣為烏桓大人庫傉家奴庫傉以其健使將人衆詣遼西逐食遂招亡叛以至彊盛又按晉書王浚傳段疾六眷務勿塵之子段氏自務勿塵以來彊盛久矣疾六眷遭亂被掠容或有之蓋又招誘亡叛以益彊也然皆不言為檀石槐之後又按後漢書鮮卑傳檀石槐傳國至孫騫曼而嫡傳絶矣至其支孫歩度根魏明帝時為軻比能所併諸部大人遂各世相傳襲段氏固鮮卑種但鮮卑種姓甚衆非皆出于檀石槐史炤之說未知何據惠帝元康元年宐燒雲龍門以脅之史炤釋文曰脅火廹也宐作熁余謂此直恐脅威脅不必以火廹為釋亦不必改脅為熁拓䟦祿官分其國為三部一居上谷之北濡源之西自統之史炤釋文曰濡源在上谷之北屬幽州余按水經注濡水從塞外來入塞其發源之地逺在北荒中不屬幽州至後魏太武帝時置禦夷鎮於濡源之西北詳見一百一十四卷晉安帝義熙三年拓䟦猗盧居定襄之盛樂故城史炤釋文曰盛樂漢書作成樂城名在幷州新興郡海陵本同余按成樂縣前漢屬定襄郡後漢屬雲中郡至獻帝建安二十年以塞下諸郡冦亂荒殘省雲中定襄五原朔方郡郡置一縣領其民合以為新興郡故新興郡有定襄雲中二縣而成樂古城之地弃之塞外矣拓䟦氏既盛彊盡據幽州塞外之地猗盧遂據盛樂故城史炤但知晉志新興郡有定襄縣遂以為盛樂城在幷州新興郡殊不知魏晉新興郡之定襄縣唐志及元豐九域志忻州之定襄縣是也乃漢之陽曲縣地漢成樂古城拓䟦氏以為盛樂宮後置盛樂郡魏土地記雲中城東八十里有成樂城雲中城在陰山河曲宋白續通典曰漢定襄郡盛樂縣在陰山之陽黃河之北後魏所都盛樂是也唐平突厥於此置雲中都督府麟德改單于大都護府聖歴改安北都督府建中初為振武軍節度使治所通鑑八十三凡二條九年徙馮翊北地新平安定界内諸羌著先零䍐开析支之地史炤釋文曰顏師古曰䍐开羌之别種也漢武帝破之置縣因以此名之余按漢書地理志天水郡有䍐开縣師古注曰本破䍐开之羌處其人於此因名江統徙戎論盖欲徙内郡氐羌使還居塞外舊地先零䍐开本居湟中自大小楡谷以西屬之析支河首統欲徙之使還此地耳若天水之䍐开縣則在塞内乃降羌所居之地非䍐开舊居之地史炤之說非也永康元年成都治少城益州治太城史炤釋文曰少失邵切少城治成都太城治益州漢武帝開西南夷置益州郡治滇池更漢三國分置改置不一今太城治益州未詳益州所置也海陵本同余按成都有太城少城二城皆秦張儀所築儀既築太城後一年又築少城太城成都子城也少城唯西南北三壁東即太城之西墉秦置蜀郡晉武帝太康中改曰成都國改蜀郡太守曰成都内史成都治少城者成都内史治少城也益州治太城者益州刺史治太城也史炤蜀人豈無文獻之足徴既不能尚友古人又不能親師取友求其說而不得乃顛倒通鑑本文以為少城治成都太城治益州又汎引武帝所置之益州郡終不得其說疎繆甚矣通鑑八十四凡二條元寕元年趙王倫及子荂皆還汶陽里第史炤釋文曰汶陽魯郡之邑屬豫州余按倫廢還汶陽里第盖洛陽城中有汶陽里倫私第在焉非魯之汶陽也太安元年斬齊王冏於閶闔門外史炤釋文曰閶闔門名在河南洛陽之西海陵本同余按水經注曰禮天子有五門謂臯門庫門雉門應門路門魏明帝上法太極遂起太極殿於漢崇德殿之故處改雉門曰閶闔門史炤以為在洛陽之西葢以八方之風西方曰閶闔又晉志洛陽城西有廣陽西門閶闔三門殊不考天門曰閶闔魏明帝法天以名宮門也是時葢斬冏於宮門外通鑑八十五凡二條二年陸機釋戎服著白帢史炤釋文曰帢葛合切又乞洽切韎韐士服制如黻費本同余按字書韐葛合切韎韐者茅蒐染韋為之以蔽膝此帢音乞洽翻㡌也弁缺四隅謂之帢晉志曰魏武帝以天下凶荒資財乏匱擬古皮弁裁縑帛以為帢以色辨其貴賤本施軍服非為國容韎韐赤黻也非白帢也獄吏考掠孫拯史炤釋文曰掠離灼切余按經典釋文漢書音義考掠之掠音亮不從入聲通鑑八十六凡二條永興二年有星孛于北斗史炤釋文曰彗星謂之孛余按此杜預說也然彗自是彗孛自是孛彗長其光芒如掃箒故謂之彗孛者光芒蓬勃四出孛孛然也孛之災甚於彗通鑑有書彗者有書孛者别其為災有淺深也懷帝永嘉二年凉州刺史張軌病風張鎮移檄廢軌長史王融參軍孟暢蹋折鎮檄史炤釋文曰折之列切余謂蹋折之折當音食列翻中斷也曲折之折攀折之折則之列切通鑑八十七凡一條五年慕容廆見封悛封抽曰此家抎抎千斤犍也史炤釋文曰抎于粉切有所失春秋傳抎子辱矣海陵本同余按史炤以抎為有所失於慕容廆所言意義全說不通說文云抎從高而下也葢言千斤之犍人間不可多得若從天而下也通鑑八十八凡三條六年漢主聰謂帝曰卿贈朕柘弓銀研史炤釋文曰柘之夜切桑木余按柘自是柘桑自是桑二木之葉皆可以飼蠶柘木抽條勁直而長桑木敷枝擁腫而大柘之葉小而厚桑之葉大而薄今村莊園圃籬落皆有之居然可别也詩云其檿其柘檿山桑也周官考工記弓人為弓取幹之道七柘為上而檿居其三是則柘弓弓材之至善者豈可以桑木混而為言邪二百七十卷梁均王禎明四年桑柘釋亦誤漢趙固王桑自䂭磽津西渡史炤釋文曰䂭五勞切磽口勞切海陵本司余按䂭丘交翻磽牛交翻炤音非王澄留屯沌口史炤釋文曰江夏安陸有沌水其地曰沌口余按水經注沌水南通沔陽之太白湖湖水東南通江謂之沌口范成大曰自石首縣舟行一百七十里至魯家洑自魯家洑入沌沌者江旁支流如海之㳌其港僅過運河兩㟁皆蘆荻支港皆通小湖故為盗區客舟非結伴不可行張舜民曰下汊故鎮南對金口自沌口至下汊五十餘里金口在卾州西南金口之下即竇家沙江之西岸有沌口參而考之沌水不出於安陸通鑑八十九凡三條愍帝建興三年鄭攀馬雋屯溳口史炤釋文曰溳水出江夏安陸名曰溳口余按水經注溳水出蔡陽縣東南過隨縣又南過江夏安陸縣分為二水西入于沔者謂之溳口劉曜進㧞馮翊轉寇上郡史炤釋文曰轉寇轉相為寇也余謂轉移也言劉曜既㧞馮翊又移兵寇上郡也四年石勒圍樂平太守韓據于坫城海陵本釋文曰坫都念切余按海陵本蓋據楊正衡晉書釋音然考晉武帝泰始中分上黨太原置樂平郡治沾縣顏師古漢書音義沾音他兼翻載記誤作坫耳當作沾讀從顏音通鑑九十凡四條元帝建武元年朱伺就王廙於甑山史炤釋文曰甑山縣名余按甑山時屬零陵界隋朝方置甑山縣此時未為縣也周訪進至沌陽史炤釋文曰江夏安陸縣有沌水其地曰沌陽余按史炤此注與八十八卷懷帝永嘉六年沌口注同但改沌口為沌陽耳如此注書豈不容易沈約志沌陽縣江左立屬江夏郡水經沔水逕沌陽縣北又東逕林障故城北以其地在沌水之陽故以名縣大興元年冬十月劉曜至赤壁即皇帝位以石勒為大司馬大將軍加九錫增封十郡進爵為趙公史炤釋文提起趙公注曰劉曜字永明元海之族子僣即皇帝位于赤壁國號趙改元光初始於此余按劉曜即皇帝位于赤壁改元光初國號仍舊曰漢封石勒為趙公至二年進石勒爵為趙王因斬勒使王修勒遂與曜為讐敵之國曜既還長安其下奏言劉淵始封盧奴伯曜又王中山請改國號為趙曜從之石勒於是年冬十一月亦即趙王位自是以後通鑑書劉曜則曰趙書石勒事則曰後趙以别之大興元年冬十月之趙公石勒也烏得以劉曜國號趙為注邪至下注中山趙分想亦自知其誤而不能改此誤何也高句麗數寇遼東慕容廆遣慕容翰慕容仁伐之髙句麗王乙弗利逆來求盟史炤釋文曰乙弗虜複姓利逆其名即高句麗王也余謂乙弗利者高句麗王之名逆迎也迎慕容之兵而求盟也虜複姓固有乙弗氏然自漢以來高麗王皆姓高氏至唐高宗時滅高麗高氏始亡通鑑九十一凡三條永昌元年郗鑒在鄒山掘蟄鷰而食之史炤釋文曰鷰雀之蟄藏者海陵本同余謂鷰秋後則蟄雀未嘗蟄也史只言蟄鷰史炤併雀言之何也明帝大寕元年帝畏王敦之逼欲以郗鑒為外援史炤釋文曰鑒古銜切余徧考字書此鑒字未有從古銜切者且通鑑前已有郗鑒而至此方突出一音以彰其繆殊可笑也九十六卷成帝咸康四年復有此誤越巂斯叟攻成將任回史炤釋文曰斯姓也叟其名海陵本同余按漢書西南夷傳自巂以東北君長以十數徙莋都最大顏師古注曰徙及莋都二國也徙音斯司馬相如難蜀父老曰略斯楡謂斯與葉楡也此斯即漢西南夷之斯種蜀曰叟孔安國尚書注所謂蜀叟者也斯叟者斯種及叟種也通鑑九十三凡三條二年溫嶠恐既去而錢鳯於後間止之史炤釋文曰間居莧切間迭也余謂此乃讒間離間之間非間迭之間九十七卷成帝咸康八年庾冰恐為它人所間炤注之誤與此同顏颺說沈充决破柵塘因湖水以灌京邑史炤釋文曰編木立柵以為陂塘也海陵本同余謂時沈充等寇逼京邑故編木立柵以護湖塘因謂之柵塘以通鑑本文觀之其義自明三年後趙王勒加宇文乞得歸官爵使擊慕容廆廆遣世子皝與索頭段國共撃之史炤釋文曰索頭姓也余按索頭即拓䟦氏之種類非姓也蕭子顯曰鮮卑被髪左衽故呼為索頭通鑑九十五凡二條成帝咸和七年趙郭敬南掠江西桓宣乗虛攻樊城悉俘其衆敬旋救樊宣與戰於涅水破之史炤釋文曰涅水出上黨涅縣余按此南陽之涅水也豈上黨涅縣之水乎水經注涅水出南陽涅陽縣西北岐棘山東南逕涅陽縣又東南逕安衆縣又東南流注於湍水又東南至新野縣南入于淯桓宣正破郭敬於此水九年城大慕輿埿史炤釋文曰慕輿代北複姓本慕容氏音訛又為慕輿也費本同余謂慕容慕輿同出於鮮卑其得姓之初各自為氏猶拓䟦之與㧞㧞非音訛也况其時慕輿埿實為慕容皝之臣豈有君姓慕容而其臣訛為慕輿之理拓䟦慕容皆鮮卑然拓䟦㧞㧞居代北慕容慕輿居遼西慕輿非代北複姓也通鑑九十六凡二條咸康四年趙王虎以桃豹王華帥舟師十萬出漂楡史炤釋文曰漂楡津在遼西余按水經清河東北過漂楡邑入于海注曰漂楡故城俗謂之角飛城趙記云石勒使王述煮鹽於角飛魏土地記勃海郡高城縣東北一百里北盡漂楡東臨巨海民皆煮鹽為業則漂楡津當在勃海界七年詔實王公以下至庶人皆正土斷白籍史炤釋文曰白籍謂白丁之籍耳費本同余按江左之制諸土著實戸用黃籍僑戸土斷白籍琅邪南度凡中土故家以至士庶自北來者至此時各因其所居舊土僑置郡縣名併置守令以統治之故曰正土斷不以黃籍籍之而以白籍謂以白紙為籍以别於江左舊來土著者也若以為白丁之籍則王公豈白丁哉通鑑釋文辯誤卷四
