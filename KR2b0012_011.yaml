body:
  text: 通鑑釋文辯誤巻十一宋胡三省撰通鑑二百三十三凡二條三年李泌曰太子安有異謀彼譛人者巧詐百端雖有手書如晉愍懐衷甲如太子瑛猶未可信史炤釋文曰愍懷謂晉愍帝懷帝也海陵本同余謂李泌正引賈后譛殺愍懷太子遹事通鑑於八十三巻晉惠帝元康九年紀愍懷手書事甚詳史炤且不能考豈可釋通鑑以傳世乎七年韋臯遣三部落總管蘇峞將兵至琵琶山史炤釋文曰琵琶川地名東奚所居余按琵琶川者東蠻所居蜀之徼外未嘗有奚也炤誤通鑑二百三十四凡三條九年僨軍蹙國史炤釋文曰僨僵仆也僨軍謂軍不嚴整若僵仆也余謂僨軍者覆軍也軍為敵人所敗顛覆不能復振若人之顛仆不能復起也萬榮縱欲跋扈勢何能為史炤釋文曰扈籬也水居者於水未至為扈水去則大魚䟦扈而出小魚獨留余按䟦扈之語自漢有之釋者以强梁為言史炤今以大魚䟦扈為説夫炤所謂扈者海瀕之人於海澨挿竹為之其字作滬大魚䟦滬東南瀕海之人初無此語中土之人與西北之人安知魚之䟦滬而為是語邪炤説可謂僻陋而不通從彊梁之説為是十年雲南王異牟尋令崔佐時衣牂柯服而入史炤釋文曰漢牂柯郡唐為牂州屬江南道羈縻州牂柯繫船杙也楚滅夜郎軍至且蘭椓船於岸因以名其處牂柯服謂牂柯人所服也余按史炤止祖述漢書注言牂柯郡所以得名之由未及唐時所謂牂柯也新唐書曰牂柯蠻在昆明東九百里東距辰州二千四百里其南千五百里即交州故通鑑下文載佐時之言曰我大唐使者豈得衣小夷之服小夷正指牂柯蠻通鑑二百三十五凡三條十二年以渾瑊王武俊並兼中書令史炤釋文曰渾戸本切本渾沌氏之後海陵本同余按渾瑊鐡勒九姓渾部之後世為臯蘭州都督安得為渾沌氏之後乎自安史反瑊從其父釋之在兵間父子各立戰功至德宗時瑊之勞績尤為顯著通鑑盖屢書不一書而足史炤前固嘗釋渾瑊矣至此方以為渾沌氏之後何邪又按劉禹錫集有送渾大夫赴豐州詩曰鳳衘新詔降恩華又見旌旗出渾家則渾字讀從上聲無亦其時渾氏功名鼎盛時人不敢言其出於藩落而為之諱遂以為渾沌氏之後邪觀唐世言氏族者本其所自出必各引前世帝王公侯卿大夫士之著見者或以國或以邑或以氏或以諡或以字或以官亦或以名者往往多有傅㑹今亦無從而辨正之也二百四十五巻文宗太和八年渾鐬炤釋同韋渠牟形神恌懆史炤釋文曰恌餘招切憂也悸也余按恌音他彫翻即輕恌之恌十六年泗州刺史張伾出兵攻埇橋史炤釋文曰埇橋地名在淮泗一曰道上加土為埇余按泗水固合於淮然言埇橋在淮泗抑以為在淮泗之交邪抑以為在淮泗之間邪此等注書胸中實無定見而持兩端之説而道上加土曰埇又因甬道而創生此義皆非確論也埇橋在徐州南界唐後置宿州於此江淮運船所必由之路也二百四十二巻穆宗長慶二年埇橋註又誤通鑑二百三十六凡一條順宗永貞元年制以積疹未復其軍國政事權令皇太子純句當史炤釋文曰疹止忍切乆疾也海陵本同余按疾疹之疹音丑刃翻從止忍切乃瘡疹瘾疹之疹此疹既以乆疾為釋不當從瘡疹瘾疹之音二百四十三巻穆宗長慶四年嗜欲勝而疾疹作炤釋又誤通鑑二百三十七凡一條憲宗元和元年阿跌光進本出河曲歩落稽史炤釋文曰阿跌氏其先河曲諸部貞觀初内屬賜姓李余按歩落稽即稽胡也自後魏以來已居塞内其内屬乆矣阿跌光進兄弟元和初以軍功賜姓亦非貞觀初也通鑑二百三十八凡三條四年許孟容曰臣為陛下尹京畿史炤釋文曰天子千里地以逺近言之則言畿也余按史炤徒知以王畿千里釋畿字為是説者屢矣終不足以發明通鑑所書之義按唐以洛陽為東都以河南府汝州為都畿以長安為西京以京兆鳳翔同華商邠等府州為京畿然此時許孟容為京兆尹自言尹京畿則止言京兆不及他州葢京兆府以長安萬年兩赤縣為京縣餘縣為畿縣故孟容自云尹京畿也古人之言其取義各有攸當當博考而求其所以言之意固不可膠柱一説以為釋四年悉甲壓境號曰伐趙史炤釋文曰悉其兵甲以鎮壓疆境余按譚忠説田季安以伐趙言悉甲壓境謂悉舉魏博之兵以壓趙境非以鎮壓魏博之疆境也舉兵以臨敵境曰壓炤釋非五年伊宥為安州刺史母卒於長安不時發䘮郗士美先備籃輿即日遣之史炤釋文曰籃竹也以為輿余按籃輿以竹為之非竹名也籃輿謂之擔子東南只謂之轎子通鑑二百三十九凡五條七年成德兖鄆使者史炤釋文曰兖鄆二州名余謂兖鄆固是二州名此書成德兖鄆使者言二鎮所遣之使者也王承宗時為成德節度使李師道時為兖鄆等州節度使兖鄆未賜軍號故止稱兖鄆猶田承嗣未賜天雄軍號止稱魏博也通鑑書唐藩鎮或以軍號或以州讀者自審别之可也八年夏綏節度使張煦史炤釋文曰夏綏二州名余謂此亦以二州為節鎮之名猶兖鄆也十年是時發諸道兵討吳元濟而不及淄青史炤釋文曰淄青二州名余按淄青與兖鄆共一鎮也李師道承父兄之業有兖鄆淄青曹濮登萊齊宻沂海十二州初肅宗置淄青兖鄆二節度使自侯希逸引平盧兵保青州而淄青兼有淄青平盧節度之號自李正已併有兖鄆淄青十五州而兖鄆遂兼淄青平盧之號師道正己之孫也據有十二州於河南諸鎮最為强大時人或以兖鄆稱之或以淄青稱之或以平盧稱之其實一鎮也二百五十五巻僖宗中和二年淄青亦猶是也兵將相失心孤意怯難以有功史炤釋文以心孤為心狐注曰謂心若狐之疑也余以上下文求其義葢謂兵與將相失則兵士之心孤心孤則意怯以此為説文理甚明順何必以孤為狐曲為之説邪十一年柳公綽曰京兆為輦轂師表史炤釋文曰轂輻所湊也唐以京兆為師表謂四方所輻湊也故曰京兆為輦轂師表余按自漢以為京兆者率曰待罪輦轂下葢謂京師在輦轂之下也言京兆為輦轂師表謂京兆之下以京尹為師表耳下巻十三年輦轂誤同通鑑二百四十凡一條十二年裴度觀築城於沱口董重質帥騎出五溝邀之大呼而進李光顔與田布力戰拒之賊退布扼其溝中歸路史炤釋文曰扼持也謂分布而持扼余按通鑑上下文布謂田布也非分布之布通鑑二百四十一凡六條十四年劉悟見李公度執手歔欷史炤釋文曰􅒣欷歎息貌余按字書􅒣欷泣餘聲葢􅒣欷者抆涕而收泗之聲非歎息貌二百七十二巻後唐莊宗同光元年釋􅒣欷誤同田𢎞正與劉悟相見於客亭即受旌節馳詣滑州史炤釋文曰説文游車載旌析羽註所以精進士卒節長一尺二寸凡為使者持之余按周禮斿車載旌註云斿車木路也析羽五色象其文德也説文曰旌析羽注旄首所以精進士卒炤釋逸旄首二字遂不成文理記曲禮武車綏旌德車結旌註云武車兵車綏謂垂舒之也盡飾也德車乗車結謂收斂之也不盡飾也正義曰旌謂車上旗旛也兵車尚威武故舒散旗旛垂綏然德車德美在内不尚亦奕故結纒其旒著於竿也兵車謂革路德車謂玉路金路象路木路既皆有旌特以綏結為别固不專以精進士卒為義又周禮掌節凡邦國之使有虎節人節龍節皆金也以英蕩輔之英蕩函也所以盛節此史炤所謂長尺二寸者也又有符節璽節旌節註云符節如今宮中諸官詔符也璽節者今之印章也旌節者今使者所擁節是也三禮義宗云節長尺二寸秦漢以下改為旌􅓚之形是則後世之節畧如古旌節之制而尺二寸之節後世不復有矣唐制節度使賜雙旌雙節行則建節樹六纛是所謂旌節也豈得以古者斿車載旌節長尺二寸釋唐之旌節乎邠寜節度使李光顔史炤釋文曰邠寕二州名余按新唐書方鎮表是年置邠寕慶三州節度使史特提邠寕二字以為節鎮之名其例猶淄青魏博鎮冀也二百七十九巻後唐潞王清泰元年辯同沉酣晝夜獶雜子女史炤釋文曰獶雜讀為獶雜余按樂記曰及優侏儒優雜子女故注云優雜當讀為獶雜今通鑑書獶雜炤又釋曰讀為獶雜何居穆宗長慶元年瀍為潁王史炤釋文曰潁于軫切州名余按潁餘頃翻炤音非劉總奏分幽涿營為一道史炤釋文曰涿郡也余按古固有涿郡隋唐併漢之燕國涿郡為幽州涿郡天寳元年改幽州涿郡為幽州范陽郡而涿郡遂不見於史況幽營皆州名不應獨釋涿為郡代宗大厯四年范陽節度使朱希彩表析幽州之范陽歸義固安置涿州則劉總所奏者幽州涿州營州欲分為一道非涿郡也通鑑二百四十二凡四條昭義節度使劉悟史炤釋文曰澤潞藩鎮自劉悟傳至劉正傳三世而滅有州五曰邢汾晉澤潞號昭義節度余按德宗以昭義軍號賜澤潞以寵李抱真非始於劉悟昭義節度領潞澤邢洺磁五州未嘗領汾晉也起復田布為魏博節度使至魏州號哭而入居于堊室史炤釋文曰堊烏故切余按堊烏各翻從烏故切非朱克融焚掠易州淶水遂城滿城史炤釋文曰淶水名出涿郡余按淶固是涿郡水名以唐時言之淶水則縣名也屬易州淶水縣乃漢涿郡遒縣地隋開皇元年以范陽為遒更置范陽縣於此地六年改范陽曰固安八年廢十年又置永陽縣十八年改為淶水因淶水以名縣也唐因之二年軍士日給不過陳米一勺史炤釋文曰陳米腐米也余謂陳米至腐敗不可食矣陳米謂藏之積年者耳通鑑二百四十三凡四條四年貶李紳為端州司馬張又新等猶忌紳日上書言貶紳太輕上許為殺之史炤釋文曰殺所介切削也余詳觀通鑑上文李紳自戸部侍郎貶端州司馬葢逺謫也張又新等猶日言其太輕是欲寘之死地故上許為殺之殺當讀如字史炤音義殊不可曉馬存亮自負上入軍中史炤釋文曰負戴也余謂在首為戴肩背為負上怪裴度奏狀無平章事以問韋處厚處厚具言李逢吉排沮之狀史炤釋文曰沮將豫切沮壞也余按字書沮止沮壞之沮音在呂翻炤音之誤辯已見一百四十二巻齊東昏侯永元元年今此字義稍異故復出之敬宗寳厯二年宣索左藏見在銀十萬兩金七千兩悉貯内藏史炤釋文曰左藏藏四方所獻金玉珠貝玩好之庫也余按漢官有中藏府屬司農晉少府屬官有左右藏令東晉及宋有外左庫内左庫齊梁陳有右藏無左藏北齊有左右藏令丞屬太府隋唐皆然唐左藏有東都西庫朝堂庫右藏有内庫外庫新唐書百官志左藏署令掌錢帛雜綵天下賦調右藏署令掌金玉珠寳銅鐡骨角齒毛綵畵則左藏庫者藏天下賦調之物非四方所獻也通鑑二百四十四凡三條文宗太和六年李德裕奏修卬崍關史炤釋文曰卭崍山名在沈黎郡余按漢書地理志蜀郡嚴道縣有卭崍山嚴道故青衣也漢武帝置沈黎郡漢光武建武十九年置青衣郡安帝延光元年置蜀郡屬國都尉新唐書地理志卭崍關在雅州榮經縣界祝穆曰卭崍關在黎州北九十里黎雅二州固皆漢沈黎郡地然自漢至唐州縣之建置離合苟不詳考而言之讀者殊未知漢沈黎郡今為何地也七年府兵内剷史炤釋文曰剷字未詳余按字書無剷字今人多讀為剗音楚限翻杜牧孫子序漢高祖言指蹤者人也史炤釋文作指縱注曰縱子用切蕭何傳發縦指示獸處者人也顔師古注云發縦謂解紲而放之也指示者以手指示之今俗言放狗余按杜牧注孫子序及通鑑諸本皆作指蹤顔師古以漢書本皆不為蹤字而讀者乃以為蹤跡之蹤故以發蹤為非而縱讀如字由師古之言而推之則唐人固多有讀發縱為發蹤者今杜牧言指蹤則習唐人之言徑以指示獸蹤為説也依杜牧文義釋之指蹤當讀為蹤跡之蹤若以為指縱音子用切則反害於文義矣使顔師古復生亦必就杜牧文意為之音義必不如史炤之拘泥而入于迂僻也通鑑二百四十五凡四條九年以刑部侍郎兼御史知雜李孝本權知御史中丞史炤釋文曰御史之軄有四知其雜事者謂之知雜海陵本同余按唐制御史臺侍御史六人乆次者一人知雜事謂之雜端殿中監察職掌進名遷改及令史考第臺内事顓决亦號臺端次一人知公廨次一人知彈分京城諸司為東西次一人知西推贜贖受事號副端次一人知東推理匭等有不糺舉者罰之次一人分司東都臺如此則侍御史六人其一人分司東都臺五人在臺院各有其職而知雜者臺院之長史炤言御史之職有四非也宦者舉軟輿迎上扶升輿决殿後罘罳疾趨北出史炤釋文曰罘罳闕前飾罘復罳思也臣將入請事於此復思之余按史炤據漢書注而為之釋耳然漢書注所云者闕前罘罳也此殿後罘罳則不可以臣將入奏事於其下復思之為釋程大昌曰罘罳者鏤木為之其中䟽通可以透明或為方空或為連𤨏其狀扶踈故曰罘罳讀如浮思浮思者猶曰䯱髵也因其形似而想其本狀自可見矣罘罳之名既立於是隨其所施而附著以為之名其在宮闕則為闕上罘罳臣朝於君至闕下復思所奏是也在陵垣則為陵上罘罳王莽去之使人無復思漢者是也却而求之上古則禮經䟽屏亦其物也疏者刻為雲氣禽獸而中空玲瓏也又有網戸者刻為連文遞相綴屬其形如網也宋玉曰網戸朱綴刻方連是也既曰刻是雕木為之其狀如網耳後世因此遂有直織絲網而張之簷窓以䕶鳥雀者文宗甘露之變出殿北門裂斷罘罳而去是真網也此又沿放楚辭而施網焉者也元微之為承㫖時詩曰蕊珠深處少人知網索西臨太液池浴殿曉聞天語後歩廊騎馬笑相隨自注云網索在太液池上學士候對歇於此余按網索乃是無壁及有窻處以索掛網遮䕶飛雀故云網索猶掛鈴之索為鈴索也宋元獻喜子京召還為學士詩曰網索軒忩邃鑾坡羽衛重用微之句也泰之言漢陵闕之罘罳與唐宮殿之罘罳不同其援據詳博故具述之學者觀之則知為史學者非可守一家之説以釋前史也開成元年莊宅收買猶未已史炤釋文曰唐置莊宅六宅使以諸王所屬為名或總云十六宅後置六宅余按莊宅使六宅使各是一官唐𤣥宗初置十王宅附苑城而居使宦者掌之後增置為十六宅中世以後置六宅使六宅使掌諸王第宅之事莊宅使葢掌田莊及外舎之事此言莊宅收買未已者謂使莊宅使搜買民間女子以充後宮也不可以六宅使混雜而為釋盖此皆内諸司使也唐之將亡朱全忠誅宦官以所親將校領内諸司使自此汔于宋朝遂為武散階二年詔徹樂減膳史炤釋文曰膳音善具食曰膳膳之言善也余按膳之言善古有此義然未嘗音膳為善膳當讀從去聲通鑑二百四十六凡三條五年李珏坐為山陵使龍輴陷罷為太常卿史炤釋文曰輴順允切車轉者畫龍其輴也海陵本同余按輴音勑倫翻記天子龍輴鄭𤣥注曰天子殯以輴車畫龍於轅孔頴逹正義曰輴以載柩輴之為狀庳下而寛廣無似龍形惟轅與龍形相類故知畫龍於轅也史炤音義俱非正人如松栢特立不倚邪人如藤蘿非附他物不能自起史炤釋文曰藤藟也蘿莪也余按炤以蘿為莪是據毛詩傳詩菁菁者莪傳曰莪蘿蒿也然此非蘿蒿之蘿乃蔦與女蘿之蘿能引蔓者也武宗會昌四年張仲武為東面招撫回鶻使奚契丹室韋等並自指揮史炤釋文曰室韋契丹别種東胡之北邊盖丁零之苗裔也余按史炤既曰室韋契丹别種又曰丁零苗裔盖引李延壽宋祁兩家之説李延壽北史曰室韋盖契丹之類在南者為契丹在北者為室韋宋祁新唐書曰室韋契丹别種東胡北邊盖丁零苗裔也就李延壽之説則以為契丹之類宋祁之説則持兩端矣契丹丁零本非同種契丹本東胡鮮卑種丁零在匈奴北夷狄荒忽史亦莫究其先之所由來也通鑑二百四十七凡一條三年郳公李抱真史炤釋文曰郳城名在東海余按郳春秋時小國後為小邾唐以古國名封李抱真為公耳通鑑二百四十八凡一條宣宗大中二年王皥曰憲宗厭代之夕事出曖昧史炤釋文曰厭於琰切厭魅也謂惡夢余謂厭代者謂升遐言厭薄人間之世棄之而上仙也厭當音於艶翻若厭魅之厭與惡夢而魘者其字義亦各不同史炤引之以釋厭代之厭誤矣通鑑二百四十九凡三條十年上曰鄭光殢我不置史炤釋文曰殢大計切極也余按字書慸音大計切極也殢音呼計翻此言殢我者謂有所負恃以事干請不得所欲不止者也十二年王式至交趾樹芀木為柵可支數十年史炤釋文曰芀都聊切又音調海陵本同余按音調及都聊切廣韵以為葦花其字從艸從刁又類篇有從艸從力者以為香菜音歴得切芀艻既皆艸名必不可以為柵新書王式傳作芍木字書芍陟畧翻芍藥香艸也不云木名趙魏之間謂棘為􅀢􅀢音六直翻王式之先家於太原其父起多居河中廬於中條山得無因趙魏之言以棘為􅀢乎艸本從艸得無傳寫之誤以棘為艸遂為芀字乎十三年鄆王為皇太子仍更名漼史炤釋文曰漼徂囘切余謂漼音七罪翻通鑑二百五十凡三條懿宗咸通元年王式命望海鎮將雲思益浙西將王克容將水軍廵海澨史炤釋文曰説文澨埤增水邊土人所止者余按史炤此説亦由廣韵來通鑑所謂廵海澨者廵邏海瀕耳顧野王曰澨水邊地朱元晦曰澨水涯也説較簡而明六年諸道進私白者閩中為多史炤釋文曰閩中南越中地余按南越之地唐為嶺南五管唐之閩中福建觀察使所管也一百六十六巻梁敬帝紹泰元年一百六十七巻陳武帝永定元年皆有此誤今以唐之疆理辯而申之七年南詔以范昵些為安南都統史炤釋文作胒些注曰董衝云胒未詳余考通鑑諸本及唐書皆作昵些若以字求之則昵音尼質翻通鑑二百五十一凡二條九年髙郵㟁峻而水深狹史炤釋文曰高郵邑名屬兖州余按高郵縣自漢以來皆屬廣陵隋改廣陵為江都郡又改為揚州唐書地理志高郵縣亦屬揚州史炤以為屬兖州何也晉氏南度迄于梁陳於廣陵置南兖州炤之所謂屬兖州無亦以此為據邪但南兖州不可以為兖州晉宋齊梁陳之疆理不可以釋唐之疆理釋通鑑者當隨事隨時考其建置離合沿革也賊以千縑贈張敬思史炤釋文曰縑并絲繒余謂史炤據説文以為説也唐制以布帛四丈為匹亦謂匹為縑所謂千縑者千匹也非并絲繒通鑑二百五十二凡六條十一年立戰棚具礟檑史炤釋文曰檑盧堆切機石之架也余按礟機石也檑檑木也音盧對翻檑木者自城上下之以壓敵非機石之架也蠻合梯衝四面攻成都城上以鉤繯挽之使近投火沃油焚之史炤釋文曰繯胡貫切絡也又下兖切維也一曰旗紐一曰槌耳海陵本同余按繯音于善翻又胡畎翻匝轉索頭如環所謂彄絙也前施大鉤故曰鉤繯廣韵從胡慣切者縞文也非此義既曰鉤繯亦非旗紐與槌耳也東蠻苴那時勿鄧夢衝三部史炤釋文提起苴那二字注曰東蠻部落名余按東蠻三部皆德宗朝韋臯帥蜀時招與共禦吐蕃者苴那時一部也勿鄧一部也夢衝一部也若曰苴那則以勿鄧為時勿鄧矣炤釋非僖宗乾符元年王凝崔彥昭同舉進士凝先及第嘗衩衣見彥昭史炤釋文曰衩衣楚懈切博雅䘯袺袵謂之褸袐余按史炤此釋全不可曉質以字書䘯袑也袺執袵也袵衣襟也裳際也褸亦衣襟裳際也袐無其字今祕宻之祕從示不從衣爾雅衣裗謂之䘽郭璞注曰衣縷也齊人謂之攣或曰袿衣之飾孫奭等釋曰此郭氏兩解一云衣縷也本亦作褸方言曰褸謂之衽即衣衿也與字書略同又類篇曰方言䘯謂之袩博雅袩衽謂之褸衩而史炤之所引既誤以袩為袺衩為祕又於衩衣之義無所發明炤於四十二巻漢光武建武六年引博雅以釋槽櫪一百三十六巻齊武帝永明三年引博雅以釋毦與此釋衩衣不過務求艱僻以㒺世耳何則衩衣二字今人所常言也凡交際之間賔以世俗之所謂禮服來者主欲從簡便必使人傳言曰請衩衣客於是以便服進又有服宴䙝之服而遇服交際之服者必謝曰衩袒無禮可見衩衣之語起於唐人而通行於今世也䘯袩衽謂之褸衩豈衩衣之謂乎三年高駢築成都羅城蜀土䟽惡以甓甃之史炤釋文曰甓瓴甓甃井甃余謂瓴甓今之甎高駢以蜀土䟽惡陶甎以甃成都之城甃砌也南人率謂以甎甃地曰甃砌易曰井甃无咎馬注云為瓦裹下連上也子夏傳云修治也于云以甎壘井曰甃是皆以甃砌為義炤以甃城為井甃則又不通矣無得為坎埳以害耕種史炤釋文曰坎埳高下也余按字書埳坎旁入也又曰埳小坎也易入于坎窞陸德明引説文曰坎中更有坎曰窞史炤所謂高下非坎埳之義也通鑑二百五十三凡四條四年南詔遣陁西段瑳寳等來請和史炤釋文作琷字注云按董衝云未詳海陵本同余按通鑑乃瑳字新唐書作琷字蓋傳寫唐書者誤以王旁差為王旁羌而董衝又誤為王旁也若從瑳字音七何翻王郢東至明州劉巨容以筒箭射殺之史炤釋文曰筒徒紅切竹名海陵本同余按唐制武舉有筒射今軍中亦有之筒射之箭長纔尺餘剖筒之半長與常弓所用箭等留二三寸不剖為筈以傅弦内箭筒中注箭弦上筒旁為竅穿小䋲繫于腕彀弓既發豁筒向手背激矢射敵中者洞貫所謂筒箭也五年李克用進撃寕武及岢嵐軍史炤釋文曰岢嵐山名也近太原余按唐書地理志嵐州嵐谷縣有岢嵐軍竇苹曰岢嵐山在嵐州宜芳縣西北元豐九域志岢嵐軍太平興國五年以嵐州嵐谷縣建軍南至嵐州九十里嵐州東南至太原一百八十五里九域志所載道里以太原府徙治後言之也其距太原不為近矣六年張錯郭昢帥行營兵攻東陽門史炤釋文曰昢敷尾切余按字書朏敷尾切旁從月昢字旁從日音滂佩翻又普罪翻又普沒翻通鑑二百五十四凡一條廣明元年鄭畋悶絶仆地甃傷其面史炤釋文曰甃井甃余謂甃井甃炤之誤猶前之誤也葢以甓甃地畋悶絶而仆故傷其面通鑑二百五十六凡二條光啓元年朱敬玫留荆南嘗曝衣史炤釋文曰曝薄報切説文晞也余按曝字即孟子一暴十寒秋陽以暴禮記欲暴巫尫列子自曝於日之曝音歩木翻二年李克修攻孟方立㧞故鎮武安臨洺邯鄲沙河史炤釋文曰邯鄲屬惠州余按唐志惠州本磁州至天祐三年以磁慈聲一更名惠州然史家只書磁州不書惠州葢後唐以天祐三年政在朱氏但仍唐世磁州之名而不用朱全忠所改惠州也二百八十四巻晉齊王開運二年邯鄲注亦誤通鑑二百五十七凡二條二年廣陵城中無食以堇泥為餅食之史炤釋文曰堇居隐切又音芹草名爾雅謂之齧苦今堇葵也海陵本同余按堇泥黏土也二百六十七巻梁太祖開平元年劉仁恭用堇泥為錢炤釋云黏土至二百六十九巻均王禎明元年又誤呂用之紿楊行宻曰用之有銀五萬鋌史炤釋文曰鋌待鼎切説文銅鐡樸也余按此言銀鋌也今人冶銀大鋌五十兩中鋌半之小鋌又半之世謂之鋌銀非銅鐡樸之謂也通鑑釋文辯誤巻十一
